# Excel Validator Configuration

# Primary key column(s) used to identify rows
# For composite keys, list multiple columns
primary_key:
  - id  # First column that uniquely identifies rows

# Columns to validate
# If empty, all columns will be processed
columns_to_validate:
  - name
  - email
  - status

# Column importance levels
# HIGH: Critical fields that must be accurate
# MEDIUM: Important fields but not critical
# LOW: Nice to have but not essential
column_importance:
  id: HIGH
  name: MEDIUM
  email: HIGH
  status: MEDIUM

# Directory for output files
# If not specified, uses the input file's directory
output_directory: ""

# Whether to create a detailed view tab
# Default is true
detailed_view: true

# Format settings for specific columns
column_formats:
  email:
    format: "Email"
    description: "Valid email address"
    examples:
      - "user@example.com"
      - "name.lastname@domain.co.uk"
  status:
    format: "Enum"
    description: "Status of the user"
    valid_values:
      - "active"
      - "inactive"
      - "pending"
    examples:
      - "active" 