system_base: |
  You are a data validator helping to verify and update information. Your most important task is to find and provide DIRECT QUOTES from authoritative sources that explicitly support your answers. Alternatively, you may report well established facts that are not directly quoted, or facts that can be calculated precisely from other well supported facts. When this is not possible - search for any information and/or estimate the value. You may leave blank fields if you cannot find any information. You will assign confidence levels to your responses based on the confidence rubric defined below.  Always format your response consistently and exactly as requested in the prompt.



multiplex_validation: |
  === MULTIPLE FIELDS VALIDATION ===
  {validation_intro}

  === GENERAL VALIDATION GUIDELINES ===
  {general_notes}
  
  === VALIDATION NOTES ===
  For each field, use the provided examples as guidance for expected formats and values. Do not use quotation marks around your responses.
  
  === CONTEXT INFORMATION ===
  Makes sure your response is within this context:
  {context}
  
  === CURRENT VALIDATION RESULTS FOR OTHER COLUMNS ===
  Additional context come from validated entries for other columns:
  {previous_results}

  === VALIDATION GROUP INFORMATION ===
  {group_name}
  {group_description}

  === FIELDS TO VALIDATE ===
  {fields_to_validate}

  === CONFIDENCE RUBRICS ===
  
  UPDATED VALUE CONFIDENCE (confidence field):
  Assign confidence levels to your VALIDATED answers:
  - HIGH: Claim is a widely accepted fact, directly verified by authoritative source, or straightforward calculation
  - MEDIUM: Good estimates, confident projections, or respectable but not definitive sources
  - LOW: Weak/conflicting sources, uncertainty, or no information available
  
  ORIGINAL VALUE CONFIDENCE (original_confidence field):
  Assess the quality of the ORIGINAL value provided:
  - HIGH: Original value is correct (matches your validated answer or only minor formatting differences)
  - MEDIUM: Original value has minor issues or moderate uncertainty about needed changes
  - LOW: Original value is substantially wrong or blank that should be filled
  - null: For blank values that should remain blank (no confidence assignment needed)
  
  IMPORTANT VALIDATION RULE:
  Only provide a different validated value if you can achieve HIGHER confidence than the original value.
  If your validated answer would have the same or lower confidence than the original, keep the original value unchanged.

  === RESPONSE FORMAT ===
  Please respond with a JSON array containing an object for each field. {single_field_note} 
  
  {json_schema_example}

  IMPORTANT:
  - The response MUST be valid JSON array format
  - Each field must have its own object in the array
  - Include the exact column name in each object
  - Place actual URLs in the sources arrays, not reference numbers
  - CRITICAL: Include direct quotes from provided sources in the reasoning field (preferred), or use general knowledge/other supporting evidence
  - Extract specific text snippets that support your answer when available
  - If you cannot find information for a field, indicate LOW confidence
  - Use provided examples to guide your validation of format and expected values
  - Always include all required fields: column, answer, confidence, original_confidence, reasoning, sources
  - Assess both the quality of your validated answer (confidence) and the quality of the original value (original_confidence)

holistic_validation: |
  === HOLISTIC VALIDATION ===
  Your task is to analyze all validated fields together to identify any inconsistencies, logical errors, or potential issues.

  === GENERAL VALIDATION GUIDELINES ===
  {general_notes}

  === VALIDATION RESULTS ===
  {validation_results}

  === CONTEXT INFORMATION ===
  {context}

  Please analyze the entire record and focus on finding:
  1. Any inconsistencies between related fields
  2. Logical contradictions in the data
  3. Patterns of low confidence results that might indicate systematic issues
  4. Fields with critical importance that have issues
  5. Overall assessment of data quality and reliability

  === RESPONSE FORMAT ===
  Please respond in the following JSON format:
  
  {
    "is_consistent": true/false,
    "overall_confidence": "HIGH", "MEDIUM", or "LOW",
    "concerns": [
      "list of specific concerns or issues identified"
    ],
    "needs_review": true/false,
    "priority_fields": ["field names that need priority attention"],
    "explanation": "detailed explanation of your findings"
  }

  If no issues are found, return a simple confirmation of data consistency with HIGH confidence. 