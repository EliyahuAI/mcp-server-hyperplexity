[pytest]
# Pytest configuration for table_maker tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    integration: Integration tests that make real API calls (deselect with '-m "not integration"')
    unit: Unit tests that don't make external calls
    slow: Tests that take a long time to run

# Asyncio configuration
asyncio_mode = auto

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test output options
console_output_style = progress
addopts =
    -ra
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = --cov=src --cov-report=html --cov-report=term-missing

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.8
