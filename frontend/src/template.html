    <script>
        window.dataLayer = window.dataLayer || [];

        // Track which conversions have already fired to prevent duplicates
        const firedConversions = {
            emailValidation: new Set(),
            preview: new Set()
        };

        function trackEmailValidationConversion(email) {
            // Dedupe by email address - one conversion per email
            if (firedConversions.emailValidation.has(email)) {
                console.log('[Conversion] Email validation skipped (already tracked for this email)');

            }
            firedConversions.emailValidation.add(email);

            const txnId = `email_${email}`;
            gtag('event', 'conversion', {
                'send_to': 'AW-17742279889/nbrVCMq_pssbENHploxC',
                'value': 1.0,
                'currency': 'USD',
                'transaction_id': txnId
            });
            console.log('[Conversion] Email validation tracked', `(txn: ${txnId})`);
        }

        function trackPreviewConversion(sessionId) {
            // Dedupe by sessionId - only first preview per session
            if (firedConversions.preview.has(sessionId)) {
                console.log('[Conversion] Preview skipped (already tracked for this session)');
                return;
            }
            firedConversions.preview.add(sessionId);

            const txnId = `preview_${sessionId}`;
            gtag('event', 'conversion', {
                'send_to': 'AW-17742279889/e3bLCMyGossbENHploxC',
                'value': 1.0,
                'currency': 'USD',
                'transaction_id': txnId
            });
            console.log('[Conversion] Preview tracked', `(txn: ${txnId})`);
        }

        function trackFullValidationConversion(sessionId, validationRecord) {
            // Calculate conversion value based on cells validated
            const cellCount = validationRecord?.ValidationSummary?.TotalCells || 0;

                'send_to': 'AW-17742279889/JUv1CMyPossbENHploxC',
                'value': conversionValue,
                'currency': 'USD',
                'transaction_id': txnId
            });
            console.log('[Conversion] Full validation tracked', `value: $${conversionValue}`, `(txn: ${txnId})`);
        }
    </script>
