<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">

    <!-- JSON-LD Structured Data for SEO -->
    {{JSON_LD}}

    <style>
        /* CSS Variables */
        :root {
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --border-radius: 8px;
            --font-size-small: 13px;
            --font-size-base: 14px;
            --line-height: 1.5;
            --text-color: #333;
            --text-secondary: #666;
            --card-background: #fff;
            --box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            --primary-color: #28FF3A;
            --secondary-color: #9c27b0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            color: var(--text-color);
            line-height: var(--line-height);
        }

        .viewer-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-background);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 24px;
        }

        .viewer-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .viewer-title {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .viewer-subtitle {
            color: var(--text-secondary);
            margin: 0;
            font-size: var(--font-size-base);
        }

        .viewer-footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            text-align: center;
            color: var(--text-secondary);
            font-size: var(--font-size-small);
        }

        .viewer-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .viewer-footer a:hover {
            text-decoration: underline;
        }

        .table-empty-message {
            color: var(--text-secondary);
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        .loading-message {
            color: var(--text-secondary);
            padding: 40px 20px;
            text-align: center;
        }

        .error-message {
            color: #c62828;
            background: #ffebee;
            border: 1px solid #ef9a9a;
            border-radius: var(--border-radius);
            padding: 15px 20px;
            margin: 20px 0;
        }

        /* Hidden SEO content - rendered for crawlers but invisible to users
           Uses clip-path technique: content is fully rendered in DOM but
           clipped to zero visible area. More robust than display:none or
           visibility:hidden which some crawlers may ignore. */
        .seo-content {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            clip-path: inset(50%);
            white-space: nowrap;
            border: 0;
        }

        /* SEO content structure - styled for when visible (debugging) */
        .seo-content .seo-hero h2 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
        }
        .seo-content .seo-tagline {
            font-size: 1.1rem;
            margin: 0 0 1rem 0;
        }
        .seo-content .seo-feature {
            margin-bottom: 1rem;
        }
        .seo-content .seo-feature h3 {
            font-size: 1.1rem;
            margin: 0 0 0.5rem 0;
        }
        .seo-content .seo-comparison {
            margin-bottom: 1rem;
            padding: 0.5rem;
        }
        .seo-content .seo-comparison h3 {
            font-size: 1rem;
            margin: 0 0 0.5rem 0;
        }
        .seo-content .seo-context {
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        /* Methodology/freshness block */
        .methodology-block {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 4px;
        }

        /* Generated by branding */
        .generated-by {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .generated-by a {
            color: #28FF3A;
            text-decoration: none;
            font-weight: 500;
        }

        .generated-by a:hover {
            text-decoration: underline;
        }

        /* Collapsible FAQ section styles */
        .faq-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .faq-section.collapsed .faq-content {
            display: none;
        }

        .faq-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 8px 0;
        }

        .faq-toggle:hover .faq-title {
            color: #28FF3A;
        }

        .faq-toggle-icon {
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: transform 0.2s ease;
        }

        .faq-section:not(.collapsed) .faq-toggle-icon {
            transform: rotate(180deg);
        }

        .faq-content {
            margin-top: 16px;
        }

        .faq-title {
            font-size: 1.25rem;
            margin: 0;
        }

        .faq-item {
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        .faq-question {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .faq-question:hover {
            background: #f8f9fa;
        }

        .faq-answer {
            padding: 0 16px 12px 16px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Table CSS (from 07-tables.css) */
        {{TABLE_CSS}}
    </style>
</head>
<body>
    <!-- Hidden SEO content placeholder -->
    <div class="seo-content" aria-hidden="true">
        {{SEO_CONTENT}}
    </div>

    <div class="viewer-container">
        <div class="viewer-header">
            <h1 class="viewer-title">{{TITLE}}</h1>
            <p class="viewer-subtitle">{{SUBTITLE}}</p>
        </div>
        {{METHODOLOGY_BLOCK}}
        <div class="generated-by">Generated by <a href="https://eliyahu.ai/hyperplexity" target="_blank" rel="noopener">Hyperplexity.AI</a></div>
        <div id="table-container">
            <p class="loading-message">Loading table data...</p>
        </div>
        {{FAQ_BLOCK}}
        <div class="viewer-footer">
            Generated by <a href="https://hyperplexity.com" target="_blank" rel="noopener">Hyperplexity</a>
            {{FOOTER_LINK}}
        </div>
    </div>

    <!-- Embedded metadata MUST come first so it's available when the loader runs -->
    <script>
        window.TABLE_METADATA = {{METADATA_JSON}};
    </script>

    <script>
        /* Interactive Table Module (from 16-interactive-table.js) */
        {{TABLE_JS}}

        /* Load and render table */
        (async function() {
            const container = document.getElementById('table-container');
            let metadata = null;

            try {
                // Check for embedded metadata first
                if (window.TABLE_METADATA) {
                    metadata = window.TABLE_METADATA;
                }
                // Check for URL parameter
                else {
                    const params = new URLSearchParams(window.location.search);
                    const metadataUrl = params.get('metadata');
                    if (metadataUrl) {
                        const response = await fetch(metadataUrl);
                        if (!response.ok) {
                            throw new Error(`Failed to load metadata: ${response.status} ${response.statusText}`);
                        }
                        metadata = await response.json();
                    }
                }

                if (metadata) {
                    const html = InteractiveTable.render(metadata, {
                        showGeneralNotes: true,
                        showLegend: true
                    });
                    container.innerHTML = html;
                    InteractiveTable.init();
                } else {
                    container.innerHTML = '<p class="table-empty-message">No table metadata provided. Pass metadata via URL parameter (?metadata=url) or embed in page.</p>';
                }
            } catch (error) {
                console.error('Error loading table:', error);
                container.innerHTML = `<div class="error-message">Error loading table: ${error.message}</div>`;
            }
        })();
    </script>
</body>
</html>
