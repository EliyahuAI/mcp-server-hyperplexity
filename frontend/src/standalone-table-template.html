<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        /* CSS Variables */
        :root {
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --border-radius: 8px;
            --font-size-small: 13px;
            --font-size-base: 14px;
            --line-height: 1.5;
            --text-color: #333;
            --text-secondary: #666;
            --card-background: #fff;
            --box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            --primary-color: #28FF3A;
            --secondary-color: #9c27b0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            color: var(--text-color);
            line-height: var(--line-height);
        }

        .viewer-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-background);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 24px;
        }

        .viewer-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .viewer-title {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .viewer-subtitle {
            color: var(--text-secondary);
            margin: 0;
            font-size: var(--font-size-base);
        }

        .table-empty-message {
            color: var(--text-secondary);
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        .loading-message {
            color: var(--text-secondary);
            padding: 40px 20px;
            text-align: center;
        }

        .error-message {
            color: #c62828;
            background: #ffebee;
            border: 1px solid #ef9a9a;
            border-radius: var(--border-radius);
            padding: 15px 20px;
            margin: 20px 0;
        }

        /* Table CSS (from 07-tables.css) */
        {{TABLE_CSS}}
    </style>
</head>
<body>
    <div class="viewer-container">
        <div class="viewer-header">
            <h1 class="viewer-title">{{TITLE}}</h1>
            <p class="viewer-subtitle">{{SUBTITLE}}</p>
        </div>
        <div id="table-container">
            <p class="loading-message">Loading table data...</p>
        </div>
    </div>

    <!-- Embedded metadata MUST come first so it's available when the loader runs -->
    <script>
        window.TABLE_METADATA = {{METADATA_JSON}};
    </script>

    <script>
        /* Interactive Table Module (from 16-interactive-table.js) */
        {{TABLE_JS}}

        /* Load and render table */
        (async function() {
            const container = document.getElementById('table-container');
            let metadata = null;

            try {
                // Check for embedded metadata first
                if (window.TABLE_METADATA) {
                    metadata = window.TABLE_METADATA;
                }
                // Check for URL parameter
                else {
                    const params = new URLSearchParams(window.location.search);
                    const metadataUrl = params.get('metadata');
                    if (metadataUrl) {
                        const response = await fetch(metadataUrl);
                        if (!response.ok) {
                            throw new Error(`Failed to load metadata: ${response.status} ${response.statusText}`);
                        }
                        metadata = await response.json();
                    }
                }

                if (metadata) {
                    const html = InteractiveTable.render(metadata, {
                        showGeneralNotes: true,
                        showLegend: true
                    });
                    container.innerHTML = html;
                    InteractiveTable.init();
                } else {
                    container.innerHTML = '<p class="table-empty-message">No table metadata provided. Pass metadata via URL parameter (?metadata=url) or embed in page.</p>';
                }
            } catch (error) {
                console.error('Error loading table:', error);
                container.innerHTML = `<div class="error-message">Error loading table: ${error.message}</div>`;
            }
        })();
    </script>
</body>
</html>
