<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Modern Textarea Comparison</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background-color: #f3f4f6;
      color: #111827;
      margin: 0;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      gap: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 0.75rem;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 0.75rem;
      font-size: 0.95rem;
      resize: vertical;
      transition: all 0.2s ease;
    }

    /* Original textarea style */
    .original textarea {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
    }

    /* Modern textarea style */
    .modern textarea {
      background: #F9FAFB;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: #111827;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
    }

    .modern textarea:focus {
      outline: none;
      background: #FFFFFF;
      border-color: #10B981;
      box-shadow:
        inset 0 1px 2px rgba(0,0,0,0.05),
        0 0 0 3px rgba(16,185,129,0.2);
    }

    .modern textarea::placeholder {
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <h1>Modern Textarea Comparison</h1>

  <div class="grid">
    <div class="card original">
      <h2>Original Style</h2>
      <textarea placeholder="Paste AI output or literature with citations to verify..."></textarea>
    </div>

    <div class="card modern">
      <h2>Modernized Style</h2>
      <textarea placeholder="Paste AI output or literature with citations to verify..."></textarea>
    </div>
  </div>
</body>
</html>
