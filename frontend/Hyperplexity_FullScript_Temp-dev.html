        infoBoxText: null,         // Blue info box text (shown after general notes)
    };

    /* ========================================
     * Utility Functions
     * ======================================== */

    /**
     * Escape HTML to prevent XSS
     */
    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    /**
     * Build tooltip content for cell hover
     */
    function buildTooltipContent(comment, fullValue, displayValue) {
        let parts = [];

        // Show full value if truncated
        if (fullValue && fullValue.length > displayValue.length) {
            const truncated = fullValue.substring(0, 200) + (fullValue.length > 200 ? '...' : '');
            parts.push(`<b>Full:</b> ${escapeHtml(truncated)}`);
        }

        if (comment.validator_explanation) {
            const explanation = comment.validator_explanation.length > 150
                ? comment.validator_explanation.substring(0, 150) + '...'
                : comment.validator_explanation;
            parts.push(`<b>Reason:</b> ${escapeHtml(explanation)}`);
        }

        if (comment.key_citation) {
            const citation = comment.key_citation.length > 100
                ? comment.key_citation.substring(0, 100) + '...'
                : comment.key_citation;
            parts.push(`<b>Key Citation:</b> ${escapeHtml(citation)}`);
        }

        if (parts.length > 0) {
            parts.push('<span class="tooltip-hint">Click for more</span>');
        }
        return parts.join('<br>');
    }

    /**
     * Build tooltip content for column headers
     */
    function buildColumnTooltip(description, notes) {
        let parts = [];

        if (description && description.trim()) {
            parts.push(`<b>Description:</b> ${escapeHtml(description)}`);
        }

        if (notes && notes.trim()) {
            parts.push(`<b>Notes:</b> ${escapeHtml(notes)}`);
        }

        return parts.join('<br>');
    }

    /* ========================================
     * Render Functions
     * ======================================== */

    /**
     * Render an interactive table from metadata
     * @param {Object} tableMetadata - Table metadata with columns, rows, general_notes
     * @param {Object} options - Rendering options
     * @returns {string} HTML string of the table
     */
    function render(tableMetadata, options = {}) {
        const opts = { ...defaultOptions, ...options };

        // Validate input
        if (!tableMetadata || !tableMetadata.rows || tableMetadata.rows.length === 0 ||
            !tableMetadata.columns || tableMetadata.columns.length === 0) {
            return '<p class="table-empty-message">No table data available.</p>';
        }

        const { columns, general_notes } = tableMetadata;
        let rows = tableMetadata.rows;

        // Apply row limit if specified
        if (opts.maxRows && opts.maxRows > 0) {
            rows = rows.slice(0, opts.maxRows);
        }

        let html = '';

        // General notes info box (collapsible if long)
        if (opts.showGeneralNotes && general_notes && general_notes.trim()) {
            const isLong = general_notes.length > 200;
            const uniqueId = 'general-notes-' + Date.now();
            html += `<div class="general-notes-box${isLong ? ' collapsible collapsed' : ''}" ${isLong ? `onclick="InteractiveTable.toggleGeneralNotes('${uniqueId}')"` : ''} id="${uniqueId}">
                <div class="general-notes-header">
                    <span class="general-notes-icon">📋</span>
                    <span class="general-notes-title">Configuration Notes</span>
                    ${isLong ? '<span class="general-notes-expand-hint">(click to expand)</span><span class="general-notes-toggle">▼</span>' : ''}
                </div>
                <div class="general-notes-content">${escapeHtml(general_notes)}</div>
            </div>`;
        }

        // Blue info box (after general notes)
        if (opts.infoBoxText) {
            html += `<div class="viewer-info-box">
                <span class="viewer-info-icon">ℹ</span>
                <span>${escapeHtml(opts.infoBoxText)}</span>
            </div>`;
        }

        // Color legend/key
        if (opts.showLegend) {
            html += `<div class="table-legend">
                <span class="legend-title">Confidence:</span>
                <span class="legend-item"><span class="legend-color confidence-high"></span> High</span>
                <span class="legend-item"><span class="legend-color confidence-medium"></span> Medium</span>
                <span class="legend-item"><span class="legend-color confidence-low"></span> Low</span>
                <span class="legend-item"><span class="legend-color confidence-id"></span> ID</span>
            </div>`;
        }

        html += '<div class="interactive-table-container">';
        html += '<table class="interactive-table">';

        // Transposed format: columns as rows, data rows as columns
        // Header row: Column | Row 1 | Row 2 | Row 3
        html += '<thead><tr>';
        html += '<th class="sticky-column" data-col-index="0">Column</th>';
        rows.forEach((_, i) => {
            html += `<th data-col-index="${i + 1}">Row ${i + 1}</th>`;
        });
        html += '</tr></thead>';

        // Data rows: one row per column
        html += '<tbody>';
        columns.forEach(col => {
            // Both ID and IGNORED columns should show as ID style
            const importance = col.importance ? col.importance.toUpperCase() : '';
            const isIdColumn = importance === 'ID' || importance === 'IGNORED';

            // Build column header tooltip from description and notes
            const colTooltip = buildColumnTooltip(col.description, col.notes);
            const hasTooltip = colTooltip && colTooltip.length > 0;

            html += '<tr>';
            html += `<td class="sticky-column ${isIdColumn ? 'id-column' : ''}${hasTooltip ? ' has-column-info' : ''}" data-col-index="0"`;
            if (hasTooltip) {
                html += ` data-tooltip-html="${colTooltip.replace(/"/g, '&quot;')}"`;
                html += ` onmouseenter="InteractiveTable.showTooltip(event, this)"`;
                html += ` onmouseleave="InteractiveTable.hideTooltip()"`;
            }
            html += '>';
            html += `<strong>${escapeHtml(col.name)}</strong>`;
            html += '</td>';

            rows.forEach((row, colIdx) => {
                const cellData = row.cells[col.name] || {};
                const confidence = (cellData.confidence || '').toUpperCase();
                const displayValue = cellData.display_value || '';
                const fullValue = cellData.full_value || displayValue;
                const comment = cellData.comment || {};

                // Add column name and row ID info to cell data for modal display
                // Get ID values from cells marked as ID columns
                const idColumns = columns.filter(c => c.importance && c.importance.toUpperCase() === 'ID');
                let rowIdValues = '';
                if (idColumns.length > 0) {
                    // Use explicitly marked ID columns
                    rowIdValues = idColumns.map(idCol => row.cells[idCol.name]?.display_value || '').filter(v => v).join(', ');
                } else {
                    // Fallback: use first 2 columns as ID when none are marked
                    const fallbackIdColumns = columns.slice(0, 2);
                    rowIdValues = fallbackIdColumns.map(idCol => row.cells[idCol.name]?.display_value || '').filter(v => v).join(', ');
                }
                cellData._columnName = col.name;
                cellData._rowId = rowIdValues || `Row ${colIdx + 1}`;

                // Build tooltip content
                const tooltipContent = buildTooltipContent(comment, fullValue, displayValue);

                // Determine confidence class
                let confidenceClass = '';
                if (confidence === 'HIGH') confidenceClass = 'confidence-high';
                else if (confidence === 'MEDIUM') confidenceClass = 'confidence-medium';
                else if (confidence === 'LOW') confidenceClass = 'confidence-low';
                else if (confidence === 'ID') confidenceClass = 'confidence-id';

                // Properly escape JSON for HTML attribute
                const cellDataJson = JSON.stringify(cellData)
                    .replace(/&/g, '&amp;')
                    .replace(/'/g, '&#39;')
                    .replace(/"/g, '&quot;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');

                html += `<td
                    class="table-cell ${confidenceClass}"
                    data-col-index="${colIdx + 1}"
                    data-tooltip-html="${tooltipContent ? tooltipContent.replace(/"/g, '&quot;') : ''}"
                    data-cell-data="${cellDataJson}"
                    onclick="InteractiveTable.showCellModal(this)"
                    onmouseenter="InteractiveTable.showTooltip(event, this); InteractiveTable.highlightColumn(${colIdx + 1})"
                    onmouseleave="InteractiveTable.hideTooltip(); InteractiveTable.clearColumnHighlight()"
                >`;
                html += `<span class="cell-value">${escapeHtml(displayValue)}</span>`;
                if (fullValue.length > displayValue.length) {
                    html += '<span class="truncated-indicator">...</span>';
                }
                html += '</td>';
            });

            html += '</tr>';
        });
        html += '</tbody>';

        html += '</table></div>';
        return html;
    }

    /* ========================================
     * Helper: Convert Sample Rows to Metadata
     * ======================================== */

    /**
     * Convert sample rows (from AI generation) to table_metadata format
     * @param {Array} columns - Array of column objects {name, importance, description}
     * @param {Array} sampleRows - Array of row data objects
     * @param {number} maxRows - Maximum rows to include (default 3)
     * @returns {Object} Table metadata in standard format
     */
    function fromSampleRows(columns, sampleRows, maxRows = 3) {
        // Validate inputs - return empty metadata if invalid
        if (!Array.isArray(columns) || columns.length === 0) {
            console.warn('[InteractiveTable] fromSampleRows: columns is empty or not an array');
            return { columns: [], rows: [], is_transposed: true, general_notes: '' };
        }
        if (!Array.isArray(sampleRows) || sampleRows.length === 0) {
            console.warn('[InteractiveTable] fromSampleRows: sampleRows is empty or not an array');
            return { columns: [], rows: [], is_transposed: true, general_notes: '' };
        }

        return {
            columns: columns.map(col => ({
                name: col.name || (typeof col === 'string' ? col : String(col)),
                importance: col.importance || 'MEDIUM',
                description: col.description || ''
            })),
            rows: sampleRows.slice(0, maxRows).map((row, idx) => {
                // Handle null/undefined rows
                if (!row || typeof row !== 'object') {
                    return { row_key: `row_${idx + 1}`, cells: {} };
                }
                return {
                    row_key: `row_${idx + 1}`,
                    cells: Object.fromEntries(columns.map(col => {
                        const colName = col.name || (typeof col === 'string' ? col : String(col));
                        const value = String(row[colName] ?? '');
                        return [colName, {
                            display_value: value.slice(0, 30) + (value.length > 30 ? '...' : ''),
                            full_value: value,
                            confidence: (col.importance || '').toUpperCase() === 'ID' ? 'ID' : 'MEDIUM',
                            comment: {}
                        }];
                    }))
                };
            }),
            is_transposed: true,
            general_notes: ''
        };
    }

    /**
     * Show custom tooltip on hover
     */
    function showTooltip(event, cell) {
        const html = cell.dataset.tooltipHtml;

        // Track current cell and store event coords
        currentHoverCell = cell;
        const coords = { x: event.clientX, y: event.clientY };

        // Immediately show cell saturation and column highlights (skip for sticky column headers)
        // Note: Highlighting works even on touch devices, only the tooltip popup is disabled
        const colIndex = cell.dataset.colIndex;
        const isColumnHeader = colIndex === '0' || cell.classList.contains('sticky-column');

        if (!isColumnHeader) {
            cell.classList.add('cell-hover-active');
            if (colIndex) {
                const cells = document.querySelectorAll(`.interactive-table [data-col-index="${colIndex}"]`);
                cells.forEach(c => c.classList.add('column-highlight'));
            }
        }

        // Skip tooltip popup on touch devices (but highlighting above still works)
        if (isTouchDevice) return;

        if (!html) return;

        // Clear any pending timeouts
        if (tooltipTimeout) {
            clearTimeout(tooltipTimeout);
            tooltipTimeout = null;
        }
        if (hoverDelayTimeout) {
            clearTimeout(hoverDelayTimeout);
            hoverDelayTimeout = null;
        }

        // Delay showing tooltip by 300ms
        hoverDelayTimeout = setTimeout(() => {
            if (currentHoverCell !== cell) return;

            // Create tooltip if doesn't exist
            if (!tooltipElement) {
                tooltipElement = document.createElement('div');
                tooltipElement.className = 'custom-tooltip';
                document.body.appendChild(tooltipElement);
            }

            // Set content as HTML
            tooltipElement.innerHTML = html;
            tooltipElement.style.display = 'block';

            // Position near cursor
            const padding = 12;
            let x = coords.x + padding;
            let y = coords.y + padding;

            // Measure tooltip
            const rect = tooltipElement.getBoundingClientRect();

            // Keep on screen
            if (x + rect.width > window.innerWidth - padding) {
                x = coords.x - rect.width - padding;
            }
            if (y + rect.height > window.innerHeight - padding) {
                y = coords.y - rect.height - padding;
            }

            tooltipElement.style.left = x + 'px';
            tooltipElement.style.top = y + 'px';
        }, 300);
    }

    /**
     * Hide custom tooltip
     */
    function hideTooltip() {
        // Clear hover delay
        if (hoverDelayTimeout) {
            clearTimeout(hoverDelayTimeout);
            hoverDelayTimeout = null;
        }

        // Remove cell hover class
        if (currentHoverCell) {
            currentHoverCell.classList.remove('cell-hover-active');
        }
        currentHoverCell = null;

        // Clear column highlights
        const highlighted = document.querySelectorAll('.interactive-table .column-highlight');
        highlighted.forEach(cell => cell.classList.remove('column-highlight'));

        // Hide tooltip immediately
        if (tooltipElement) {
            tooltipElement.style.display = 'none';
        }
    }

                                <span class="source-id">[${s.id}]</span>
                                ${s.url ? `<a href="${escapeHtml(s.url)}" target="_blank">${escapeHtml(s.title)}</a>` : escapeHtml(s.title)}
                                ${s.snippet ? `<br><small class="source-snippet">"${escapeHtml(s.snippet.substring(0, 150))}${s.snippet.length > 150 ? '...' : ''}"</small>` : ''}
                            </li>
                        `).join('')}
                    </ul>
                </div>
                ` : ''}
            </div>
        `;

        // Create modal overlay
        const overlay = document.createElement('div');
        overlay.className = 'cell-detail-overlay' + (noAnimate ? ' no-animate' : '');
        overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
        overlay.innerHTML = modalContent;
        document.body.appendChild(overlay);

        // Add keyboard handler
        document.addEventListener('keydown', handleModalKeydown);
    }

    /**
     * Close cell detail modal
     */
    function closeModal(animate = false) {
        const overlay = document.querySelector('.cell-detail-overlay');
        if (overlay) {
            if (animate) {
                overlay.classList.add('modal-closing');
                setTimeout(() => overlay.remove(), 100);
            } else {
                overlay.remove();
            }
        }
        currentModalCell = null;
        document.removeEventListener('keydown', handleModalKeydown);
    }

    /**
     * Handle keyboard events in modal
     */
    function handleModalKeydown(e) {
        if (e.key === 'Escape') {
            closeModal();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            navigateModalCell(-1, 'horizontal');
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            navigateModalCell(1, 'horizontal');
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            navigateModalCell(-1, 'vertical');
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            navigateModalCell(1, 'vertical');
        } else if (e.key === ' ') {
            // Space scrolls the modal down
            e.preventDefault();
            const modal = document.querySelector('.cell-detail-modal');
            if (modal) {
                modal.scrollBy({ top: 150, behavior: 'smooth' });
            }
        }
    }

    /**
     * Get all interactive cells in reading order
     */
    function getAllInteractiveCells() {
        return Array.from(document.querySelectorAll('.interactive-table .table-cell'));
    }

    /**
     * Navigate to prev/next cell in modal
     */
    function navigateModalCell(direction, mode = 'horizontal') {
        if (!currentModalCell) return;

        const cells = getAllInteractiveCells();
        const currentIndex = cells.indexOf(currentModalCell);
        if (currentIndex === -1) return;

        let targetCell = null;

        if (mode === 'horizontal') {
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < cells.length) {
                targetCell = cells[newIndex];
            }
        } else if (mode === 'vertical') {
            const currentRow = currentModalCell.closest('tr');
            const currentColIndex = currentModalCell.dataset.colIndex;

            const allRows = Array.from(document.querySelectorAll('.interactive-table tbody tr'));
            const currentRowIndex = allRows.indexOf(currentRow);
            const targetRowIndex = currentRowIndex + direction;

            if (targetRowIndex >= 0 && targetRowIndex < allRows.length) {
                targetCell = allRows[targetRowIndex].querySelector(`.table-cell[data-col-index="${currentColIndex}"]`);
            }
        }

        if (targetCell) {
            // Clear any pending settle timeout
            if (navSettleTimeout) {
                clearTimeout(navSettleTimeout);
            }

            const overlay = document.querySelector('.cell-detail-overlay');

            // Scroll only within the table container (not the whole page)
            const container = targetCell.closest('.interactive-table-container');
            if (container) {
                const cellRect = targetCell.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();

                // Check if cell is outside visible area horizontally
                if (cellRect.left < containerRect.left || cellRect.right > containerRect.right) {
                    const scrollLeft = targetCell.offsetLeft - container.offsetWidth / 2 + targetCell.offsetWidth / 2;
                    container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }
            }

            // Clear previous highlights
            const prevHighlighted = document.querySelectorAll('.interactive-table .column-highlight');
            prevHighlighted.forEach(c => c.classList.remove('column-highlight'));
            const prevRows = document.querySelectorAll('.interactive-table .row-highlight');
            prevRows.forEach(r => r.classList.remove('row-highlight'));
            const prevCells = document.querySelectorAll('.interactive-table .cell-hover-active');
            prevCells.forEach(c => c.classList.remove('cell-hover-active'));

            // Trigger hover state on target cell (highlight row/column)
            targetCell.classList.add('cell-hover-active');
            const colIndex = targetCell.dataset.colIndex;
            if (colIndex) {
                const colCells = document.querySelectorAll(`.interactive-table [data-col-index="${colIndex}"]`);
                colCells.forEach(c => c.classList.add('column-highlight'));
            }
            // Highlight the row (sticky column)
            const row = targetCell.closest('tr');
            if (row) {
                row.classList.add('row-highlight');
            }

            // Fade modal to transparent to reveal the highlighted cell
            if (overlay) {
                overlay.classList.add('modal-nav-fade');
            }

            // Update current cell reference
            currentModalCell = targetCell;

            // Settle after 1s of no movement - show new modal
            navSettleTimeout = setTimeout(() => {
                // Clear hover state
                targetCell.classList.remove('cell-hover-active');
                const highlighted = document.querySelectorAll('.interactive-table .column-highlight');
                highlighted.forEach(c => c.classList.remove('column-highlight'));
                const highlightedRows = document.querySelectorAll('.interactive-table .row-highlight');
                highlightedRows.forEach(r => r.classList.remove('row-highlight'));

                if (overlay) overlay.remove();
                showCellModal(targetCell, true, true);
                navSettleTimeout = null;
            }, 1000);
        }
    }

    /**
     * Navigate to previous cell
     */
    function navigatePrev() {
        navigateModalCell(-1);
    }

    /**
     * Navigate to next cell
     */
    function navigateNext() {
        navigateModalCell(1);
    }

    /* ========================================
     * Event Handlers - General Notes
     * ======================================== */

    /**
     * Toggle general notes box expansion
     */
    function toggleGeneralNotes(id) {
        const box = document.getElementById(id);
        if (box) {
            box.classList.toggle('collapsed');
            const isCollapsed = box.classList.contains('collapsed');
            const toggle = box.querySelector('.general-notes-toggle');
            if (toggle) {
                toggle.textContent = isCollapsed ? '▼' : '▲';
            }
            const hint = box.querySelector('.general-notes-expand-hint');
            if (hint) {
                hint.textContent = isCollapsed ? '(click to expand)' : '(click to collapse)';
            }
        }
    }

    /* ========================================
     * Initialization
     * ======================================== */

    /**
     * Initialize event handlers (call after rendering)
     */
    function init() {
        // Touch device detection
        if (!isTouchDevice) {
            document.addEventListener('touchstart', function onFirstTouch() {
                isTouchDevice = true;
                document.body.classList.add('touch-device');
                document.removeEventListener('touchstart', onFirstTouch);
            }, { passive: true });
        }
    }

    /* ========================================
     * Public API
     * ======================================== */
    return {
        render: render,
        fromSampleRows: fromSampleRows,
        init: init,
        // Tooltip handlers (called from inline event handlers)
        showTooltip: showTooltip,
        hideTooltip: hideTooltip,
        highlightColumn: highlightColumn,
        clearColumnHighlight: clearColumnHighlight,
        // Modal handlers
        showCellModal: showCellModal,
        closeModal: closeModal,
        navigatePrev: navigatePrev,
        navigateNext: navigateNext,
        // Notes handler
        toggleGeneralNotes: toggleGeneralNotes,
        // Utility
        escapeHtml: escapeHtml
    };
})();

// Expose to global scope for inline event handlers
window.InteractiveTable = InteractiveTable;

// Export for use in other modules (if using module system)
if (typeof module !== 'undefined' && module.exports) {
    module.exports = InteractiveTable;
}

/**
 * Create a table view card that can show:
 * - Live processing progress with table updating
 * - Static table results
 * - Cost estimates and action buttons
 *
 * @param {Object} options - Card options
 * @param {string} options.cardId - Optional explicit card ID
 * @param {string} options.icon - Card icon (default: '📊')
 * @param {string} options.title - Card title (default: 'Table Results')
 * @param {string} options.subtitle - Card subtitle
 * @param {boolean} options.showInfoHeader - Show info header above table (default: true)
 * @param {string} options.infoHeaderText - Info header text
 * @returns {Object} Object with cardId and DOM element
 */
function createTableViewCard(options = {}) {
    const cardId = options.cardId || generateCardId();

    // Build content with placeholders for table, info panel, messages, buttons
    const content = `
        <div id="${cardId}-info-header" class="message message-info" style="display: ${options.showInfoHeader !== false ? 'flex' : 'none'};">
            <span class="message-icon">ℹ️</span>
            <span id="${cardId}-info-text">${options.infoHeaderText || 'Table data preview.'}</span>
        </div>
        <div id="${cardId}-progress"></div>
        <div id="${cardId}-table-container"></div>
        <div id="${cardId}-cost-estimate" class="cost-estimate" style="display: none;">
            <div class="cost-estimate-header">Estimates for Processing Entire Table</div>

        </div>
        <div id="${cardId}-messages"></div>
        <div id="${cardId}-buttons" class="card-buttons"></div>
    `;

    const card = createCard({
        icon: options.icon || '📊',
        title: options.title || 'Table Results',
        subtitle: options.subtitle || '',
        content,
        id: cardId
    });

    return { cardId, element: card };
}

/**
 * Update table view card with new table data
 *
 * @param {string} cardId - Card ID to update
 * @param {Object} tableMetadata - Table metadata for InteractiveTable.render()
 * @param {Object} options - Update options
 * @param {boolean} options.showGeneralNotes - Show general notes box (default: true)
 * @param {boolean} options.showLegend - Show confidence legend (default: true)
 * @param {number} options.maxRows - Maximum rows to display
 * @param {Array} options.buttons - Button configurations for createButtonRow
 * @param {string} options.infoHeaderText - Update info header text
 * @param {boolean} options.hideInfoHeader - Hide the info header
 */
function updateTableViewCard(cardId, tableMetadata, options = {}) {
    const container = document.getElementById(`${cardId}-table-container`);
    if (!container) {
        console.error(`[TABLE_VIEW_CARD] Container ${cardId}-table-container not found`);
        return;
    }

    // Hide progress indicator if showing
    const progress = document.getElementById(`${cardId}-progress`);
    if (progress) {
        progress.innerHTML = '';
    }

    // Update info header if specified
    if (options.infoHeaderText) {
        const infoText = document.getElementById(`${cardId}-info-text`);
        if (infoText) {
            infoText.textContent = options.infoHeaderText;
        }
    }

    // Hide/show info header
    const infoHeader = document.getElementById(`${cardId}-info-header`);
    if (infoHeader) {
        infoHeader.style.display = options.hideInfoHeader ? 'none' : 'flex';
    }

    // Render table using InteractiveTable module
    if (tableMetadata && typeof InteractiveTable !== 'undefined') {
        const tableHtml = InteractiveTable.render(tableMetadata, {
            showGeneralNotes: options.showGeneralNotes !== false,
            showLegend: options.showLegend !== false,
            maxRows: options.maxRows
        });
        container.innerHTML = tableHtml;
        InteractiveTable.init();
    } else if (tableMetadata && typeof InteractiveTable === 'undefined') {
        // InteractiveTable module not loaded - show error
        console.error('[TABLE_VIEW_CARD] InteractiveTable module not loaded');
        container.innerHTML = '<p class="table-empty-message" style="color: #c62828;">Error: Table rendering module not loaded. Please refresh the page.</p>';
    } else if (!tableMetadata) {
        container.innerHTML = '<p class="table-empty-message">No table data available.</p>';
    }

    // Update buttons using existing card button system
    if (options.buttons && options.buttons.length > 0) {
        createButtonRow(`${cardId}-buttons`, options.buttons);
    }
}

/**
 * Show cost estimates in table view card
 *
 * @param {string} cardId - Card ID
 * @param {Object} costData - Cost data object
 * @param {number} costData.totalRows - Total rows
 * @param {number} costData.validatedColumnsCount - Columns to validate
 * @param {number} costData.totalAICalls - Total AI calls
 * @param {number} costData.estimatedTime - Estimated time in seconds
 * @param {number} costData.estimatedCost - Estimated cost
 * @param {number} costData.discount - Discount amount
 * @param {number} costData.effectiveCost - Cost after discount
 * @param {Object} costData.accountInfo - Account balance info
 */
function showTableCostEstimates(cardId, costData) {
    const costEl = document.getElementById(`${cardId}-cost-estimate`);
    const estimatesEl = document.getElementById(`${cardId}-estimates`);

    if (!costEl || !estimatesEl) {
        console.warn(`[TABLE_VIEW_CARD] Cost estimate elements not found for ${cardId}`);
        return;
    }

    costEl.style.display = 'block';

    let estimatesHtml = '';

    if (costData.totalRows > 0) {
        estimatesHtml += `<div class="cost-item"><span class="cost-label">Total Rows</span><span class="cost-value">${costData.totalRows.toLocaleString()}</span></div>`;
    }

    if (costData.validatedColumnsCount) {
        estimatesHtml += `<div class="cost-item"><span class="cost-label">Columns to Validate</span><span class="cost-value">${costData.validatedColumnsCount}</span></div>`;
    }

    if (costData.totalAICalls > 0) {
        estimatesHtml += `<div class="cost-item"><span class="cost-label">Total AI Calls</span><span class="cost-value">${costData.totalAICalls.toLocaleString()}</span></div>`;
    }

    if (costData.estimatedTime > 0) {
        estimatesHtml += `<div class="cost-item"><span class="cost-label">Est. Time</span><span class="cost-value">${Math.ceil(costData.estimatedTime / 60)} min</span></div>`;
    }

    // Display cost with discount if applicable
    if (costData.estimatedCost !== undefined) {
        if (costData.discount > 0) {
            estimatesHtml += `<div class="cost-item"><span class="cost-label">Cost → Discounted</span><span class="cost-value"><span style="text-decoration: line-through; color: #999;">$${costData.estimatedCost.toFixed(2)}</span> → $${costData.effectiveCost.toFixed(2)}</span></div>`;
        } else {
            estimatesHtml += `<div class="cost-item"><span class="cost-label">Cost</span><span class="cost-value">$${costData.estimatedCost.toFixed(2)}</span></div>`;
        }
    }

    // Add account balance information if available
    if (costData.accountInfo) {
        const currentBalance = costData.accountInfo.current_balance || 0;
        const sufficientBalance = costData.accountInfo.sufficient_balance ?? true;
        const creditsNeeded = costData.accountInfo.credits_needed || 0;

        estimatesHtml += `<hr style="margin: 10px 0; border: none; border-top: 1px solid #eee;">`;
        estimatesHtml += `<div class="cost-item"><span class="cost-label">Your Balance</span><span class="cost-value">$${currentBalance.toFixed(2)}</span></div>`;

        if (!sufficientBalance && creditsNeeded > 0) {
            estimatesHtml += `<div class="cost-item"><span class="cost-label" style="color: #f44336;">Credits Needed</span><span class="cost-value" style="color: #f44336;">$${creditsNeeded.toFixed(2)}</span></div>`;
        }
    }

    estimatesEl.innerHTML = estimatesHtml;
}

/**
 * Hide cost estimates in table view card

/* ========== 18-viewer-mode.js ========== */

/* ========================================
 * 18-viewer-mode.js - Results Viewer Mode
 *
 * Provides standalone viewer for validation results.
 * Can be used as:
 * 1. Standalone mode via URL: ?mode=viewer&session=xxx&version=1
 * 2. As a card within the app: createResultsViewerCard(options)
 *
 * Dependencies: 00-config.js, 04-cards.js, 07-email-validation.js,
 *               16-interactive-table.js, 17-table-view-card.js
 * ======================================== */

/**
 * Initialize viewer mode (called from 99-init.js when mode=viewer detected)
 * Requires email validation, then loads and displays the results
 */
function initViewerMode() {
    const params = getViewerParams();

    // Validate we have required parameters
    if (!params.session && !params.path) {
        // No session or path specified - show error
        const cardId = generateCardId();
        createCard({
            id: cardId,
            icon: '⚠️',
            title: 'Missing Parameters',
            subtitle: 'No results specified',
            content: `
                <div class="message message-error">
                    <span class="message-icon">⚠️</span>
                    <span>Please provide a session ID or path in the URL.</span>
                </div>
                <p style="margin-top: 1rem; color: var(--text-secondary);">
                    Example: <code>?mode=viewer&session=session_20240124_abc123</code>
                </p>
            `
        });
        return;
    }

    // Require email validation before showing results
    requireEmailThen(() => {
        loadAndDisplayResults(params);
    }, 'view your results');
}

/**
 * Load results from API or local file and display in viewer card
 * @param {Object} params - { session, version, path }
 */
async function loadAndDisplayResults(params) {
    // Create the viewer card
    const { cardId } = createResultsViewerCard({
        title: 'Validation Results',
        subtitle: params.session ? `Session: ${params.session}` : (params.path || 'Loading...'),
        infoHeaderText: 'View your validation results. Click cells for details, or download the full Excel file.'
    });

    // Show loading state
    showThinkingInCard(cardId, 'Loading results...', true);

    try {
        let data;

        // If path parameter provided and looks like a local file, try loading directly
        if (params.path && (params.path.endsWith('.json') || params.path.startsWith('./'))) {
            console.log('[VIEWER] Loading from local path:', params.path);
            const response = await fetch(params.path);
            if (!response.ok) {
                throw new Error(`Failed to load local file: ${response.status}`);
            }
            const table_metadata = await response.json();
            data = {
                success: true,
                table_metadata,
                table_name: params.path.split('/').pop().replace('.json', '')
            };
        } else {
            const requestBody = {
                action: 'getViewerData',
                session_id: params.session,
                version: params.version,
                path: params.path
            };

            const response = await fetch(`${API_BASE}/validate`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(requestBody)
            });

            data = await response.json();

            // SECURITY: Handle token revocation
            if (data.token_revoked) {
                console.error('[SECURITY] Token revoked by server - clearing session');

                // Clear session data
                localStorage.removeItem('sessionToken');
                sessionStorage.removeItem('validatedEmail');
                globalState.sessionToken = null;
                globalState.email = null;

                // Hide signed-in badge if function exists
                if (typeof hideSignedInBadge === 'function') {
                    hideSignedInBadge();
                }

                // Show security warning
                hideThinkingInCard(cardId);
                updateCardContent(cardId, `
                    <div class="message message-error">
                        <span class="message-icon">⚠️</span>
                        <span><strong>Security Alert:</strong> ${data.error || 'Your session has been revoked due to suspicious activity.'}</span>
                    </div>
                    <div style="margin-top: 1rem; color: var(--text-secondary);">
                        <p>Please validate your email again to continue.</p>
                        <button onclick="location.reload()" style="margin-top: 1rem;">
                            Reload Page
                        </button>
                    </div>
                `);
                return;
            }

            if (!response.ok || !data.success) {
                throw new Error(data.error || data.message || 'Failed to load results');
            }
        }

        // Hide loading indicator
        completeThinkingInCard(cardId, 'Results loaded');

        // Debug: log the data received from API
        console.log('[VIEWER] Data received:', {
            clean_table_name: data.clean_table_name,
            table_name: data.table_name,
            analysis_date: data.analysis_date,
            is_full_validation: data.is_full_validation,
            version: data.version
        });

        // Update card title and subtitle with clean table name and date
        const card = document.getElementById(cardId);
        console.log('[VIEWER] Card element:', card, 'cardId:', cardId);

        if (card) {
            // Use clean_table_name for the title if available
            const displayName = data.clean_table_name || data.table_name || 'Validation Results';
            const titleEl = card.querySelector('.card-title');
            console.log('[VIEWER] Title element:', titleEl, 'displayName:', displayName);
            if (titleEl) {
                titleEl.textContent = displayName;
            }

            // Build subtitle with analysis date and validation type
            let subtitleParts = [];
            if (data.analysis_date) {
                const dateObj = new Date(data.analysis_date);
                const formattedDate = dateObj.toLocaleDateString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });
                subtitleParts.push(`Analyzed: ${formattedDate}`);
            }
            if (data.is_full_validation !== undefined) {
                subtitleParts.push(data.is_full_validation ? 'Full Validation' : 'Preview');
            }
            if (data.version) {
                subtitleParts.push(`v${data.version}`);
            }
            console.log('[VIEWER] Subtitle parts:', subtitleParts);

            const subtitle = card.querySelector('.card-subtitle');
            console.log('[VIEWER] Subtitle element:', subtitle);
            if (subtitle && subtitleParts.length > 0) {
                subtitle.textContent = subtitleParts.join(' • ');
                console.log('[VIEWER] Updated subtitle to:', subtitleParts.join(' • '));
            } else if (!subtitle) {
                console.warn('[VIEWER] No subtitle element found, creating one');
                // Create subtitle if it doesn't exist
                const headerDiv = card.querySelector('.card-header > div:nth-child(2)');
                if (headerDiv) {
                    const newSubtitle = document.createElement('p');
                    newSubtitle.className = 'card-subtitle';
                    newSubtitle.textContent = subtitleParts.join(' • ');
                    headerDiv.appendChild(newSubtitle);
                }
            }
        }

        // Display results in the card
        await displayResultsInCard(cardId, data);

    } catch (error) {
        console.error('[VIEWER] Error loading results:', error);
        completeThinkingInCard(cardId, 'Error loading results');
        showMessage(`${cardId}-messages`, `Error: ${error.message}`, 'error');
    }
}

/**
 * Create a results viewer card (can be called from anywhere in the app)
 *
 * @param {Object} options - Card options
 * @param {string} options.cardId - Optional explicit card ID
 * @param {string} options.title - Card title (default: 'Validation Results')
 * @param {string} options.subtitle - Card subtitle
 * @param {string} options.infoHeaderText - Info header text
 * @param {Object} options.tableMetadata - Optional pre-loaded table metadata
 * @param {string} options.downloadUrl - Optional download URL
 * @returns {Object} { cardId, element }
 */
function createResultsViewerCard(options = {}) {
    const cardId = options.cardId || generateCardId();

    const content = `
        <div id="${cardId}-info-header" class="message message-info" style="display: flex;">
            <span class="message-icon">ℹ️</span>
            <span id="${cardId}-info-text">${options.infoHeaderText || 'View your validation results below.'}</span>
        </div>
        <div id="${cardId}-table-container"></div>
        <div id="${cardId}-buttons" class="card-buttons"></div>
        <div id="${cardId}-messages"></div>
    `;

    const card = createCard({
        id: cardId,
        icon: '📊',
        title: options.title || 'Validation Results',
        subtitle: options.subtitle || '',
        content,
        buttons: []  // Buttons added after data loads
    });

    // If pre-loaded metadata provided, display immediately
    if (options.tableMetadata) {
        displayResultsInCard(cardId, {
            table_metadata: options.tableMetadata,
            download_url: options.downloadUrl
        });
    }

    return { cardId, element: card };
}

/**
 * Display results data in a viewer card
 *
 * @param {string} cardId - Card ID to update
 * @param {Object} data - Results data from API
 * @param {Object} data.table_metadata - Table metadata for InteractiveTable
 * @param {boolean} data.metadata_too_large - If true, metadata needs to be fetched separately
 * @param {string} data.download_url - URL to download Excel file
 * @param {string} data.enhanced_download_url - Alternative download URL
 * @param {string} data.json_download_url - URL to download JSON metadata
 */
async function displayResultsInCard(cardId, data) {
    const container = document.getElementById(`${cardId}-table-container`);
    if (!container) {
        console.error(`[VIEWER] Container ${cardId}-table-container not found`);
        return;
    }

    // Update the info header with analysis date if available
    const infoText = document.getElementById(`${cardId}-info-text`);
    if (infoText && data.analysis_date) {
        const dateObj = new Date(data.analysis_date);
        const formattedDate = dateObj.toLocaleDateString('en-US', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
        const validationType = data.is_full_validation ? 'Full validation' : 'Preview';
        infoText.innerHTML = `<strong>${validationType} completed ${formattedDate}</strong>. Click cells for details, or download the results.`;
    }

    // If metadata was too large to include inline, fetch it from S3
    if (data.metadata_too_large && data.json_download_url && !data.table_metadata) {
        console.log('[VIEWER] Metadata too large, fetching from:', data.json_download_url);
        container.innerHTML = '<p class="table-loading-message">Loading table data...</p>';

        try {
            const response = await fetch(data.json_download_url);
            if (!response.ok) {
                throw new Error(`Failed to fetch metadata: ${response.status}`);
            }
            data.table_metadata = await response.json();
            console.log('[VIEWER] Successfully fetched large metadata from S3');
        } catch (error) {
            console.error('[VIEWER] Error fetching metadata:', error);
            container.innerHTML = `<p class="table-empty-message">Error loading table data: ${error.message}</p>`;
            // Still show download buttons even if table fails to load
            _renderViewerButtons(cardId, data);
            return;
        }
    }

    // Render table if metadata available
    if (data.table_metadata && typeof InteractiveTable !== 'undefined') {
        const tableHtml = InteractiveTable.render(data.table_metadata, {
            showGeneralNotes: true,
            showLegend: true
        });
        container.innerHTML = tableHtml;
        InteractiveTable.init();
    } else if (data.markdown_table) {
        // Fallback to markdown table
        container.innerHTML = renderMarkdown(data.markdown_table);
    } else {
        container.innerHTML = '<p class="table-empty-message">No table data available.</p>';
    }

    // Render download and action buttons
    _renderViewerButtons(cardId, data);
}

/**
 * Helper function to render viewer buttons
 * Extracted to allow reuse in error scenarios
 */
function _renderViewerButtons(cardId, data) {
    // Determine download URLs
    const excelUrl = data.enhanced_download_url || data.download_url;
    const jsonUrl = data.json_download_url;

    // Build download buttons
    const buttons = [
        {
            text: 'Download Excel',
            icon: '📥',
            variant: 'primary',
            callback: async (e) => {
                const button = e.target.closest('button');
                if (excelUrl) {
                    markButtonSelected(button, '📥 Downloading...');
                    window.location.href = excelUrl;
                    setTimeout(() => markButtonUnselected(button), 2000);
                } else {
                    // Request download URL from API
                    await downloadResultsViaApi(cardId, button, 'excel');
                }
            }
        },
        {
            text: 'Download JSON',
            icon: '📋',
            variant: 'secondary',
            callback: async (e) => {
                const button = e.target.closest('button');
                if (jsonUrl) {
                    markButtonSelected(button, '📋 Downloading...');
                    window.location.href = jsonUrl;
                    setTimeout(() => markButtonUnselected(button), 2000);
                } else if (data.table_metadata) {
                    // Generate JSON download from current metadata
                    downloadJsonMetadata(data.table_metadata, button);
                } else {
                    await downloadResultsViaApi(cardId, button, 'json');
                }
            }
        },
        {
            text: 'Share Table',
            icon: '🔗',
            variant: 'quaternary',
            callback: async (e) => {
                const button = e.target.closest('button');
                await handleShareTable(cardId, button, data);
            }
        },
        {
            text: 'Update Table',
            icon: '🔄',
            variant: 'tertiary',
            callback: async (e) => {
                const button = e.target.closest('button');
                await handleUpdateTable(cardId, button, data);
            }
        }
    ];

    createButtonRow(`${cardId}-buttons`, buttons);
}

/**
 * Download table metadata as JSON file
 * @param {Object} metadata - Table metadata object
 * @param {HTMLElement} button - Button element for state updates
 */
function downloadJsonMetadata(metadata, button) {
    try {
        markButtonSelected(button, '📋 Preparing...');

        const jsonStr = JSON.stringify(metadata, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'table_metadata.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        markButtonSelected(button, '📋 Downloaded!');
        setTimeout(() => markButtonUnselected(button), 2000);
    } catch (error) {
        console.error('[VIEWER] JSON download error:', error);
        markButtonUnselected(button);
    }
}

/**
 * Download results via API call (when direct URL not available)
 *
 * @param {string} cardId - Card ID for showing messages
 * @param {HTMLElement} button - Button element to update state
 * @param {string} fileType - Type of file to download: 'excel' or 'json'
 */
async function downloadResultsViaApi(cardId, button, fileType = 'excel') {
    const params = getViewerParams();
    const icon = fileType === 'json' ? '📋' : '📥';

    try {
        markButtonSelected(button, `${icon} Preparing download...`);

        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'getViewerData',
                email: globalState.email,
                session_id: params.session || globalState.sessionId,
                version: params.version
            })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
            throw new Error(data.error || 'Failed to get download URL');
        }

        // Get appropriate download URL
        let downloadUrl;
        if (fileType === 'json') {
            downloadUrl = data.json_download_url;
            // Fallback: generate from metadata if no URL provided
            if (!downloadUrl && data.table_metadata) {
                downloadJsonMetadata(data.table_metadata, button);
                return;
            }
        } else {
            downloadUrl = data.enhanced_download_url || data.download_url;
        }

        if (!downloadUrl) {
            throw new Error(`No ${fileType} download available`);
        }

        // Trigger download
        window.location.href = downloadUrl;
        markButtonSelected(button, `${icon} Downloading...`);
        setTimeout(() => markButtonUnselected(button), 2000);

    } catch (error) {
        console.error('[VIEWER] Download error:', error);
        showMessage(`${cardId}-messages`, `Download failed: ${error.message}`, 'error');
        markButtonUnselected(button);
    }
}

/**
 * Show full validation results after processing completes
 * Called from validation flow when results are ready
 *
 * @param {Object} validationData - Full validation result data
 * @param {Object} validationData.table_metadata - Table metadata
 * @param {string} validationData.download_url - Download URL
 * @param {string} validationData.table_name - Table name for subtitle
 * @param {number} validationData.row_count - Number of rows processed
 */
function showFullValidationResults(validationData) {
    const { cardId } = createResultsViewerCard({
        title: 'Validation Complete',
        subtitle: validationData.table_name
            ? `${validationData.table_name} - ${validationData.row_count || ''} rows`
            : 'Your results are ready',
        infoHeaderText: 'Validation complete! Review your results below or download the full Excel file.',
        tableMetadata: validationData.table_metadata,
        downloadUrl: validationData.enhanced_download_url || validationData.download_url
    });

    // Show success message
    showMessage(`${cardId}-messages`, 'Validation completed successfully!', 'success');

    return cardId;
}

/**
 * Load demo table from S3 demos folder
 * @param {string} tableName - Name of the demo table to load
 */
async function loadAndDisplayDemo(tableName) {
    // Create the viewer card
    const { cardId } = createResultsViewerCard({
        title: 'Demo Table',
        subtitle: `Loading ${tableName}...`,
        infoHeaderText: 'Explore this demo table. Click cells for details.'
    });

    // Show loading state
    showThinkingInCard(cardId, 'Loading demo...', true);

    try {
        // Call backend to get demo data (no email required)
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'getDemoData',
                table_name: tableName
            })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
            throw new Error(data.error || 'Demo not found');
        }

        // Hide loading indicator
        completeThinkingInCard(cardId, 'Demo loaded');

        // Update card title and subtitle with actual data
        const card = document.getElementById(cardId);
        if (card) {
            const titleEl = card.querySelector('.card-title');
            if (titleEl) {
                titleEl.textContent = data.clean_table_name || tableName;
            }

            // Build subtitle with date info
            const subtitleEl = card.querySelector('.card-subtitle');
            if (subtitleEl) {
                let subtitleParts = [];
                // Use analysis_date if available, otherwise shared_at
                const dateStr = data.analysis_date || data.shared_at;
                if (dateStr) {
                    const dateObj = new Date(dateStr);
                    const formattedDate = dateObj.toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                    subtitleParts.push(data.analysis_date ? `Analyzed: ${formattedDate}` : `Shared: ${formattedDate}`);
                }
                subtitleParts.push('Publicly Shared');
                subtitleEl.textContent = subtitleParts.join(' • ');
            }
        }

        // Display demo results with special button handling
        displayDemoResultsInCard(cardId, data, tableName);

    } catch (error) {
        console.error('[DEMO] Error loading demo:', error);
        completeThinkingInCard(cardId, 'Error loading demo');
        showMessage(`${cardId}-messages`, `Error: ${error.message}`, 'error');
    }
}

/**
 * Display demo results with special button handling
 * Downloads work without email, "Create Your Own Table" requires email
 *
 * @param {string} cardId - Card ID to update
 * @param {Object} data - Demo data from API
 * @param {string} tableName - Original table name for downloads
 */
function displayDemoResultsInCard(cardId, data, tableName) {
    const container = document.getElementById(`${cardId}-table-container`);
    if (!container) {
        console.error(`[DEMO] Container ${cardId}-table-container not found`);
        return;
    }

    // Update the info header with table name and date
    const infoText = document.getElementById(`${cardId}-info-text`);
    if (infoText) {
        const displayName = data.clean_table_name || tableName || 'Shared Table';
        let infoHtml = `<strong>${displayName}</strong>`;

        // Add date context if available
        const dateStr = data.analysis_date || data.shared_at;
        if (dateStr) {
            const dateObj = new Date(dateStr);
            const formattedDate = dateObj.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            infoHtml += ` - ${data.analysis_date ? 'Validated' : 'Shared'} ${formattedDate}`;
        }

        infoHtml += '. Click cells for details, or download Excel/JSON.';
        infoText.innerHTML = infoHtml;
    }

    // Render table if metadata available

        const tableHtml = InteractiveTable.render(data.table_metadata, {
            showGeneralNotes: true,
            showLegend: true
        });
        container.innerHTML = tableHtml;
        InteractiveTable.init();
    } else {
        container.innerHTML = '<p class="table-empty-message">No table data available.</p>';
        // Still show "Create Your Own" button even if no table data
    }

    // Detect reference check table by checking first 2 column names
    const columns = data.table_metadata?.columns || [];
    const colNames = columns.slice(0, 2).map(c => (c.name || '').toLowerCase().trim());
    const isReferenceCheckDemo = colNames.includes('claim id') && colNames.includes('claim order');

    // Build buttons - Create Your Own requires email
    const excelUrl = data.enhanced_download_url || data.download_url;
    const buttons = [];

    if (excelUrl) {
        buttons.push({
            text: 'Download Excel (for Humans)',
            icon: '📥',
            variant: 'secondary',
            callback: (e) => {
                const button = e.target.closest('button');
                markButtonSelected(button, '📥 Downloaded!');
                window.location.href = excelUrl;
                setTimeout(() => markButtonUnselected(button), 2000);
            }
        });
    }

    buttons.push({
        text: 'Download JSON (for AI)',
        icon: '📋',
        variant: 'quaternary',
        callback: (e) => {
            const button = e.target.closest('button');
            downloadJsonMetadata(data.table_metadata, button);
        }
    });

    buttons.push({
        text: isReferenceCheckDemo ? 'Validate New Text' : 'Create Your Own Table',
        icon: isReferenceCheckDemo ? '🔍' : '✨',
        variant: 'primary',
        callback: () => {
            if (isReferenceCheckDemo && typeof createReferenceCheckCard === 'function') {
                // Kick into reference check mode
                requireEmailThen(() => {
                    createReferenceCheckCard();
                }, 'validate text');
            } else if (typeof createUploadOrDemoCard === 'function') {
                createUploadOrDemoCard();
            } else {
                // Fallback: redirect to main app
                window.location.href = window.location.pathname;
            }
        }
    });

    createButtonRow(`${cardId}-buttons`, buttons);
}

/**
 * Handle the Update Table button click.
 * Creates a new validation session from the current enhanced results.
 *
 * @param {string} cardId - Card ID for showing messages
 * @param {HTMLElement} button - Button element for state updates
 * @param {Object} data - Results data containing session info
 */
async function handleUpdateTable(cardId, button, data) {
    const params = getViewerParams();

    try {
        markButtonSelected(button, '🔄 Creating session...');

        // Call backend to create update session
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'createUpdateSession',
                email: globalState.email,
                source_session_id: params.session || data.session_id,
                source_version: params.version || data.version
            })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.error || 'Failed to create update session');
        }

        console.log('[VIEWER] Update session created:', result.new_session_id);

        // Warn if only preview data was available
        if (result.used_preview_data) {
            console.warn('[VIEWER] Using preview data - full validation not found');
            showMessage(`${cardId}-messages`,
                'Warning: Using preview data. Run a full validation first for complete results.', 'warning');
        }

        // Update global state for new session
        globalState.sessionId = result.new_session_id;
        globalState.excelFileUploaded = true;
        globalState.configStored = result.config_copied;
        globalState.activePreviewCard = null;

        markButtonSelected(button, '🔄 Starting preview...');
        showMessage(`${cardId}-messages`,
            'New session created. Starting preview...', 'success');

        // Clear viewer URL params and trigger preview after a short delay
        setTimeout(() => {
            // Remove viewer mode params from URL
            window.history.replaceState({}, '', window.location.pathname);

            // Create and start the preview card
            if (typeof createPreviewCard === 'function') {
                createPreviewCard();
            } else {
                console.error('[VIEWER] createPreviewCard function not available');
                showMessage(`${cardId}-messages`,
                    'Session created but preview could not start automatically. Please refresh the page.', 'warning');
            }
        }, 1000);

    } catch (error) {
        console.error('[VIEWER] Update table error:', error);
        showMessage(`${cardId}-messages`, `Update failed: ${error.message}`, 'error');
        markButtonUnselected(button);
    }
}

/**
 * Handle the Share Table button click.
 * Checks if already shared, then shows dialog with share/unshare/copy-link options.
 *
 * @param {string} cardId - Card ID for showing messages (can be null for completion card)
 * @param {HTMLElement} button - Button element for state updates
 * @param {Object} data - Results data containing session info
 */
async function handleShareTable(cardId, button, data) {
    const params = getViewerParams();
    const sessionId = params.session || data.session_id || globalState.sessionId;
    const messagesId = cardId ? `${cardId}-messages` : null;

    if (!sessionId) {
        if (messagesId) showMessage(messagesId, 'No session ID available to share.', 'error');
        return;
    }

    // Check current share status first
    markButtonSelected(button, '🔗 Checking...');
    let shareStatus = null;
    try {
        const statusResp = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({ action: 'checkShareStatus', session_id: sessionId })
        });
        const statusData = await statusResp.json();
        if (statusData.success) {
            shareStatus = statusData;
        }
    } catch (err) {
        console.warn('[SHARE] Could not check share status:', err);
    }
    markButtonUnselected(button);

    const isCurrentlyShared = shareStatus && shareStatus.is_shared;
    const existingDemoName = isCurrentlyShared ? shareStatus.table_name : null;

    // Show dialog with appropriate options
    const action = await showShareConfirmationDialog(isCurrentlyShared, existingDemoName);
    if (!action) return; // cancelled

    if (action === 'copy') {
        // Copy existing link
        const shareUrl = `https://eliyahu.ai/viewer?demo=${existingDemoName}`;
        try {
            await navigator.clipboard.writeText(shareUrl);
            if (messagesId) showMessage(messagesId,
                `Link copied! <a href="${shareUrl}" target="_blank" style="color: inherit; text-decoration: underline;">${shareUrl}</a>`,
                'success');
        } catch (clipErr) {
            if (messagesId) showMessage(messagesId,
                `Share link: <a href="${shareUrl}" target="_blank" style="color: inherit; text-decoration: underline;">${shareUrl}</a>`,
                'success');
        }
        return;
    }

    if (action === 'unshare') {
        try {
            markButtonSelected(button, '🔗 Removing...');
            const resp = await fetch(`${API_BASE}/validate`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify({
                    action: 'unshareTable',
                    session_id: sessionId,
                    table_name: existingDemoName
                })
            });
            const result = await resp.json();
            if (!resp.ok || !result.success) {
                throw new Error(result.error || 'Failed to unshare');
            }
            if (messagesId) showMessage(messagesId, 'Table is no longer shared publicly.', 'success');
            markButtonSelected(button, '🔗 Unshared');
            setTimeout(() => {
                markButtonUnselected(button);
                const btnText = button.querySelector('.button-text');
                if (btnText) btnText.textContent = '🔗 Share Table';
            }, 2000);
        } catch (error) {
            console.error('[SHARE] Unshare error:', error);
            if (messagesId) showMessage(messagesId, `Unshare failed: ${error.message}`, 'error');
            markButtonUnselected(button);
        }
        return;
    }

    // action === 'share'
    try {
        markButtonSelected(button, '🔗 Sharing...');

        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'shareTable',
                session_id: sessionId,
                version: params.version || data.version
            })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.error || 'Failed to share table');
        }

        // Build the share URL
        const shareUrl = `https://eliyahu.ai/viewer?demo=${result.table_name}`;

        // Copy to clipboard
        try {
            await navigator.clipboard.writeText(shareUrl);
            if (messagesId) showMessage(messagesId,
                `Share link copied to clipboard! <a href="${shareUrl}" target="_blank" style="color: inherit; text-decoration: underline;">${shareUrl}</a>`,
                'success');
        } catch (clipErr) {
            console.warn('[SHARE] Clipboard write failed:', clipErr);
            if (messagesId) showMessage(messagesId,
                `Share link: <a href="${shareUrl}" target="_blank" style="color: inherit; text-decoration: underline;">${shareUrl}</a> (copy manually)`,
                'success');
        }

        markButtonSelected(button, '🔗 Shared! Link copied');
        setTimeout(() => {
            markButtonUnselected(button);
            const btnText = button.querySelector('.button-text');
            if (btnText) btnText.textContent = '🔗 Share Table';
        }, 3000);

    } catch (error) {
        console.error('[SHARE] Error:', error);
        if (messagesId) showMessage(messagesId, `Share failed: ${error.message}`, 'error');
        markButtonUnselected(button);
    }
}

        // This is checked synchronously before any async operations
        let _isPageReloadResult = null;

        function isPageReload() {
            // Return cached result if already computed
            if (_isPageReloadResult !== null) {
                return _isPageReloadResult;
            }

            // Method 1: Use Performance Navigation API (most reliable)
            // PerformanceNavigationTiming.type: 'reload', 'navigate', 'back_forward', 'prerender'
            try {
                const navEntries = performance.getEntriesByType('navigation');
                if (navEntries && navEntries.length > 0) {
                    const navType = navEntries[0].type;
                    if (navType === 'reload') {
                        console.log('[NAV] Reload detected via Performance API');
                        _isPageReloadResult = true;
                        return true;
                    }
                    if (navType === 'back_forward') {
                        console.log('[NAV] Back/forward detected via Performance API');
                        _isPageReloadResult = false;
                        return false;
                    }
                    // 'navigate' or 'prerender' = fresh load
                    if (navType === 'navigate' || navType === 'prerender') {
                        console.log('[NAV] Fresh navigation detected via Performance API');
                        _isPageReloadResult = false;
                        return false;
                    }

                console.warn('[NAV] Performance API not available, using fallback');
            }

            // Method 2: Fallback to timing-based detection
            const navTimestamp = sessionStorage.getItem('hyperplexity_nav_timestamp');
            if (!navTimestamp) {

                return false;

            const timeSinceNav = Date.now() - parseInt(navTimestamp, 10);

            const isReload = timeSinceNav < 1000;

            _isPageReloadResult = isReload;
            return isReload;
        }

                    // Escape cells containing commas or quotes
                    if (cell.includes(',') || cell.includes('"') || cell.includes('\n')) {

        document.addEventListener('visibilitychange', () => {
if (!document.hidden) {
    // Tab became visible, checking connections

    // Reconnect any disconnected WebSockets
    sessionWebSockets.forEach((ws, sessionId) => {
        if (ws.readyState !== WebSocket.OPEN && ws.readyState !== WebSocket.CONNECTING) {
            // Reconnecting WebSocket
            sessionWebSockets.delete(sessionId);
            connectToSession(sessionId, 0); // Reset reconnect attempts
        }
    });

    // Small delay to ensure state is ready
    setTimeout(() => {
        // Don't attempt restoration if:
        // - This is a page reload (user explicitly refreshed)
        // - Initial restore decision was already made (page just loaded)
        // - Already have valuable data displayed
        // - User is in the middle of resetting
        // - Cards are already present in the DOM (user just alt-tabbed, not navigated away)
        const existingCards = document.querySelectorAll('[id^="card-"]');

        if (IS_PAGE_RELOAD || window.initialRestoreDecisionMade || hasValuableData() || window.isResetting || hasVisibleCards) {

        // ============================================
        // STATE RECOVERY FUNCTIONS
        // Saves state when validation stalls (warning shown)
        // Allows replay of missed messages after page refresh
        // ============================================

        /**
         * Save restorable state for recovery after page refresh.
         * Called when validator appears stalled or on deliberate state save.
         */
        function saveRestorableState(cardId, phase) {
            try {
                const sessionId = globalState.sessionId;
                if (!sessionId) {
                    return;
                }

                // Get last received sequences from message queue
                const lastSeqs = (typeof messageQueueState !== 'undefined')
                    ? messageQueueState.lastReceivedSeq
                    : {};

                const restorableState = {
                    sessionId: sessionId,
                    cardId: cardId,
                    phase: phase || globalState.workflowPhase,
                    workflowPhase: globalState.workflowPhase,
                    email: globalState.email,
                    lastSeqs: lastSeqs,
                    timestamp: Date.now(),
                    warningTriggered: true
                };

                sessionStorage.setItem('hyperplexity_restorable_state', JSON.stringify(restorableState));

                // Also save message queue state if available
                if (typeof saveMessageQueueState === 'function') {
                    saveMessageQueueState();
                }
            } catch (e) {
                console.error('[RESTORE] Error saving restorable state:', e);
            }
        }

        /**
         * Check if we have restorable state from a previous warning.
         * Returns the state if valid and recent (< 30 minutes).
         */
        function getRestorableState() {
            try {
                const saved = sessionStorage.getItem('hyperplexity_restorable_state');
                if (!saved) return null;

                const state = JSON.parse(saved);
                const age = Date.now() - (state.timestamp || 0);
                const maxAge = 30 * 60 * 1000; // 30 minutes

                if (age > maxAge) {
                    sessionStorage.removeItem('hyperplexity_restorable_state');
                    return null;
                }

                return state;
            } catch (e) {
                console.error('[RESTORE] Error reading restorable state:', e);
                return null;
            }
        }

        /**
         * Attempt to restore state after page reload following a validation warning.
         * This handles the specific case where the validator appeared stalled.
         * Returns true if restoration was initiated.
         */
        async function attemptWarningBasedRestore() {
            const state = getRestorableState();
            if (!state || !state.warningTriggered) {
                return false;
            }

            // Clear the saved state so we don't restore again
            sessionStorage.removeItem('hyperplexity_restorable_state');

            // Restore global state
            globalState.sessionId = state.sessionId;
            globalState.email = state.email;
            globalState.workflowPhase = state.workflowPhase;

            // Restore message queue last sequences
            if (state.lastSeqs && typeof messageQueueState !== 'undefined') {
                messageQueueState.lastReceivedSeq = state.lastSeqs;
            }

            // Connect to WebSocket and fetch missed messages
            try {
                if (typeof connectToSession === 'function') {
                    connectToSession(state.sessionId);
                }

                // Fetch missed messages since last known sequence
                const seqValues = Object.values(state.lastSeqs || {});
                const minSeq = seqValues.length > 0 ? Math.min(...seqValues) : 0;

                if (typeof getAllMessagesSince === 'function') {
                    const result = await getAllMessagesSince(state.sessionId, minSeq);

                    // Process each message through the replay dispatcher
                    for (const msg of result.messages) {
                        const msgData = msg.message_data || msg;
                        if (typeof dispatchReplayedMessage === 'function') {
                            dispatchReplayedMessage(msgData);
                        }
                    }
                }

                // Show recovery message in main container
                const mainMessages = document.getElementById('main-messages');
                if (mainMessages) {
                    showMessage('main-messages', `
                        <strong>Session Restored</strong><br>
                        Reconnected to your validation session. Processing resumed.
                    `, 'success', true, 'restore-success');
                }

                return true;
            } catch (e) {
                console.error('[RESTORE] Error during warning-based state restore:', e);
                return false;
            }
        }

        // Export restore functions globally
        window.saveRestorableState = saveRestorableState;
        window.getRestorableState = getRestorableState;
        window.attemptWarningBasedRestore = attemptWarningBasedRestore;
