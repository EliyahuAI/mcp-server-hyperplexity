function handleTickerUpdate(data) {
    if (!data || typeof data !== 'object') {
        return;
    }

    // Handle ticker_update WebSocket messages
    const tickerMessage = {
        priority: data.priority || 4,
        row_ids: data.row_ids || '',
        column: data.column || '',
        final_value: data.final_value || '',
        confidence_emoji: data.confidence_emoji || '🟢',
        timestamp: new Date().toISOString(),
        key: `${data.row_ids || ''}|${data.column || ''}`, // Unique key for deduplication
        seen: false // Track if message has been displayed
    };

    // Deduplicate: check if message with same key already exists
    const existingIndex = globalState.tickerMessages.findIndex(msg => msg.key === tickerMessage.key);

    if (existingIndex !== -1) {
        // Message exists - replace if new one has higher priority or is more recent
        const existing = globalState.tickerMessages[existingIndex];
        if (tickerMessage.priority > existing.priority ||
            (tickerMessage.priority === existing.priority && tickerMessage.timestamp > existing.timestamp)) {
            // Preserve 'seen' status - if old message was seen, keep it seen
            tickerMessage.seen = existing.seen;
            globalState.tickerMessages[existingIndex] = tickerMessage;
        }
    } else {
        // New message - add to queue
        globalState.tickerMessages.push(tickerMessage);
    }

    // Sort: unseen first, then by priority (high to low), then by timestamp (newest first)
    globalState.tickerMessages.sort((a, b) => {
        // Unseen messages come first
        if (a.seen !== b.seen) {
            return a.seen ? 1 : -1;
        }
        // Within same seen status, sort by priority
        if (a.priority !== b.priority) {
            return b.priority - a.priority; // Higher priority first
        }
        // Within same priority, sort by timestamp (newest first)
        return b.timestamp.localeCompare(a.timestamp);
    });

    // Keep only top 10 messages
    if (globalState.tickerMessages.length > 10) {
        globalState.tickerMessages = globalState.tickerMessages.slice(0, 10);
    }

    // Find active card (one with visible thinking indicator)
    let cardId = globalState.activeCardId;
    if (!cardId) {
        // Find any card with a visible progress indicator
        const cards = document.querySelectorAll('.card');
        for (const card of cards) {
            const indicator = card.querySelector('.thinking-indicator.with-progress');
            if (indicator && window.getComputedStyle(indicator).display !== 'none') {
                cardId = card.id;
                break;
            }
        }
    }

    // Update ticker display for active card
    if (cardId) {
        showTicker(cardId);
    }
}

function isPortraitMode() {
    // Check if device is in portrait orientation (matches CSS media query)
    return window.innerWidth < 768 && window.matchMedia('(orientation: portrait)').matches;
}

function truncateTickerText(text, maxLength) {
    if (!text) return '';
    if (text.length <= maxLength) return text;
    return text.substring(0, maxLength - 3) + '...';
}

function updateTickerDisplay(cardId) {
    if (!cardId) return;

    const tickerContent = document.getElementById(`${cardId}-ticker-content`);

    if (!tickerContent) {
        return;
    }

    if (globalState.tickerMessages.length === 0) {
        // No messages - hide ticker content
        tickerContent.classList.remove('visible');
        tickerContent.textContent = '';
        return;
    }

    // Show current message from queue
    const msg = globalState.tickerMessages[globalState.currentTickerIndex % globalState.tickerMessages.length];

    // Mark this message as seen
    if (!msg.seen) {
        msg.seen = true;
    }

    // Determine max lengths based on orientation
    const isPortrait = isPortraitMode();
    const maxRowIdsLength = isPortrait ? 40 : 100;
    const maxColumnLength = isPortrait ? 30 : 80;
    const maxValueLength = isPortrait ? 30 : 100;

    // Truncate components
    const rowIds = truncateTickerText(msg.row_ids, maxRowIdsLength);
    const column = truncateTickerText(msg.column.trim(), maxColumnLength);
    const finalValue = truncateTickerText(msg.final_value, maxValueLength);

    // Format: "Row IDs, Column: emoji Value"
    const displayText = `${rowIds}, ${column}: ${msg.confidence_emoji} ${finalValue}`;

    // Fade out
    tickerContent.classList.remove('visible');

    // Wait for fade out, then update text and fade in
    setTimeout(() => {
        tickerContent.textContent = displayText;
        tickerContent.classList.add('visible');
    }, 500); // Match CSS transition duration
}

function startTickerCycle(cardId) {
    if (!cardId) return;

    // Clear any existing interval
    if (globalState.tickerInterval) {
        clearInterval(globalState.tickerInterval);
    }

    // Reset index
    globalState.currentTickerIndex = 0;

    // Show first message immediately
    updateTickerDisplay(cardId);

    // Only cycle if there are multiple messages
    if (globalState.tickerMessages.length > 1) {
        // Cycle through messages every 3.5s (3s display + 0.5s transition)
        globalState.tickerInterval = setInterval(() => {
            globalState.currentTickerIndex++;
            updateTickerDisplay(cardId);
        }, 3500);
    }
}

function stopTickerCycle() {
    if (globalState.tickerInterval) {
        clearInterval(globalState.tickerInterval);
        globalState.tickerInterval = null;
    }
}

function showTicker(cardId) {
    if (!cardId) return;

    const tickerRow = document.getElementById(`${cardId}-ticker`);
    if (tickerRow && tickerRow.style.display === 'none') {
        tickerRow.style.display = 'block';
    }

    // Start or restart cycling based on message count
    if (globalState.tickerMessages.length > 0) {
        // If we have > 1 message and no interval, start cycling
        // If we have > 1 message and had 1 before, restart to enable cycling
        if (globalState.tickerMessages.length > 1 && !globalState.tickerInterval) {
            startTickerCycle(cardId);
        } else if (!globalState.tickerInterval && globalState.tickerMessages.length === 1) {
            // Just show the single message, don't cycle
            startTickerCycle(cardId);
        }
    }
}

function hideTicker(cardId) {
    if (!cardId) return;

    // Stop cycling
    stopTickerCycle();

    const tickerRow = document.getElementById(`${cardId}-ticker`);
    if (tickerRow) {
        tickerRow.style.display = 'none';
    }
}

/* ========== 03b-message-queue.js ========== */

/* ========================================
 * 03b-message-queue.js - Message Queue & Deduplication
 *
 * Manages WebSocket message ordering, deduplication, and replay
 * for state recovery after page refresh or connection interruption.
 *
 * Dependencies: 00-config.js
 * Loaded before: 03-websocket.js (provides processIncomingMessage)
 * ======================================== */

// Message queue state
const messageQueueState = {
    // Track last received sequence per card_id: { 'card-4': 10, 'validation': 5 }
    lastReceivedSeq: {},
    // Track all seen sequences for deduplication: { 'card-4': Set([1, 2, 3]) }
    seenSeqs: {},
    // Pending messages waiting for gaps to be filled: { 'card-4': [{ seq: 3, data: {...} }] }
    pendingMessages: {},
    // Whether we're currently fetching missed messages
    isFetching: false,
    // Maximum gap before triggering fetch (prevents fetching on initial messages)
    maxGapBeforeFetch: 5
};

/**
 * Process an incoming WebSocket message with sequence tracking.
 * Returns { shouldProcess: boolean, isOutOfOrder: boolean }
 */
function processIncomingMessage(data) {
    // Ensure sequence is an integer (may come as string from JSON/DynamoDB)
    const seq = data._seq !== undefined ? parseInt(data._seq, 10) : undefined;
    const cardId = data._card_id;

    // If no sequence metadata, process normally (legacy message)
    if (seq === undefined || isNaN(seq) || !cardId) {
        return { shouldProcess: true, isOutOfOrder: false };
    }

    // Initialize tracking for this card_id
    if (messageQueueState.seenSeqs[cardId] === undefined) {
        messageQueueState.seenSeqs[cardId] = new Set();
    }
    if (messageQueueState.lastReceivedSeq[cardId] === undefined) {
        messageQueueState.lastReceivedSeq[cardId] = 0;
    }

    // Check for duplicate
    if (messageQueueState.seenSeqs[cardId].has(seq)) {
        return { shouldProcess: false, isOutOfOrder: false };
    }

    // Mark as seen
    messageQueueState.seenSeqs[cardId].add(seq);

    const expectedSeq = messageQueueState.lastReceivedSeq[cardId] + 1;

    // Check for gap (missed messages)
    if (seq > expectedSeq) {
        const gap = seq - expectedSeq;

        // Only fetch if gap is reasonable
        if (gap <= messageQueueState.maxGapBeforeFetch) {
            // Queue this message and fetch missed ones
            if (!messageQueueState.pendingMessages[cardId]) {
                messageQueueState.pendingMessages[cardId] = [];
            }
            messageQueueState.pendingMessages[cardId].push({ seq, data });

            // Trigger fetch for missed messages
            fetchMissedMessages(cardId, messageQueueState.lastReceivedSeq[cardId], seq - 1);

            return { shouldProcess: false, isOutOfOrder: true };
        }

        // Gap too large - just reset and process this message
        messageQueueState.lastReceivedSeq[cardId] = seq;
        return { shouldProcess: true, isOutOfOrder: false };
    }

    // Normal case - in order
    messageQueueState.lastReceivedSeq[cardId] = seq;
    return { shouldProcess: true, isOutOfOrder: false };
}

/**
 * Fetch missed messages from the backend replay API.
 */
async function fetchMissedMessages(cardId, sinceSeq, toSeq) {
    if (messageQueueState.isFetching) {
        return;
    }

    if (!globalState.sessionId) {
        return;
    }

    messageQueueState.isFetching = true;

    try {
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'getMessagesForCard',
                session_id: globalState.sessionId,
                card_id: cardId,
                since_seq: sinceSeq,
                limit: 50
            })
        });

        const data = await response.json();

        if (data.success && data.messages && data.messages.length > 0) {

            // Process each missed message
            for (const msg of data.messages) {
                const msgData = msg.message_data || msg;
                // Ensure sequence is integer
                const msgSeq = parseInt(msg.message_seq || msgData._seq, 10);

                if (isNaN(msgSeq)) continue;

                // Mark as seen
                if (!messageQueueState.seenSeqs[cardId]) {
                    messageQueueState.seenSeqs[cardId] = new Set();
                }
                if (!messageQueueState.seenSeqs[cardId].has(msgSeq)) {
                    messageQueueState.seenSeqs[cardId].add(msgSeq);

                    // Dispatch to appropriate handler
                    dispatchReplayedMessage(msgData);
                }
            }

            // Update last received seq (ensure integer)
            messageQueueState.lastReceivedSeq[cardId] = parseInt(data.last_seq, 10) || 0;

            // Process any pending messages now that gaps are filled
            processPendingMessages(cardId);
        }
    } catch (error) {
        console.error('[MESSAGE_QUEUE] Error fetching missed messages:', error);
    } finally {
        messageQueueState.isFetching = false;
    }
}

/**
 * Process pending messages after gaps have been filled.
 */
function processPendingMessages(cardId) {
    const pending = messageQueueState.pendingMessages[cardId];
    if (!pending || pending.length === 0) return;

    // Sort by sequence
    pending.sort((a, b) => a.seq - b.seq);

    // Process messages in order
    const stillPending = [];
    for (const item of pending) {
        const expectedSeq = messageQueueState.lastReceivedSeq[cardId] + 1;

        if (item.seq === expectedSeq) {
            messageQueueState.lastReceivedSeq[cardId] = item.seq;
            dispatchReplayedMessage(item.data);
        } else if (item.seq > expectedSeq) {
            stillPending.push(item);
        }
        // If seq < expectedSeq, it's a duplicate - skip
    }

    messageQueueState.pendingMessages[cardId] = stillPending;
}

/**
 * Dispatch a replayed message to the appropriate handler.
 * This re-routes messages that were fetched from the replay API.
 */
function dispatchReplayedMessage(data) {

    // Dispatch based on message type
    const messageType = data.type || data.message_type;

    // Route to card handlers if registered
    if (typeof cardHandlers !== 'undefined' && cardHandlers.size > 0) {
        cardHandlers.forEach((handlerInfo, cardId) => {
            if (handlerInfo.messageTypes.includes(messageType)) {
                try {
                    handlerInfo.callback(data, cardId);
                } catch (e) {
                    console.error(`[MESSAGE_QUEUE] Error in replayed message handler for ${cardId}:`, e);
                }
            }
        });
    }

    // Route through the standard message router (defined in 03-websocket.js)
    if (typeof routeMessage === 'function') {
        try {
            const sessionId = globalState?.sessionId || data.session_id;
            routeMessage(data, sessionId);
        } catch (e) {
            console.error('[MESSAGE_QUEUE] Error routing replayed message:', e);
        }
    }
}

/**
 * Get all messages since a sequence number for a session (for state recovery).
 * Returns a promise that resolves with the messages.
 */
async function getAllMessagesSince(sessionId, sinceSeq = 0) {
    try {
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'getMessagesSince',
                session_id: sessionId,
                since_seq: sinceSeq,
                limit: 100
            })
        });

        const data = await response.json();

        if (data.success) {
            return {
                messages: data.messages || [],
                lastSeq: data.last_seq || sinceSeq,
                hasMore: data.has_more || false
            };
        }

        return { messages: [], lastSeq: sinceSeq, hasMore: false };
    } catch (error) {
        console.error('[MESSAGE_QUEUE] Error fetching all messages:', error);
        return { messages: [], lastSeq: sinceSeq, hasMore: false };
    }
}

/**
 * Reset message queue state for a specific card or all cards.
 */
function resetMessageQueue(cardId = null) {
    if (cardId) {
        delete messageQueueState.lastReceivedSeq[cardId];
        delete messageQueueState.seenSeqs[cardId];
        delete messageQueueState.pendingMessages[cardId];
    } else {
        messageQueueState.lastReceivedSeq = {};
        messageQueueState.seenSeqs = {};
        messageQueueState.pendingMessages = {};
    }
}

/**
 * Save current message queue state to localStorage for recovery.
 */
function saveMessageQueueState() {
    try {
        const stateToSave = {
            lastReceivedSeq: messageQueueState.lastReceivedSeq,
            timestamp: Date.now()
        };
        localStorage.setItem('messageQueueState', JSON.stringify(stateToSave));
    } catch (e) {
        console.error('[MESSAGE_QUEUE] Error saving state:', e);
    }
}

/**
 * Restore message queue state from localStorage.
 */
function restoreMessageQueueState() {
    try {
        const saved = localStorage.getItem('messageQueueState');
        if (saved) {
            const state = JSON.parse(saved);
            // Only restore if less than 5 minutes old
            if (state.timestamp && (Date.now() - state.timestamp) < 5 * 60 * 1000) {
                messageQueueState.lastReceivedSeq = state.lastReceivedSeq || {};
                return true;
            }
        }
    } catch (e) {
        console.error('[MESSAGE_QUEUE] Error restoring state:', e);
    }
    return false;
}

// Export for use in other modules
if (typeof window !== 'undefined') {
    window.messageQueueState = messageQueueState;
    window.processIncomingMessage = processIncomingMessage;
    window.fetchMissedMessages = fetchMissedMessages;
    window.getAllMessagesSince = getAllMessagesSince;
    window.resetMessageQueue = resetMessageQueue;
    window.saveMessageQueueState = saveMessageQueueState;
    window.restoreMessageQueueState = restoreMessageQueueState;
    window.dispatchReplayedMessage = dispatchReplayedMessage;
}

                    if (timeSinceUpdate > 10000 && !state.isStuck) {

                    } else if (timeSinceUpdate <= 10000 && state.isStuck) {
                        square.classList.remove('stuck');
                        state.isStuck = false;

                /**
                 * Convert confidence score (0-100) to gradient color
                 * null/undefined -> green (default until confidence arrives)
                 * 0-50: red-yellow gradient
                 * 50-100: yellow-green gradient
                 */
                if (confidenceScore === null || confidenceScore === undefined) {
                    return '#2DFF45'; // Green default
                }

                // Clamp to 0-100 range
                confidenceScore = Math.max(0, Math.min(100, confidenceScore));

                let r, g, b;

                if (confidenceScore <= 50) {
                    // Red to Yellow gradient (0-50)
                    const t = confidenceScore / 50; // 0 to 1
                    r = 255;
                    g = Math.round(255 * t); // 0 to 255
                    b = 0;
                } else {
                    // Yellow to Green gradient (50-100)
                    const t = (confidenceScore - 50) / 50; // 0 to 1
                    r = Math.round(255 * (1 - t)); // 255 to 0
                    g = 255;
                    b = Math.round(69 * t); // 0 to 69 (matching #2DFF45)

                return `rgb(${r}, ${g}, ${b})`;

            // Update createCard to handle explicit ID
            function createCard(options) {
                const {
                    icon,
                    title,
                    subtitle,
                    content = '',
                    statusBadge = null,
                    buttons = [],
                    id = null  // Allow explicit ID
                } = options;

                // Use provided ID or generate new one
                const cardId = id || generateCardId();
                
                const card = document.createElement('div');
                card.className = 'card';
                card.id = cardId;
                
                // Build card HTML - ALWAYS include buttons container
                let cardHtml = `
                    <div class="card-header">
                        <div class="card-icon">${icon ? getCardIconSvg(icon) : globalState.cardCounter}</div>
                        <div>
                            <h2 class="card-title">${title}</h2>
                            ${subtitle ? `<p class="card-subtitle">${subtitle}</p>` : ''}
                        </div>
                        ${statusBadge ? `
                            <div class="status-badge ${statusBadge.type}">
                                <span>${statusBadge.text}</span>
                            </div>
                        ` : ''}
                    </div>
                    <div class="card-content">${content}</div>
                    <div id="${cardId}-buttons" class="card-buttons"></div>
                `;

                card.innerHTML = cardHtml;

                // Add to container
                document.getElementById('cardContainer').appendChild(card);

                // Verify buttons container exists
                const buttonsContainer = document.getElementById(`${cardId}-buttons`);

                // Add buttons if any provided
                if (buttons.length > 0) {
                    // Use requestAnimationFrame instead of setTimeout for better performance
                    requestAnimationFrame(() => {
                        createButtonRow(`${cardId}-buttons`, buttons);
                    });
                }

                // Scroll to view - defer to avoid forced reflow, but skip for first card to allow reading content above
                if (globalState.cardCounter > 1) {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        });
                    });
                }

                return card;
            }

            // Create standardized button row
            function createButtonRow(containerId, buttons) {
                const container = document.getElementById(containerId);
                if (!container) {
                    console.error(`Button container ${containerId} not found`);
                    // Try to find the card and create the container
                    const cardId = containerId.replace('-buttons', '');
                    const card = document.getElementById(cardId);
                    if (card) {
                        const buttonsDiv = document.createElement('div');
                        buttonsDiv.id = containerId;
                        buttonsDiv.className = 'card-buttons';
                        card.appendChild(buttonsDiv);
                        // Try again
                        return createButtonRow(containerId, buttons);
                    }
                    return;
                }

                // Clear any existing content
                container.innerHTML = '';

                const buttonRow = document.createElement('div');
                buttonRow.className = 'button-row';

                // For single full-width buttons, remove centering
                if (buttons.length === 1 && buttons[0].width === 'full') {
                    buttonRow.style.justifyContent = 'stretch';
                }

                // Color cycle: green, purple, orange, cyan, pink
                const colorCycle = ['primary', 'secondary', 'tertiary', 'quaternary', 'quinary'];

                buttons.forEach((btnConfig, index) => {
                    const button = document.createElement('button');
                    // Use explicit variant if provided, otherwise cycle through colors
                    // Calculate index from the end so the last button is always green (primary)
                    let variant;
                    if (btnConfig.variant) {
                        variant = btnConfig.variant;
                    } else {
                        // Calculate position from the end: last button = 0, second-to-last = 1, etc.
                        const positionFromEnd = buttons.length - 1 - index;
                        // Map to color cycle in reverse: last=primary, second-to-last=quinary, etc.
                        const colorIndex = positionFromEnd % 5;
                        variant = colorCycle[colorIndex];
                    }
                    button.className = `std-button ${variant}`;
                    if (btnConfig.width === 'full') {
                        button.style.width = '100%';
                        button.style.flex = 'none';
                    } else {
                        button.style.flex = btnConfig.width || 1;
                    }
                    button.innerHTML = `
                        <span class="button-text">${btnConfig.icon || ''} ${btnConfig.text}</span>
                        <span class="spinner"></span>
                    `;

                    button.onclick = async (e) => {
                        if (button.disabled) return;

                        // Show loading state
                        button.classList.add('loading');
                        button.disabled = true;

                        try {
                            await btnConfig.callback(e);
                        } catch (error) {
                            console.error('Button callback error:', error);
                            // Show error state on button
                            button.classList.add('error');
                            button.innerHTML = `
                                <span class="button-text">[ERROR] Error</span>
                                <span class="spinner"></span>
                            `;
                            // Reset after delay
                            setTimeout(() => {
                                button.classList.remove('error', 'loading');
                                button.disabled = false;
                                button.innerHTML = `
                                    <span class="button-text">${btnConfig.icon || ''} ${btnConfig.text}</span>
                                    <span class="spinner"></span>
                                `;
                            }, 3000);
                        } finally {
                            // Always remove loading state unless button was marked as selected or errored
                            if (!button.classList.contains('selected') && !button.classList.contains('error')) {
                                button.classList.remove('loading');
                                button.disabled = false;
                            }
                        }
                    };

                    if (btnConfig.disabled) {
                        button.disabled = true;
                    }

                    buttonRow.appendChild(button);
                });

                container.appendChild(buttonRow);
            }

            // Mark button as selected (past choice) - Fixed to not interfere with loading state
            function markButtonSelected(buttonElement, newText) {
                // Remove loading state first
                buttonElement.classList.remove('loading');
                // Add selected state
                buttonElement.classList.add('selected');
                buttonElement.disabled = true;
                if (newText) {
                    // Try to find .button-text first (standard buttons)
                    const buttonTextElement = buttonElement.querySelector('.button-text');
                    if (buttonTextElement) {
                        buttonTextElement.textContent = newText;
                    } else {
                        // Fallback: set the entire button content for demo buttons and others
                        buttonElement.innerHTML = `<span>${newText}</span>`;
                    }
                }
                // Disable all sibling buttons
                const siblings = buttonElement.parentElement.querySelectorAll('.std-button');
                siblings.forEach(btn => {
                    if (btn !== buttonElement) {
                        btn.disabled = true;
                        btn.style.opacity = '0.5';
                    }
                });
            }

            function markButtonUnselected(buttonElement) {
                // Remove selected state
                buttonElement.classList.remove('selected', 'loading');
                buttonElement.disabled = false;
                buttonElement.style.opacity = '';
                
                // Re-enable all sibling buttons
                const siblings = buttonElement.parentElement.querySelectorAll('.std-button');
                siblings.forEach(btn => {
                    btn.disabled = false;
                    btn.style.opacity = '';
                });
            }
            
            function resetProcessButtons() {
                // Use global state values
                const currentBalance = globalState.accountBalance || 0;
                const estimatedCost = globalState.estimatedCost || 0;
                const effectiveCost = globalState.effectiveCost ?? estimatedCost; // Use ?? not || so 0 doesn't fall back
                const creditsNeeded = Math.max(0, effectiveCost - currentBalance);
                const sufficientBalance = currentBalance >= effectiveCost;

                // Find all buttons that need updating
                const buttons = document.querySelectorAll('button');
                buttons.forEach(button => {
                    const buttonText = button.textContent || '';

                    // Check if this is a credits/process button
                    if (buttonText.includes('💳') || buttonText.includes('Add') && buttonText.includes('Credits') ||
                        buttonText.includes('Process Table') || buttonText.includes('Opening store')) {

                        // Check if it's in a preview card
                        const card = button.closest('.card');
                        if (card && (card.textContent.includes('Your Balance') || card.textContent.includes('Est. Cost'))) {
                            // Reset button state
                            markButtonUnselected(button);

                            if (sufficientBalance) {
                                // Show process button with cost
                                button.innerHTML = `<span class="button-text">🔍 Process Table ($${effectiveCost.toFixed(2)})</span>`;
                                button.className = 'std-button primary';
                                button.setAttribute('data-action', 'process');
                                
                                button.onclick = async (e) => {
                                    const btn = e.target.closest('button');
                                    markButtonSelected(btn, '✨ Processing...');
                                    globalState.activePreviewCard = null;
                                    createProcessingCard();
                                };
                            } else {
                                // Show add credits button with remaining amount needed
                                button.innerHTML = `<span class="button-text">💳 Add $${creditsNeeded.toFixed(2)} Credits</span>`;
                                button.className = 'std-button secondary';
                                button.setAttribute('data-action', 'process');
                                
                                button.onclick = async (e) => {
                                    const btn = e.target.closest('button');
                                    globalState.hasInsufficientBalance = true;
                                    markButtonSelected(btn, '💳 Opening store...');
                                    const recommendedAmount = Math.ceil(creditsNeeded);
                                    const cardId = card.querySelector('[id*="preview"]')?.id?.replace('-content', '');
                                    openAddCreditsPage(recommendedAmount, `${cardId}-messages`);
                                };
                            }
                        }
                    }
                });
            }

                                        if (buttonText && buttonText.textContent.includes('Process Table')) {
                                            button.click();
                                            break;
                                        }
                                    }
                                };
                                markButtonSelected(button, '💳 Opening store...');
                                // Use effective cost-based creditsNeeded (already calculated above using effectiveCost)
                                const recommendedAmount = Math.ceil(creditsNeeded); // Round up to nearest dollar
                                openAddCreditsPage(recommendedAmount, `${cardId}-messages`);

                                // Reset button after a delay
                                setTimeout(() => {
                                    markButtonUnselected(button);
                                }, 2000);

                        }
                    }
                ]);

                // Show instruction message for Add Credits button
                if (!sufficientBalance) {
                    showMessage(`${cardId}-messages`, `💳 Click button to add credits. After purchase, return to this tab for auto-processing.`, 'info', false, 'add-credits-instruction');
                }
            }
            // Create standardized progress component
            function createProgress(options) {
                const {
                    title = 'Processing...',
                    messages = ['Starting...', 'Working...', 'Almost done...'],
                    estimatedTime = 30000,
                    containerId,
                    useWebSocket = false
                } = options;

                const progressId = `progress-${Date.now()}`;
                const progressHtml = `
                    <div class="progress-container" id="${progressId}">
                        <div class="progress-title">${title}</div>
                        <div class="progress-message">${messages[0]}</div>
                        <div class="progress-bar-wrapper">
                            <div class="progress-bar-fill"></div>
                        </div>
                        <div class="progress-percentage">0%</div>
                    </div>
                `;

                if (containerId) {
                    const container = document.getElementById(containerId);
                    if (container) {
                        container.insertAdjacentHTML('beforeend', progressHtml);
                    }
                }

                const progressEl = document.getElementById(progressId);
                const messageEl = progressEl.querySelector('.progress-message');
                const barEl = progressEl.querySelector('.progress-bar-fill');
                const percentEl = progressEl.querySelector('.progress-percentage');

                let progress = 0;
                let messageIndex = 0;
                let interval = null;
                let isCompleted = false;

                const updateProgress = (percent, message) => {
                    if (isCompleted) return;
                    
                    progress = Math.min(percent, 100);
                    barEl.style.width = `${progress}%`;
                    percentEl.textContent = `${Math.round(progress)}%`;
                    if (message) messageEl.textContent = message;
                };

                const startAutoProgress = () => {
                    if (useWebSocket) return;
                    
                    const increment = 100 / (estimatedTime / 100);
                    interval = setInterval(() => {
                        if (progress < 75) {
                            progress += increment;
                            updateProgress(progress);
                            
                            const newMessageIndex = Math.floor((progress / 75) * messages.length);
                            if (newMessageIndex > messageIndex && newMessageIndex < messages.length) {
                                messageIndex = newMessageIndex;
                                messageEl.textContent = messages[messageIndex];
                            }
                        }
                    }, 100);
                };

                const stopAutoProgress = () => {
                    if (interval) {
                        clearInterval(interval);
                        interval = null;
                    }
                };

                const complete = (finalMessage) => {
                    isCompleted = true;
                    stopAutoProgress();
                    updateProgress(100, finalMessage || 'Complete!');
                    
                    // Add error styling if message indicates failure
                    if (finalMessage && finalMessage.includes('❌')) {
                        barEl.style.backgroundColor = '#f44336'; // Red color for errors
                        messageEl.style.color = '#f44336';
                        percentEl.style.color = '#f44336';
                    }
                    
                    setTimeout(() => {
                        if (progressEl && progressEl.parentElement) {
                            progressEl.style.opacity = '0';
                            setTimeout(() => progressEl.remove(), 300);
                        }
                    }, 1000);
                };

                if (!useWebSocket) {
                    // startAutoProgress(); // DISABLED to see real progress
                }

                return {
                    element: progressEl,
                    updateProgress,
                    complete,
                    setMessage: (msg) => { messageEl.textContent = msg; },
                    stopAutoProgress,
                    isWebSocketMode: useWebSocket
                };
            }

            // Run operation with progress
            async function runWithProgress(operation, progressOptions) {
                const progress = createProgress(progressOptions);
                
                try {
                    const result = await operation(progress);
                    progress.complete();
                    return result;
                } catch (error) {
                    progress.complete('Error occurred');
                    throw error;
                }
            }

function showMessage(containerId, message, type = 'info', updateExisting = false, messageId = null) {
    const container = document.getElementById(containerId);
    if (!container) return;

    const icon = type === 'success' ? '✓' : type === 'error' ? '✗' : type === 'warning' ? '⚠' : 'ℹ';

    // Always try to update if messageId is provided
    if (messageId) {
        let existingMessage = container.querySelector(`[data-message-id="${messageId}"]`);

        if (existingMessage) {
            // Update existing message
            existingMessage.className = `message message-${type}`;
            existingMessage.innerHTML = `<span class="message-icon">${icon}</span><span>${message}</span>`;
            return existingMessage;
        }
    }

    // Create new message element
    const messageEl = document.createElement('div');
    messageEl.className = `message message-${type}`;
    messageEl.innerHTML = `<span class="message-icon">${icon}</span><span>${message}</span>`;

    // Add message ID if provided
    if (messageId) {
        messageEl.setAttribute('data-message-id', messageId);
    }

    container.appendChild(messageEl);
    return messageEl;
}

// Markdown rendering wrapper
function renderMarkdown(text) {
    if (!text) return '';

    marked.setOptions({
        breaks: true,
        gfm: true,
        sanitize: false,
        smartLists: true,
        smartypants: false
    });

    let html = marked.parse(text);

    // Handle Unicode escapes
    html = html.replace(/\\u([0-9a-fA-F]{4})/g, (match, hexCode) => {
        return String.fromCharCode(parseInt(hexCode, 16));
    });

    return `<div class="markdown-content">${html}</div>`;
}

function formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
}

function setupFileUpload(cardId) {
    const dropZone = document.getElementById(`${cardId}-dropzone`);

    // Click to browse

    // File selection

    dropZone.ondragover = (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    };

    dropZone.ondragleave = () => {
        dropZone.classList.remove('drag-over');
    };

    dropZone.ondrop = (e) => {

        dropZone.classList.remove('drag-over');

            fileInput.files = e.dataTransfer.files;
            handleFileSelect({ target: fileInput }, cardId);
        }
    };
}

// Validate Excel file before processing
function validateExcelFile(file) {
    // Check file size (100MB limit)
    const maxSize = 100 * 1024 * 1024; // 100MB
    if (file.size > maxSize) {
        return { valid: false, error: 'File too large. Maximum size is 100MB.' };
    }

    // Check file type
    const allowedTypes = [
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', // .xlsx
        'application/vnd.ms-excel', // .xls
        'text/csv', // .csv
        'application/csv'
    ];

    const allowedExtensions = ['.xlsx', '.xls', '.csv'];
    const fileName = file.name.toLowerCase();
    const hasValidExtension = allowedExtensions.some(ext => fileName.endsWith(ext));

    if (!allowedTypes.includes(file.type) && !hasValidExtension) {
        return {
            valid: false,
            error: 'Invalid file type. Please upload Excel (.xlsx, .xls) or CSV files only.'
        };
    }

    // Basic file name validation
    if (fileName.length > 255) {
        return { valid: false, error: 'File name too long.' };
    }

    return { valid: true };
}

// Validate config file before processing
function validateConfigFile(file) {
    // Check file size (10MB limit for config files)
    const maxSize = 10 * 1024 * 1024; // 10MB
    if (file.size > maxSize) {
        return { valid: false, error: 'Config file too large. Maximum size is 10MB.' };
    }

    // Check file type
    if (file.type !== 'application/json' && !file.name.toLowerCase().endsWith('.json')) {
        return { valid: false, error: 'Invalid file type. Please upload JSON files only.' };
    }

    // Check if file is not empty
    if (file.size === 0) {
        return { valid: false, error: 'Config file is empty.' };
    }

    return { valid: true };
}

async function handleFileSelect(event, cardId) {
    const file = event.target.files[0];
    if (!file) {

    // Validate file before processing

    if (!validation.valid) {
        showMessage(`${cardId}-messages`, `File validation failed: ${validation.error}`, 'error');
        // Reset file input
        event.target.value = '';

    // Only clear session data after successful validation
    globalState.sessionId = null;
    globalState.excelFileUploaded = false;
    globalState.configStored = false;
    globalState.configValidated = false;

async function uploadExcelFile(cardId, file) {
    try {
        // Validate file size (50MB max - no longer limited by API Gateway!)
        const maxSize = 50 * 1024 * 1024;
        if (file.size > maxSize) {
            throw new Error(`File too large. Maximum size is ${maxSize / 1024 / 1024}MB`);
        }

        // Step 1: Request presigned URL from backend
        const presignedResponse = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'requestPresignedUrl',
                file_type: 'excel',
                filename: file.name,
                file_size: file.size,
                email: globalState.email,
                session_id: globalState.sessionId || ''
            })
        });

        const presignedData = await presignedResponse.json();

        if (!presignedResponse.ok || !presignedData.success) {
            throw new Error(presignedData.message || 'Failed to get upload URL');
        }

        // Store upload info
        const uploadId = presignedData.upload_id;
        const s3Key = presignedData.s3_key;
        const sessionId = presignedData.session_id;

        // Store session_id if backend generated one
        if (sessionId && !globalState.sessionId) {
            globalState.sessionId = sessionId;
            localStorage.setItem('sessionId', sessionId);
        }

        showMessage(`${cardId}-messages`,
            `Uploading ${file.name} to secure storage...`,
            'info'
        );

        // Step 2: Upload file directly to S3 using presigned URL
        // IMPORTANT: Include metadata as x-amz-meta-* headers to match presigned URL params
        const uploadResponse = await fetch(presignedData.presigned_url, {
            method: 'PUT',
            body: file,
            headers: {
                'Content-Type': presignedData.content_type,  // Use content type from backend
                'x-amz-meta-upload_id': uploadId,
                'x-amz-meta-original_filename': file.name,
                'x-amz-meta-email': globalState.email,
                'x-amz-meta-session_id': sessionId,
                'x-amz-meta-file_type': 'excel',
                'x-amz-meta-file_size': file.size.toString(),
                'x-amz-meta-uploaded_at': new Date().toISOString()
            }
        });

        if (!uploadResponse.ok) {
            throw new Error(`Upload failed with status ${uploadResponse.status}`);
        }

        console.log('[EXCEL_UPLOAD] File uploaded to S3 successfully');

        // Step 3: Confirm upload complete (no processing yet - just confirmation)
        const confirmResponse = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'confirmUploadComplete',
                upload_id: uploadId,
                s3_key: s3Key,
                session_id: sessionId,
                file_type: 'excel',
                filename: file.name,
                email: globalState.email
            })
        });

        const confirmData = await confirmResponse.json();

        if (!confirmResponse.ok || !confirmData.success) {
            throw new Error(confirmData.message || 'Failed to confirm upload');
        }

        // Store file info in globalState for later processing
        globalState.excelFileUploaded = true;
        globalState.excelS3Key = s3Key;
        globalState.excelFilename = file.name;
        globalState.storagePath = confirmData.storage_path;

        // Store matching configs if found
        if (confirmData.matching_configs && confirmData.matching_configs.success && confirmData.matching_configs.matches) {
            globalState.matchingConfigs = confirmData.matching_configs;
        } else {
            globalState.matchingConfigs = null;
        }

        // Check if we should start upload interview
        if (confirmData.action === 'start_interview' && confirmData.conversation_id) {
            console.log('[UPLOAD_INTERVIEW] Starting interview for', confirmData.conversation_id);

            // Store conversation info
            globalState.uploadInterviewConversationId = confirmData.conversation_id;
            globalState.tableAnalysis = confirmData.table_analysis;

            // Show interview UI instead of going to config
            setTimeout(() => {
                createUploadInterviewCard(cardId, confirmData);
            }, 500);

            return true; // Interview triggered - signal to caller
        }

        // Check if a matching config was found - go directly to config card
        if (confirmData.action === 'use_matching_config' && globalState.matchingConfigs) {
            console.log('[MATCHING_CONFIG] Found matching config, skipping interview');

            // Show success with match info
            showFinalCardState(cardId,
                `${file.name} uploaded - matching configuration found!`,
                'success'
            );

            // Go directly to configuration card where user can use the match
            setTimeout(() => {
                createConfigurationCard();

async function handleConfigUpload(event, cardId) {
    const file = event.target.files[0];
    if (!file) {
        return;
    }

    // Validate config file before processing
    const validation = validateConfigFile(file);
    if (!validation.valid) {
        showMessage(`${cardId}-messages`, `Config file validation failed: ${validation.error}`, 'error');
        // Reset file input
        event.target.value = '';
        return;
    }

    globalState.configFile = file;

    // Hide all card content and show processing
    const messagesContainer = document.getElementById(`${cardId}-messages`);
    const optionsContainer = document.getElementById(`${cardId}-options`);
    const buttonsContainer = document.getElementById(`${cardId}-buttons`);
    const matchingInfoContainer = document.getElementById(`${cardId}-matching-info`);

    if (optionsContainer) optionsContainer.style.display = 'none';
    if (buttonsContainer) buttonsContainer.style.display = 'none';
    if (matchingInfoContainer) matchingInfoContainer.style.display = 'none';

    // Show thinking indicators
    showThinkingInCard(cardId, 'Validating configuration file...');
    // Progress routed to card level;

    try {
        // Read and parse file locally first
        const configText = await file.text();
        const config = JSON.parse(configText);

        // Validate config structure locally first
        if (!config || !config.validation_targets || !Array.isArray(config.validation_targets)) {
            throw new Error('Invalid config structure. Must have validation_targets array.');
        }

        // Config validation only - Excel file already uploaded and session established
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'validateConfig',
                config: config,
                is_upload: true,
                email: globalState.email,
                session_id: globalState.sessionId
            })
        });

        const data = await response.json();

        if (response.ok && data.valid) {
            completeThinkingInCard(cardId, 'Configuration validated!');
            // Progress routed to card level;

            globalState.configValidated = true;
            globalState.configStored = true;

            // Show success with filename and validation status
            showFinalCardState(cardId,
                `${file.name} uploaded and validated successfully`,
                'success'
            );

            // Auto-proceed to preview
            setTimeout(() => createPreviewCard(), 1000);
        } else {
            completeThinkingInCard(cardId, 'Validation failed');
            // Progress routed to card level;

            // Show error message
            if (messagesContainer) {
                messagesContainer.innerHTML = `
                    <div class="message message-error" style="margin-bottom: 1rem;">
                        <span class="message-icon"></span>
                        <span>Configuration validation failed: ${data.message || 'Unknown error'}</span>
                    </div>
                `;
            }

            // Offer repair options
            offerConfigRepair(cardId, data.message || 'Unknown error', config);
        }
    } catch (error) {
        completeThinkingInCard(cardId, 'Upload failed');
        // Progress routed to card level;

        console.error('Config validation error:', error);

        // Show error message
        if (messagesContainer) {
            messagesContainer.innerHTML = `
                <div class="message message-error" style="margin-bottom: 1rem;">
                    <span class="message-icon"></span>
                    <span>Error reading config: ${error.message}</span>
                </div>
            `;
        }
    }
}

async function sendEmailCode(cardId, button) {
    const email = document.getElementById(`${cardId}-email`).value.trim();

    if (!email) {
        showMessage(`${cardId}-messages`, 'Please enter an email address', 'error');
        throw new Error('Email required');
    }

    try {
        globalState.email = email;

        // Check if we should force re-verification (e.g., after logout)
        const forceReverify = sessionStorage.getItem('forceReverify') === 'true';
        if (forceReverify) {
            sessionStorage.removeItem('forceReverify');
        }

        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'checkOrSendValidation',
                email: email,
                force_reverify: forceReverify  // Tell backend to send new code
            })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            if (data.validated && data.session_token) {
                // Email already validated, backend issued token without sending code
                console.log('[EMAIL] Email already validated, token issued');

                // Store session token (30-day expiration, persists across browser restarts)
                localStorage.setItem('sessionToken', data.session_token);
                globalState.sessionToken = data.session_token;

                // Sync terms acceptance from server
                if (data.terms_accepted_version === TERMS_VERSION) {
                    localStorage.setItem('termsAcceptedVersion', data.terms_accepted_version);
                }

                // Show message that email is already validated
                showMessage(`${cardId}-messages`, 'Welcome back! Your email is already verified.', 'success');

                // Mark as validated
                globalState.isNewUser = false; // Returning user

                // Brief delay then proceed
                setTimeout(() => {
                    handleEmailValidated(cardId);
                }, 800);
            } else {
                // Code was sent, show verification form
                document.getElementById(`${cardId}-code-section`).style.display = 'block';
                showMessage(`${cardId}-messages`, 'Validation code sent to your email!', 'success');
                setupCodeDigitInputs(cardId);
                const firstDigit = document.querySelector(`#${cardId}-code-inputs .code-digit[data-index="0"]`);
                if (firstDigit) firstDigit.focus();

                // Update button to verify code
                markButtonSelected(button, '✓ Code Sent');

                // Add verify button
                createButtonRow(`${cardId}-buttons`, [
                    {
                        text: 'Verify Code',
                        icon: '🔐',
                        variant: 'primary',
                        callback: async (e) => {

            showMessage(`${cardId}-messages`, data.message || 'Failed to send code.', 'error');
            throw new Error('Failed to send code');

    } catch (error) {
        console.error('Email validation error:', error);

    }
}

async function verifyCode(cardId, button) {
    // Collect code from 6 individual digit boxes
    const digits = document.querySelectorAll(`#${cardId}-code-inputs .code-digit`);
    const code = Array.from(digits).map(d => d.value.trim()).join('');

    // Validate code first
    if (code.length !== 6) {
        showMessage(`${cardId}-messages`, 'Please enter a 6-digit code', 'error');
        return;
    }

    // Validate checkboxes only if they are present (not already accepted)
    const termsAlreadyAccepted = localStorage.getItem('termsAcceptedVersion') === TERMS_VERSION;
    if (!termsAlreadyAccepted) {
        const termsCheckbox = document.getElementById(`${cardId}-terms`);
        const privacyCheckbox = document.getElementById(`${cardId}-privacy`);

        if (!termsCheckbox.checked) {
            showMessage(`${cardId}-messages`, 'Please agree to the Terms and Conditions to continue', 'error');
            return;
        }

        if (!privacyCheckbox.checked) {
            showMessage(`${cardId}-messages`, 'Please accept the Privacy Notice to continue', 'error');
            return;
        }
    }

    try {
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'validateEmailCode',
                email: globalState.email,
                code: code,
                terms_version: TERMS_VERSION
            })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            // SECURITY: Store session token from backend (30-day expiration)
            if (data.session_token) {
                localStorage.setItem('sessionToken', data.session_token);
                globalState.sessionToken = data.session_token;
            }
            // Persist terms acceptance so checkboxes won't show next time
            localStorage.setItem('termsAcceptedVersion', TERMS_VERSION);
            markButtonSelected(button, '✓ Verified');
            // ALWAYS TREAT AS NEW USER FOR NOW
            globalState.isNewUser = true; // Override - show demo to everyone
            handleEmailValidated(cardId);
        } else {
            showMessage(`${cardId}-messages`, data.message || 'Invalid code. Please try again.', 'error');
            clearCodeDigits(cardId);
        }
    } catch (error) {
        console.error('Code verification error:', error);
        showMessage(`${cardId}-messages`, 'Network error. Please try again.', 'error');
        clearCodeDigits(cardId);
    }
}

function clearCodeDigits(cardId) {
    const digits = document.querySelectorAll(`#${cardId}-code-inputs .code-digit`);
    digits.forEach(d => d.value = '');
    if (digits.length > 0) digits[0].focus();
}

function setupCodeDigitInputs(cardId) {
    const container = document.getElementById(`${cardId}-code-inputs`);
    if (!container) return;
    const digits = container.querySelectorAll('.code-digit');

    digits.forEach((input, idx) => {
        // Auto-advance on digit entry
        input.addEventListener('input', (e) => {
            const val = e.target.value;
            // Allow only single digit
            if (val && !/^\d$/.test(val)) {
                e.target.value = '';
                return;
            }
            if (val && idx < 5) {
                digits[idx + 1].focus();
            }
        });

        // Backspace navigates to previous box; Enter submits
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && idx > 0) {
                digits[idx - 1].focus();
                digits[idx - 1].value = '';
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                const verifyBtn = document.querySelector(`#${cardId}-buttons .std-button.primary`);
                if (verifyBtn && !verifyBtn.disabled) verifyBtn.click();
            }
        });

        // Paste handler: distribute digits across all boxes
        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
            for (let i = 0; i < 6; i++) {
                digits[i].value = pasted[i] || '';
            }
            // Focus last filled box or the next empty one
            const focusIdx = Math.min(pasted.length, 5);
            digits[focusIdx].focus();
        });
    });
}

function handleEmailValidated(cardId) {
    // SECURITY: Store in sessionStorage (not localStorage) to prevent email spoofing
    // sessionStorage clears on browser close, providing natural logout behavior
    sessionStorage.setItem('validatedEmail', globalState.email);

    // Track email validation conversion
    trackEmailValidationConversion(globalState.email);

    // SECURITY: Show signed-in badge
    showSignedInBadge(globalState.email);

    // Check for pending action (deferred email validation mode)
    if (globalState.pendingActionAfterEmail) {
        const pendingAction = globalState.pendingActionAfterEmail;
        const description = globalState.pendingActionDescription || 'continuing';

        // Clear pending action
        globalState.pendingActionAfterEmail = null;
        globalState.pendingActionDescription = null;

        console.log(`[EMAIL] Email validated, executing pending action: ${description}`);

        // Hide the entire email verification card
        const card = document.getElementById(cardId);
        if (card) card.style.display = 'none';

        // Execute pending action after brief delay
        setTimeout(() => {
            pendingAction();
            // Re-attach badge to the new visible card
            showSignedInBadge(globalState.email);
        }, 500);

        return;
    }

    // Hide the entire email verification card
    const card = document.getElementById(cardId);
    if (card) card.style.display = 'none';

    // Check page type to determine next card
    const pageType = detectPageType();

    setTimeout(() => {
        if (pageType === 'reference-check') {
            // Reference check mode - go straight to reference check card
            proceedWithReferenceCheck(cardId);
        } else if (globalState.isNewUser) {
            // Default mode - show demo option for new users
            createUploadOrDemoCard();
        } else {
            // Default mode - show upload card for returning users
            createUploadCard();
        }
        // Re-attach badge to the new visible card
        showSignedInBadge(globalState.email);
    }, 500);
}

        console.log('[AUTH] Waiting for visible card to appear...');

        return;
    }

    const existingIndicator = document.querySelector('.card-signed-in-indicator');
    if (existingIndicator) {
        existingIndicator.remove();
    }

    // Create indicator
    const indicator = document.createElement('div');
    indicator.className = 'card-signed-in-indicator';
    indicator.innerHTML = `
        <span class="email">${email}</span>
        <button class="logout-btn" title="Logout">⎋ Logout</button>
    `;

    // Add logout handler to button
    const logoutBtn = indicator.querySelector('.logout-btn');
    logoutBtn.addEventListener('click', handleLogout);

    const cardHeader = firstCard.querySelector('.card-header');

    } else {
        firstCard.appendChild(indicator);
    }

    // Brief flash to draw attention
    indicator.classList.add('flash-in');
    indicator.addEventListener('animationend', () => indicator.classList.remove('flash-in'), { once: true });

    console.log('[AUTH] Signed-in indicator attached to first card');
}

async function handleLogout() {
    // Confirm logout
    if (!confirm('Are you sure you want to logout?\n\nThis will require email verification with a new code on all devices.')) {
        return;
    }

    // Set flag to prevent state saving during logout
    window.isLoggingOut = true;

    const email = globalState.email;

    // SECURITY: Notify backend of logout (for analytics/logging)
    // Note: Token revocation will be handled separately in the future
    try {
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'logout',
                email: email
            })
        });

        if (response.ok) {
            console.log('[AUTH] Server notified of logout');
        }
    } catch (error) {
        console.warn('[AUTH] Could not notify server of logout:', error);
        // Continue with client-side logout anyway
    }

    // Close any active WebSocket connections
    if (window.ws && window.ws.readyState === WebSocket.OPEN) {
        console.log('[AUTH] Closing WebSocket connection');
        window.ws.close();
    }

    // Close all session WebSocket connections if they exist
    if (typeof sessionWebSockets !== 'undefined' && sessionWebSockets) {
        console.log('[AUTH] Closing all session WebSockets');
        sessionWebSockets.forEach((ws, sessionId) => {
            ws._intentionallyClosed = true;
            ws.close();
        });
        sessionWebSockets.clear();
    }

    // Clear all auth data from this device
    localStorage.removeItem('sessionToken');
    sessionStorage.removeItem('validatedEmail');

    // Clear all session storage (including saved state)
    sessionStorage.clear();

    // Re-set only the forceReverify flag after clearing
    sessionStorage.setItem('forceReverify', 'true');

    globalState.email = null;
    globalState.sessionToken = null;
    globalState.sessionId = null;

    console.log('[AUTH] User logged out from this device, token cleared');

    // Hard refresh without reload warning
    window.location.href = window.location.origin + window.location.pathname + '?t=' + Date.now();
}

    const input = document.getElementById(`${cardId}-config-id-input`);
    if (!input) return;
    
    const configId = input.value.trim();
    if (!configId) {
        showMessage(`${cardId}-messages`, 'Please enter a configuration ID', 'error');
        input.focus();
        return;
    }
    
    // Secret upload trigger - check if user typed "upload" (case insensitive)
    if (configId.toLowerCase() === 'upload') {
        showMessage(`${cardId}-messages`, 'Opening file picker...', 'info');
        
        // Trigger the hidden file input for config upload
        const fileInput = document.getElementById('config-upload-input');
        if (fileInput) {
            fileInput.click();
        } else {
            // Create hidden file input if it doesn't exist
            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'file';
            hiddenInput.id = 'config-upload-input';
            hiddenInput.accept = '.json';
            hiddenInput.style.display = 'none';
            hiddenInput.onchange = function(e) {
                if (e.target.files.length > 0) {
                    handleConfigUpload(e.target.files[0], cardId);
                }
            };
            document.body.appendChild(hiddenInput);
            hiddenInput.click();
        }
        
        // Clear the input
        input.value = '';
        return;
    }
    
    // Enhanced validation for config ID format
    const configIdRegex = /^[a-zA-Z0-9_]+_v\d+/;
    if (!configIdRegex.test(configId)) {
        showMessage(`${cardId}-messages`, 'Invalid configuration ID format.<br><br>Expected format: sessionID_vVersion_description<br>Example: session_20250819_v1_financial_portfolio<br><br>Please check your validation results email for the correct ID.', 'error');
        input.focus();
        return;
    }
    
    // Check for minimum length to avoid obviously invalid IDs
    if (configId.length < 15) {
        showMessage(`${cardId}-messages`, 'Configuration ID appears too short. Please verify you have the complete ID from your email.', 'error');
        input.focus();
        return;
    }
    
    // Check for maximum reasonable length
    if (configId.length > 200) {
        showMessage(`${cardId}-messages`, 'Configuration ID is too long. Please check for any extra characters.', 'error');
        input.focus();
        return;
    }
    
    useConfigById(cardId, configId);
}

async function submitConfigRepairWithError(cardId, errorMessage, userGuidance) {
    // Hide input and buttons
    document.getElementById(`${cardId}-refinement`).style.display = 'none';
    const buttonsContainer = document.getElementById(`${cardId}-buttons`);
    if (buttonsContainer) buttonsContainer.style.display = 'none';

    // Add user guidance if provided
    if (userGuidance) {
        await addChatMessage(cardId, 'user', userGuidance);
    }

    // Show thinking indicators
    showThinkingInCard(cardId, 'Analyzing and fixing configuration issues...', true);
    startDummyProgress(cardId, 70000, 'config');

    try {
        // Prepare repair request with error details and current config
        const repairInstructions = `Fix these validation errors: ${errorMessage}` + 
            (userGuidance ? `\n\nAdditional guidance: ${userGuidance}` : '');
        
        const response = await fetch(`${API_BASE}/validate?async=true`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'repairConfig',
                email: globalState.email,
                session_id: globalState.sessionId,
                config_data: globalState.currentConfig, // Pass the problematic config
                validation_error: errorMessage, // Pass the specific error
                repair_instructions: repairInstructions,
                error_context: globalState.validationErrorDetails // Full error context
            })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            // Register WebSocket handler for repair completion
            unregisterCardHandler(cardId);
            registerCardHandler(cardId, ['config'], (wsData, handlerCardId) => {
                handleConfigRepairWebSocketMessage(wsData, handlerCardId);
            });
            
            if (data.session_id) {
                connectToSession(data.session_id);
            }
        } else {
            throw new Error(data.error || 'Configuration repair failed');
        }
    } catch (error) {
        completeThinkingInCard(cardId, 'Repair failed');
        showMessage(`${cardId}-messages`, `Error: ${error.message}`, 'error');
    }
}

// WebSocket handler for config repair completion
async function handleConfigRepairWebSocketMessage(data, cardId) {
    if (data.type === 'config_generation_complete') {
        completeThinkingInCard(cardId, 'Configuration repaired!');
        
        globalState.currentConfig = data;
        globalState.excelFileUploaded = true;
        globalState.configError = null; // Clear error state
        globalState.validationErrorDetails = null;
        
        // Save clarifying questions for later use in refinement
        if (data.clarifying_questions) {
            globalState.savedQuestions = data.clarifying_questions;
        }
        
        let aiMessage = data.ai_summary || data.ai_response || 'Configuration issues have been fixed!';
        await addChatMessage(cardId, 'ai', aiMessage);
        
        // Show accept button and auto-generate preview
        createButtonRow(`${cardId}-buttons`, [
            {
                text: 'Accept Repaired Config',
                icon: '✅',
                variant: 'primary',
                callback: async (e) => {
                    const button = e.target.closest('button');
                    markButtonSelected(button, '✅ Accepted');
                    globalState.configValidated = true;
                    globalState.configStored = true;
                    
                    // Auto-generate preview of repaired config
                    setTimeout(() => {
                        createPreviewCard();
                    }, 1000);
                }
            }
        ]);
        
    } else if (data.type === 'config_generation_failed' || data.error || data.type === 'error') {
        completeThinkingInCard(cardId, 'Repair failed');
        const errorMessage = data.error || data.message || 'Configuration repair failed';

async function handleConfigUpload(event, cardId) {
    const file = event.target.files[0];
    if (!file) {
        return;
    }

    // Validate config file before processing
    const validation = validateConfigFile(file);
    if (!validation.valid) {
        showMessage(`${cardId}-messages`, `Config file validation failed: ${validation.error}`, 'error');
        // Reset file input
        event.target.value = '';
        return;
    }

    globalState.configFile = file;

    // Hide all card content and show processing
    const messagesContainer = document.getElementById(`${cardId}-messages`);
    const optionsContainer = document.getElementById(`${cardId}-options`);
    const buttonsContainer = document.getElementById(`${cardId}-buttons`);
    const matchingInfoContainer = document.getElementById(`${cardId}-matching-info`);
    
    if (optionsContainer) optionsContainer.style.display = 'none';
    if (buttonsContainer) buttonsContainer.style.display = 'none';
    if (matchingInfoContainer) matchingInfoContainer.style.display = 'none';
    
    // Show thinking indicators
    showThinkingInCard(cardId, 'Validating configuration file...');
    // Progress routed to card level;
    
    try {
        // Read and parse file locally first
        const configText = await file.text();
        const config = JSON.parse(configText);

        // Validate config structure locally first
        if (!config || !config.validation_targets || !Array.isArray(config.validation_targets)) {
            throw new Error('Invalid config structure. Must have validation_targets array.');
        }

        // Config validation only - Excel file already uploaded and session established
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'validateConfig',
                config: config,
                is_upload: true,
                email: globalState.email,
                session_id: globalState.sessionId
            })
        });

        const data = await response.json();

        if (response.ok && data.valid) {
            completeThinkingInCard(cardId, 'Configuration validated!');
            // Progress routed to card level;
            
            globalState.configValidated = true;
            globalState.configStored = true;
            
            // Show success with filename and validation status
            showFinalCardState(cardId, 
                `${file.name} uploaded and validated successfully`, 
                'success'
            );
            
            // Auto-proceed to preview
            setTimeout(() => createPreviewCard(), 1000);
        } else {
            completeThinkingInCard(cardId, 'Validation failed');
            // Progress routed to card level;
            
            // Show error message
            if (messagesContainer) {
                messagesContainer.innerHTML = `
                    <div class="message message-error" style="margin-bottom: 1rem;">
                        <span class="message-icon"></span>
                        <span>Configuration validation failed: ${data.message || 'Unknown error'}</span>
                    </div>
                `;
            }
            
            // Offer repair options
            offerConfigRepair(cardId, data.message || 'Unknown error', config);
        }
    } catch (error) {
        completeThinkingInCard(cardId, 'Upload failed');
        // Progress routed to card level;
        
        console.error('Config validation error:', error);
        
        // Show error message
        if (messagesContainer) {
            messagesContainer.innerHTML = `
                <div class="message message-error" style="margin-bottom: 1rem;">
                    <span class="message-icon"></span>
                    <span>Error reading config: ${error.message}</span>
                </div>
            `;
        }
    }
}
