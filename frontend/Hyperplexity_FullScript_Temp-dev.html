async function startConfigGenerationWithContext(cardId, userAnswers) {
    // Show thinking indicators
    showThinkingInCard(cardId, 'Starting configuration generation...', true);
    // Start config-specific dummy progress animation
    startDummyProgress(cardId, 70000, 'config'); // 70 seconds estimated for config generation
    // Progress routed to card level;
    
    try {
        // First, upload Excel file if not already uploaded to unified storage
        if (!globalState.excelFileUploaded) {
            const formData = new FormData();
            formData.append('excel_file', globalState.excelFile);
            formData.append('email', globalState.email);
            // Only append session_id if we have one (for new uploads, backend will generate)
            if (globalState.sessionId) {
                formData.append('session_id', globalState.sessionId);
            }

            const uploadResponse = await fetch(`${API_BASE}/validate`, {
                method: 'POST',
                body: formData
            });

            if (!uploadResponse.ok) {
                const errorText = await uploadResponse.text();
                console.error('[ERROR] Config generation upload failed with status:', uploadResponse.status);
                throw new Error(`Failed to upload Excel file to unified storage: ${uploadResponse.status} - ${errorText}`);
            }

            const uploadData = await uploadResponse.json();
            
            // Validate the response
            if (!uploadData.success) {
                throw new Error(`Upload failed: ${uploadData.error || 'Unknown error'}`);
            }
            globalState.excelFileUploaded = true;
            
            // Update session ID from backend response
            if (uploadData.session_id) {
                globalState.sessionId = uploadData.session_id;
                localStorage.setItem('sessionId', globalState.sessionId);
            }
            
            // Store the storage path for reference
            if (uploadData.storage_path) {
                globalState.storagePath = uploadData.storage_path;
            }
        }

        // Now request config generation (no need to re-upload Excel)
        const response = await fetch(`${API_BASE}/validate?async=true`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'generateConfig',
                email: globalState.email,
                session_id: globalState.sessionId || '',
                instructions: `Generate an optimal configuration for this data validation scenario. User provided these answers to clarifying questions: ${userAnswers}`
            })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            
            // Check if this is a synchronous completion (config generated immediately)
            if (data.ai_summary && data.download_url) {
                // Handle synchronous config generation completion
                completeThinkingInCard(cardId, 'Configuration generated!');
                
                globalState.currentConfig = data;
                globalState.excelFileUploaded = true;
                
                // Save clarifying questions for later use in refinement
                if (data.clarifying_questions) {
                    globalState.savedQuestions = data.clarifying_questions;
                }
                
                let aiMessage = data.ai_summary || data.ai_response || 'Configuration generated successfully!';
                await addChatMessage(cardId, 'ai', aiMessage);
                
                // Add config ID display if available
                if (data.config_id || data.session_id) {
                    const chatContainer = document.getElementById(`${cardId}-chat`);
                    if (chatContainer) {
                        const configIdDiv = document.createElement('div');
                        configIdDiv.className = 'chat-message ai';
                        const version = data.config_version || 1;
                        const configId = data.config_id || `${data.session_id}_v${version}`;
                        configIdDiv.innerHTML = `
                            <div class="config-id-display" style="margin-top: 16px; padding: 16px; background: linear-gradient(135deg, #f0f8ff 0%, #e8f4fd 100%); border-radius: 8px; border: 1px solid #b3d9ff;">
                                <div style="display: flex; align-items: center; margin-bottom: 8px;">
                                    <span style="font-size: 18px; margin-right: 8px;">🆔</span>
                                    <strong style="color: #2c5530;">Configuration ID Generated</strong>
                                </div>
                                <div style="background: white; padding: 12px; border-radius: 4px; border: 1px solid #ddd; margin-bottom: 8px;">
                                    <code style="font-size: 16px; font-weight: bold; color: #1a472a; font-family: 'Courier New', monospace;">${configId}</code>
                                </div>
                                <div style="font-size: 14px; color: #555; line-height: 1.4;">
                                    <div style="margin-bottom: 4px;">💾 <strong>Save this ID</strong> - it will be included in your validation results email</div>
                                    <div style="margin-bottom: 4px;">🔄 <strong>Reuse anywhere</strong> - enter this ID to apply the same configuration to future validations</div>
                                    <div>🔒 <strong>Secure</strong> - share this ID safely without exposing configuration details</div>
                                </div>
                            </div>
                        `;
                        chatContainer.appendChild(configIdDiv);
                    }
                }
                
                // Create accept button and auto-generate preview
                createButtonRow(`${cardId}-buttons`, [
                    {
                        text: 'Accept & Generate Preview',
                        icon: '✅',
                        variant: 'primary',
                        callback: async (e) => {
                            const button = e.target.closest('button');
                            markButtonSelected(button, '✅ Accepted');
                            // Auto-generate preview immediately
                            setTimeout(() => {
                                createPreviewCard();
                            }, 1000);
                        }
                    }
                ]);
            } else {
                // Even if async, save any clarifying questions from immediate response
                if (data.clarifying_questions) {
                    globalState.savedQuestions = data.clarifying_questions;
                }
                
                // Continue showing thinking indicators for async WebSocket completion
                updateThinkingInCard(cardId, 'AI analyzing table structure...');
                // Progress routed to card level;

                const sessionIdForSocket = data.session_id || globalState.sessionId;
                
                // Register WebSocket handler for this card
                unregisterCardHandler(cardId);
                registerCardHandler(cardId, ['config'], (wsData, handlerCardId) => {
                    handleConfigWebSocketMessage(wsData, handlerCardId);
                });
                
                ensureWebSocketHealth(sessionIdForSocket);
            }
        } else {
            // Enhanced error handling with retry suggestions
            let errorMessage = data.error || 'Failed to start generation';
            
            if (data.retry_suggestion) {
                errorMessage += `\n\n💡 Suggestion: ${data.retry_suggestion}`;
            }
            
            if (data.error_type === 'format_error') {
                errorMessage += '\n\n🔄 You can try generating the configuration again with simpler instructions.';
                throw new Error(errorMessage);
            } else if (data.error_type === 'api_overloaded') {
                // Show blue info notification for API overload instead of error
                completeThinkingInCard(cardId, 'Generation paused');
                showMessage(`${cardId}-messages`, 'ℹ️ Claude API is temporarily overloaded. This happens sometimes during peak usage. Please try again in 5-15 minutes and the submission button will be re-enabled.', 'info');
                return; // Don't throw error, just return to show the configuration card again
            }
            
            throw new Error(errorMessage);
        }
    } catch (error) {
        completeThinkingInCard(cardId, 'Generation failed');
        // Progress routed to card level;
        showMessage(`${cardId}-messages`, `Error: ${error.message}`, 'error');
    }
}

// Handle WebSocket messages for config generation
async function handleConfigWebSocketMessage(data, cardId) {
    if (data.type === 'config_generation_progress') {
        // Update progress indicator with message from backend
        const progressPercent = data.progress || 0;
        const message = data.message || data.status || 'Processing...';

async function addChatMessage(cardId, type, content, isUrgent = false, streamingType = 'normal') {
    const chatContainer = document.getElementById(`${cardId}-chat`);
    if (!chatContainer) return;

    const messageDiv = document.createElement('div');
    let className = `chat-message ${type}`;
    if (isUrgent) className += ' urgent';
    
    messageDiv.className = className;
    messageDiv.style.opacity = '0';
    chatContainer.appendChild(messageDiv);

    // Animate message appearance
    setTimeout(() => {
        messageDiv.style.opacity = '1';
    }, 100);

    // Stream text if it's an AI message
    if (type === 'ai') {
        if (streamingType === 'paragraphs') {
            await streamParagraphs(messageDiv, content);
        } else {
            await streamText(messageDiv, content);
        }
    } else {
        // For user messages, truncate if very long (pasted documents)
        let displayContent = content;
        if (content.length > 500) {
            displayContent = content.substring(0, 500) + '... [' + (content.length - 500) + ' more characters]';
        }
        messageDiv.innerHTML = renderMarkdown(displayContent);
        messageDiv.title = 'Click to expand'; // Tooltip

        // Add click to expand for truncated messages
        if (content.length > 500) {
            messageDiv.style.cursor = 'pointer';
            messageDiv.onclick = function() {
                if (this.innerHTML.includes('more characters]')) {
                    this.innerHTML = renderMarkdown(content);
                    this.title = 'Click to collapse';
                } else {
                    this.innerHTML = renderMarkdown(displayContent);
                    this.title = 'Click to expand';
                }
            };
        }
    }

    // Scroll to bottom - defer to avoid forced reflow
    requestAnimationFrame(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    });
}

// Stream text with pauses at punctuation
async function streamText(element, text) {
    const htmlText = renderMarkdown(text);

    // For complex markdown (lists, headers), render instantly to preserve formatting
    if (text.includes('\n-') || text.includes('\n*') || text.includes('\n#') || text.includes('```')) {
        element.innerHTML = htmlText;
        return;
    }

    // For simple markdown (just bold/italic), stream by words
    const words = text.split(' ');
    let currentText = '';

    for (let i = 0; i < words.length; i++) {
        currentText += (i > 0 ? ' ' : '') + words[i];
        element.innerHTML = renderMarkdown(currentText);
        await sleep(27); // ~37 words per second (1.5x faster than 40ms)
    }
}

// Utility function for delays
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// Fast paragraph-by-paragraph streaming for AI summaries
async function streamParagraphs(element, text) {
    // Convert markdown to HTML first
    const htmlText = renderMarkdown(text);
    
    // Check if content has markdown formatting
    if (htmlText !== text.replace(/\n/g, '<br>') || text.includes('**') || text.includes('*') || text.includes('#') || text.includes('`') || text.includes('[')) {
        // For markdown content, split by paragraphs but render as HTML
        const paragraphs = text.split(/\n\s*\n/); // Split on double line breaks
        let currentContent = '';
        
        for (let i = 0; i < paragraphs.length; i++) {
            if (paragraphs[i].trim()) {
                currentContent += paragraphs[i].trim() + '\n\n';
                element.innerHTML = renderMarkdown(currentContent);
                await sleep(500); // 0.5s between paragraphs
            }
        }
        return;
    }
    
    // For plain text, use paragraph streaming
    const paragraphs = text.split(/\n\s*\n/);
    let currentContent = '';
    
    for (let i = 0; i < paragraphs.length; i++) {
        if (paragraphs[i].trim()) {
            currentContent += paragraphs[i].trim() + '\n\n';
            element.textContent = currentContent;
            await sleep(500); // 0.5s between paragraphs
        }
    }
}

// Helper function to extract clarifying questions from the latest config change log entry
function getQuestionsFromChangeLog(config) {
    
    if (!config) {
        return null;
    }
    
    // Check if this is a WebSocket response rather than a config
    if (config.type && config.session_id) {
        return null;
    }
    
    if (!config.config_change_log || !Array.isArray(config.config_change_log)) {
        return null;
    }
    
    
    // Get the latest entry from config_change_log that has clarifying_questions
    for (let i = config.config_change_log.length - 1; i >= 0; i--) {
        const entry = config.config_change_log[i];
        if (entry.clarifying_questions) {
            return entry.clarifying_questions;
        }
    }
    
    return null;
}

                document.getElementById(`${cardId}-refinement`).style.display = 'block';
                const refInput = document.getElementById(`${cardId}-refinement-input`);
                refInput.value = '';
                refInput.focus();
                refInput.onkeydown = (event) => {
                    if (event.key === 'Enter' && !event.shiftKey) {
                        event.preventDefault();
                        const input = refInput.value.trim();
                        if (!input) {
                            showMessage(`${cardId}-messages`, 'Please enter refinement instructions', 'error');
                            return;
                        }
                        submitConfigRefinementWithAutoPreview(cardId, input);
                    }
                };
                // Update button to submit
                createButtonRow(`${cardId}-buttons`, [
                    {
                        text: 'Submit',
                        variant: 'primary',
                        width: 'full',
                        callback: async (e) => {
                            const button = e.target.closest('button');
                            const input = document.getElementById(`${cardId}-refinement-input`).value.trim();
                            if (!input) {
                                showMessage(`${cardId}-messages`, 'Please enter refinement instructions', 'error');
                                return;
                            }
                            markButtonSelected(button, 'Thinking...');
                            await submitConfigRefinementWithAutoPreview(cardId, input);
                        }
                    }
                ]);
            }
        },
        {
            text: 'Accept & Preview',
            icon: '✅',
            variant: 'primary',
            width: 2,
            callback: async (e) => {
                const button = e.target.closest('button');
                markButtonSelected(button, '✅ Accepted');
                globalState.configValidated = true;
                globalState.configStored = true;
                setTimeout(() => createPreviewCard(), 500);
            }
        }
    ]);
}

/* ========================================
 * 09-table-maker.js - Table Maker Conversation Flow
 *
 * Handles table maker conversation, execution updates,
 * row discovery, and table generation.
 *
 * Dependencies: 00-config.js, 03-websocket.js, 04-cards.js, 05-chat.js

// Table Maker state management
const tableMakerState = {
    cardId: null,
    conversationId: null,
    messages: [],
    confirmationResponse: null,
    preInitialized: false,      // Track if warmup/session init has been done
    warmupPromise: null         // Track ongoing warmup request
};

// ============================================
// EARLY INITIALIZATION / WARMUP
// ============================================

/**
 * Pre-initialize table maker session: warm up lambda, get session from backend, connect WebSocket.
 * Call this when user selects "Create Table from Prompt" to reduce latency on first submit.
 *
 * Uses the dedicated initTableMakerSession endpoint which:
 * 1. Goes through the same routing as startTableConversation (proper warmup)
 * 2. Imports and initializes table maker modules
 * 3. Returns a session ID from the backend (authoritative source)
 */
async function preInitializeTableMaker() {
    // Skip if already initialized
    if (tableMakerState.preInitialized) {
        console.log('[TABLE_MAKER] Already pre-initialized, skipping');
        return;
    }

    console.log('[TABLE_MAKER] Pre-initializing: warmup + session + WebSocket');

    // Use initTableMakerSession endpoint - this warms up the actual table maker code path
    // (not just /health which may hit different code). This fires immediately (don't await
    // in main flow) but we store the promise so awaitWarmup() can wait for it.
    //
    // Small delay to avoid CORS issues with file:// origins on fresh navigation.
    // Some browsers have timing issues with the first network request after navigation.
    const warmupPromise = new Promise(resolve => setTimeout(resolve, 100)).then(() => fetch(`${API_BASE}/validate`, {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({
            action: 'initTableMakerSession',
            email: globalState.email || ''
            // Don't pass session_id - let backend generate fresh one
        })
    }))
    .then(async resp => {
        if (!resp.ok) {
            console.warn('[TABLE_MAKER] Init endpoint returned:', resp.status);
            return null;
        }
        const data = await resp.json();
        if (data.success && data.session_id) {
            // Store session ID from backend (authoritative source)
            globalState.sessionId = data.session_id;
            localStorage.setItem('sessionId', data.session_id);
            console.log('[TABLE_MAKER] Session initialized from backend:', data.session_id);

            // Connect WebSocket now that we have a confirmed session
            if (typeof connectToSession === 'function') {
                console.log('[TABLE_MAKER] Pre-connecting WebSocket for session:', data.session_id);
                connectToSession(data.session_id);
            }
            return data;
        }
        return null;
    })
    .catch(err => {
        // Non-fatal - startTableConversation will get session from backend if this fails
        console.warn('[TABLE_MAKER] Lambda warmup failed (non-fatal):', err.message);
        return null;
    });

    tableMakerState.warmupPromise = warmupPromise;
    tableMakerState.preInitialized = true;
}

/**
 * Wait for warmup to complete (call before first API request)
 */
async function awaitWarmup() {
    if (tableMakerState.warmupPromise) {
        await tableMakerState.warmupPromise;
        tableMakerState.warmupPromise = null;
    }
}

// Reset table maker state - call when starting a new conversation
// NOTE: Does NOT reset preInitialized/warmupPromise - those track Lambda warmup
// which should persist across conversation resets within the same user session
function resetTableMakerState() {
    console.log('[TABLE_MAKER] Resetting state for new conversation');
    tableMakerState.cardId = null;
    tableMakerState.conversationId = null;
    tableMakerState.messages = [];
    tableMakerState.confirmationResponse = null;
    tableMakerState.previewData = null;
    tableMakerState.previewCardId = null;
    tableMakerState.table_name = null;
    tableMakerState.reasoning = null;
    tableMakerState.clarifying_questions = null;
    // NOTE: Do NOT reset preInitialized/warmupPromise here!
    // Those track Lambda warmup state which persists across conversations.
    // They are only reset when the user explicitly starts a fresh table maker flow.
}

function handleTableExecutionUpdate(message) {
    const conversationId = message.conversation_id;
    const phase = message.phase;
    const currentStep = message.current_step;
    const progressPercent = message.progress_percent;
    const status = message.status;

    // CRITICAL: Check phase field
    // If phase='interview', these are dummy messages - show progress but don't trigger actions
    // If phase='execution', these are real - trigger UI changes
    const isRealExecution = (phase === 'execution');

    // Always update progress bar (for both interview and execution phases)
    if (progressPercent !== undefined && status) {
        // Find the most recent card to update progress
        if (cardHandlers.size > 0) {
            const latestCardId = Array.from(cardHandlers.keys()).pop();
            const progressText = document.querySelector(`#${latestCardId} .progress-text`);
            const progressTrack = document.querySelector(`#${latestCardId} .progress-track`);
            const progressSquare = document.querySelector(`#${latestCardId} .progress-square`);

            if (progressText) {
                progressText.textContent = status;
            }

            // Find the wrapper and move it (not the square directly)
            const progressWrapper = document.querySelector(`#${latestCardId} .progress-square-wrapper`);
            if (progressWrapper && progressTrack) {
                const trackWidth = progressTrack.offsetWidth || 120; // default to 120px if not measured
                const wrapperWidth = 37.5; // wrapper is 37.5px wide
                const wrapperOffset = wrapperWidth / 2; // offset to center it
                const position = (progressPercent / 100) * trackWidth - wrapperOffset;
                progressWrapper.style.left = `${position}px`;
            }
        }
    }

    // Only trigger UI changes for real execution messages
    if (!isRealExecution) {
        return; // Dummy message, just update progress, don't trigger boxes
    }

    // DEBUG: Log execution updates to help debug info boxes
    // Handling table execution update

    // Handle step-specific updates (ONLY for real execution)
    switch(currentStep) {
        case 1:
            // Columns complete - clean up card and show colored boxes
            if (message.columns && message.table_name) {
                // Get the latest card ID
                if (cardHandlers.size > 0) {
                    const latestCardId = Array.from(cardHandlers.keys()).pop();
                    const card = document.getElementById(latestCardId);

                    if (card) {
                        // Keep conversation visible - only add progress container for boxes
                        const cardContent = card.querySelector('.card-content');
                        if (cardContent) {
                            // Check if progress container already exists
                            let progressContainer = document.getElementById(`${latestCardId}-progress-content`);
                            if (!progressContainer) {
                                // Add a container for the progress messages and boxes (below conversation)
                                progressContainer = document.createElement('div');
                                progressContainer.id = `${latestCardId}-progress-content`;
                                progressContainer.style.marginTop = '1rem';
                                cardContent.appendChild(progressContainer);
                            }
                        }

                        // Hide buttons during execution
                        const buttonsContainer = document.getElementById(`${latestCardId}-buttons`);
                        if (buttonsContainer) buttonsContainer.style.display = 'none';
                    }
                }

                // Show requirements box first if available
                if (message.requirements) {
                    showRequirementsBox(conversationId, message.requirements);
                }

                // Show colored boxes
                showColumnsBoxes(conversationId, message.columns);

                // Show prepopulated rows if available (from column definition)
                if (message.prepopulated_rows && message.prepopulated_rows.length > 0) {
                    showPrepopulatedRowsBox(
                        conversationId,
                        message.prepopulated_rows,
                        message.total_prepopulated || message.prepopulated_rows.length
                    );
                }
            }
            break;

        case 2:
            // Rows discovered - show rows box
            // Backend sends discovered_rows during step 2 (row discovery phase)
            if (message.discovered_rows) {
                // Showing discovered rows
                showDiscoveredRowsBox(
                    conversationId,
                    message.discovered_rows,
                    message.total_discovered || message.discovered_rows.length
                );
            }
            break;

        case 4:
            // QC complete - check for insufficient rows scenario first
            if (message.insufficient_rows && message.total_approved < 4) {
                showInsufficientRowsMessage(
                    conversationId,
                    message.insufficient_rows_statement,
                    message.insufficient_rows_recommendations,
                    message.total_approved || 0
                );
            }

            // Still update rows box with what we have
            if (message.approved_rows || message.approved_row_count !== undefined) {
                updateRowsBoxWithApproved(
                    conversationId,
                    message.approved_rows || [],
                    message.total_approved || message.approved_row_count || 0,
                    message.qc_summary,
                    message.total_discovered
                );
            }
            break;
    }
}

function showInsufficientRowsMessage(conversationId, statement, recommendations, approvedCount) {
    if (cardHandlers.size === 0) return;

    const latestCardId = Array.from(cardHandlers.keys()).pop();
    const card = document.getElementById(latestCardId);
    if (!card) return;

    let progressContent = document.getElementById(`${latestCardId}-progress-content`);
    if (!progressContent) {
        progressContent = card.querySelector('.card-content');
    }
    if (!progressContent) return;

    // Build recommendations HTML
    let recsHtml = '';
    if (recommendations && recommendations.length > 0) {
        recsHtml = '<ul style="margin: 0.5em 0; padding-left: 1.5em;">';
        recommendations.forEach(rec => {
            recsHtml += `<li><strong>${rec.issue}:</strong> ${rec.recommendation}</li>`;
        });
        recsHtml += '</ul>';
    }

    // Create insufficient rows message box (warning color - orange/yellow)
    const messageHtml = `
        <div class="message" style="margin: 1rem 0; background-color: #fff3e0; color: #e65100; border: 2px solid #ffb74d;">
            <span class="message-icon">[!]</span>
            <div>
                <strong>Insufficient Results (${approvedCount} rows found)</strong><br><br>
                ${statement}<br><br>
                ${recsHtml ? '<strong>Suggestions for better results:</strong>' + recsHtml : ''}
                <div style="margin-top: 1em;">
                    <button class="std-button secondary" onclick="restartTableMaker('${conversationId}')">
                        <span class="button-text">Start New Table</span>
                    </button>
                </div>
            </div>
        </div>
    `;

    progressContent.innerHTML += messageHtml;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartTableMaker(conversationId) {
    // Reset warmup state so we get a fresh session for the new conversation
    tableMakerState.preInitialized = false;
    tableMakerState.warmupPromise = null;
    // Clear the old session so backend generates a new one
    globalState.sessionId = null;
    localStorage.removeItem('sessionId');
    // Pre-initialize for the new conversation (will now actually run since preInitialized is false)
    preInitializeTableMaker();
    // Create a new table maker card to start fresh
    createTableMakerCard();
}

function handleTableExecutionComplete(message) {
    const conversationId = message.conversation_id;

    // Get the table maker card ID
    let tableMakerCardId = null;
    if (cardHandlers.size > 0) {
        tableMakerCardId = Array.from(cardHandlers.keys()).pop();
    }

    if (tableMakerCardId) {
        // Update the progress indicator to show completion (but don't hide it yet)

        // Update the card to show it's complete
        const card = document.getElementById(tableMakerCardId);
        if (card) {
            const cardSubtitle = card.querySelector('.card-subtitle');
            if (cardSubtitle) {
                cardSubtitle.textContent = `${message.table_name} - ${message.row_count} rows generated`;
            }

            // Add a success message to the card
            const messagesDiv = document.getElementById(`${tableMakerCardId}-messages`);
            if (messagesDiv) {
                const successMsg = document.createElement('div');
                successMsg.className = 'message message-success';
                successMsg.innerHTML = `
                    <span class="message-icon">[SUCCESS]</span>
                    <div>Table generation complete! ${message.row_count} rows ready for validation.</div>
                `;
                messagesDiv.appendChild(successMsg);
            }
        }
    }

    // Store the table data in global state for the preview
    if (message.csv_s3_key) globalState.csvS3Key = message.csv_s3_key;
    if (message.config_s3_key) globalState.configS3Key = message.config_s3_key;
    if (message.table_name) globalState.tableName = message.table_name;
    if (message.row_count) globalState.rowCount = message.row_count;

    // Mark config as ready (similar to after AI configuration)
    globalState.configValidated = true;
    globalState.configStored = true;
    globalState.excelFileUploaded = true;

    // Create preview card immediately
    // Creating preview validation card
    globalState.activePreviewCard = null;
    createPreviewCard();

    // CRITICAL FIX: Only hide the progress indicator AFTER the preview card is created
    // This prevents the indicator from disappearing before the user sees what's next
    // Wait for preview card to be visible (createPreviewCard adds DOM elements immediately)
    setTimeout(() => {
        if (tableMakerCardId) {
            // Complete with a shorter delay since preview is already visible
            completeThinkingInCard(tableMakerCardId, 'Complete!', 800);
        }
    }, 500); // Wait 500ms for preview card to render and become visible
}

function handleTableExecutionRestructure(message) {
    const conversationId = message.conversation_id;
    let tableMakerCardId = null;
    if (cardHandlers.size > 0) {
        tableMakerCardId = Array.from(cardHandlers.keys()).pop();

function handleTableExecutionUnrecoverable(message) {
    let tableMakerCardId = null;
    if (cardHandlers.size > 0) {
        tableMakerCardId = Array.from(cardHandlers.keys()).pop();
    }
    if (!tableMakerCardId) return;

    // Guard: If rows have already been discovered, this message is likely stale/invalid
    // This can happen when navigating away and back, receiving out-of-order WebSocket messages
    const hasDiscoveredRows = document.querySelector('.discovered-rows-box');
    if (hasDiscoveredRows) {
        console.log('[UNRECOVERABLE] Ignoring - rows already discovered, message likely stale');
        return;
    }

    // Guard: If config has been generated successfully, don't treat as unrecoverable
    if (globalState.currentConfig || globalState.configStored) {
        console.log('[UNRECOVERABLE] Ignoring - config already generated');
        return;
    }

    console.log('[UNRECOVERABLE] Request is impossible');
    completeThinkingInCard(tableMakerCardId, 'Unable to discover rows');

    const card = document.getElementById(tableMakerCardId);
    if (card) {
        const messagesDiv = document.getElementById(`${tableMakerCardId}-messages`);
        if (messagesDiv) {
            const apologyMsg = document.createElement('div');
            apologyMsg.className = 'message message-error';
            apologyMsg.innerHTML = `

                <div>${message.user_facing_apology || "I wasn't able to find rows for this table."}</div>

function createRestructureDetails(message) {
    const guidance = message.restructuring_guidance || {};

    let html = '<details style="margin-top: 10px; font-size: 14px;"><summary style="cursor: pointer; color: #2196F3;">Show Details</summary><div style="margin-top: 8px; padding-left: 12px; border-left: 3px solid #2196F3;">';
    if (reasoning) html += `<p><strong>Why:</strong> ${reasoning}</p>`;
    if (guidance.column_changes) html += `<p><strong>Column Changes:</strong> ${guidance.column_changes}</p>`;
    if (guidance.requirement_changes) html += `<p><strong>Requirements:</strong> ${guidance.requirement_changes}</p>`;
    if (guidance.search_broadening) html += `<p><strong>Search Broadening:</strong> ${guidance.search_broadening}</p>`;
    if (improvements.length > 0) {
        html += '<p><strong>Lessons Learned:</strong></p><ul style="margin: 4px 0; padding-left: 20px;">';
        improvements.slice(0, 5).forEach(imp => html += `<li>${imp}</li>`);

}

function showRequirementsBox(conversationId, requirements) {
    // Find the most recent card
    if (cardHandlers.size === 0) return;

    const latestCardId = Array.from(cardHandlers.keys()).pop();
    const card = document.getElementById(latestCardId);
    if (!card) return;

    // Find the progress-content container created in step 1
    let progressContent = document.getElementById(`${latestCardId}-progress-content`);
    if (!progressContent) {
        // Fallback: use card-content if progress-content doesn't exist
        progressContent = card.querySelector('.card-content');
    }
    if (!progressContent) return;

    // Helper function to strip citations and format text (using ID columns pattern)
    function formatRequirementsText(text) {
        if (!text || text === '(None)') return '(None)';

        // Strip citations [1], [2], etc.
        let formatted = text.replace(/\[\d+\]/g, '');

        // Split by newlines and filter empty
        const lines = formatted.split('\n').filter(line => line.trim());

        // Format each line with bullet (copy ID columns pattern)
        const formattedLines = lines.map(line => {
            // Remove leading "- " if present
            const content = line.replace(/^- /, '').trim();
            if (!content) return '';

            // Add colored bullet inline (pink for requirements)
            return `<span style="display: inline-block; width: 0.8em; height: 0.8em; background: #880e4f; border-radius: 50%; margin-right: 6px; vertical-align: middle;"></span>${content}`;
        }).filter(item => item);

        // Join with <br> (COPY COLUMNS PATTERN)
        return formattedLines.join('<br>');
    }

    // Format hard requirements
    const hardReqs = formatRequirementsText(requirements.hard);
    const softReqs = formatRequirementsText(requirements.soft);

    // Create requirements box HTML (Quinary color - pink/magenta)
    const requirementsBoxHtml = `
        <div class="message" style="margin-bottom: 1rem; background-color: #fce4ec; color: #880e4f; border: 1px solid #f8bbd0;">
            <span class="message-icon">ℹ️</span>
            <div>
                <strong>Row Requirements</strong><br>
                <strong style="font-weight: 700;">Hard Requirements:</strong><br>
                ${hardReqs}<br>
                <strong>Soft Requirements:</strong><br>
                ${softReqs}
            </div>
        </div>
    `;

    // Add to progress content
    progressContent.innerHTML += requirementsBoxHtml;

    // Scroll card into view
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

    const researchBoxHtml = `
        <div class="message" style="margin-bottom: 1rem; background-color: #f3e5f5; color: #6a1b9a; border: 1px solid #ce93d8;">
            <span class="message-icon">ℹ️</span>

function showPrepopulatedRowsBox(conversationId, prepopulatedRows, totalCount) {

function showClaimsInfoBox(cardId, claims, totalCount = null) {
    const card = document.getElementById(cardId);
    if (!card) return;

    // Use provided totalCount or fall back to claims.length
    const total = totalCount || claims.length;

    const claimsToShow = claims.slice(0, 10);
    const claimsListHtml = claimsToShow.map((claim, index) => {
        // Extract just reference numbers (e.g., [1][2][3] → "1,2,3")
        const refs = claim.reference || 'None';
        let refNumbers = 'None';
        if (refs !== 'None') {
            const matches = refs.match(/\[(\d+)\]/g);
            if (matches) {
                refNumbers = matches.map(m => m.replace(/[\[\]]/g, '')).join(',');
            }
        }

        // Simple number instead of claim_001
        const claimNum = index + 1;
        const statementPreview = claim.statement.length > 100
            ? claim.statement.substring(0, 100) + '...'
            : claim.statement;
        return `<strong>${claimNum}.</strong> ${statementPreview} <span style="color: #666;">[${refNumbers}]</span>`;
    }).join('<br>');

    const moreText = total > 10 ? `<br><em>+${total - 10} more claims</em>` : '';
    const countText = total > 10 ? ` (first ${claimsToShow.length} of ${total})` : '';

    const boxHtml = `
        <div class="message claims-info-box" style="margin-bottom: 1rem; background-color: #fff3e0; color: #e65100; border: 1px solid #ffb74d;">
            <span class="message-icon">📝</span>
            <div><strong>Extracted Claims</strong>${countText}:<br>${claimsListHtml}${moreText}</div>
        </div>
    `;

    // Find form element and insert before success div
    const formEl = document.getElementById(`${cardId}-form`);
    const successEl = document.getElementById(`${cardId}-success`);
    if (formEl && successEl) {
        successEl.insertAdjacentHTML('beforebegin', boxHtml);
    } else if (formEl) {
        formEl.insertAdjacentHTML('afterend', boxHtml);
    }
}

        const rowsToShow = sampleRows.slice(0, 3);

            const colName = col.name || col;
            const isId = col.importance && col.importance.toUpperCase() === 'ID';
            const idMarker = isId ? '🔵 ' : '';
            const values = rowsToShow.map(row => {

                return String(value).substring(0, 50);
            });
            return `| ${idMarker}**${colName}** | ${values.join(' | ')} |`;
        }).join('\n');

        const header = `| Column | ${rowsToShow.map((_, i) => `Row ${i + 1}`).join(' | ')} |`;
        const separator = `| --- | ${rowsToShow.map(() => '---').join(' | ')} |`;
        const markdownTable = `${header}\n${separator}\n${transposedRows}`;
        tableHtml = renderMarkdown(markdownTable);
    }

        async function handlePdfUpload(cardId, file) {
const messagesDiv = document.getElementById(`${cardId}-messages`);

try {
    // Validate file type
    if (!file.name.toLowerCase().endsWith('.pdf')) {
        completeThinkingInCard(cardId, 'Invalid file type');
        showMessage(messagesDiv.id, 'Please select a PDF file', 'error');
        return;
    }

    // Validate file size (50MB max - no longer limited by API Gateway!)
    const maxSize = 50 * 1024 * 1024;
    if (file.size > maxSize) {
        completeThinkingInCard(cardId, 'File too large');
        showMessage(messagesDiv.id, `PDF file too large. Maximum size is ${maxSize / 1024 / 1024}MB`, 'error');
        return;
    }

    // Show initial progress
    showThinkingInCard(cardId, `Preparing to upload ${file.name}...`, true);

    // Step 1: Request presigned URL from backend
    const presignedResponse = await fetch(`${API_BASE}/validate`, {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({
            action: 'requestPresignedUrl',
            file_type: 'pdf',
            filename: file.name,
            file_size: file.size,
            email: globalState.email,
            session_id: globalState.sessionId || ''
        })
    });

    const presignedData = await presignedResponse.json();

    if (!presignedResponse.ok || !presignedData.success) {
        throw new Error(presignedData.message || 'Failed to get upload URL');
    }

    // Store upload ID and session ID
    const uploadId = presignedData.upload_id;
    const s3Key = presignedData.s3_key;
    const sessionId = presignedData.session_id;

    // Store session_id if backend generated one
    if (sessionId && !globalState.sessionId) {
        globalState.sessionId = sessionId;
        localStorage.setItem('sessionId', sessionId);
    }

    referenceCheckState.pdfId = uploadId;
    referenceCheckState.pdfFilename = file.name;

    // Update progress
    showThinkingInCard(cardId, `Uploading ${file.name} to secure storage...`, true);

    // Step 2: Upload file directly to S3 using presigned URL
    // IMPORTANT: Include metadata as x-amz-meta-* headers to match presigned URL params
    const uploadResponse = await fetch(presignedData.presigned_url, {
        method: 'PUT',
        body: file,
        headers: {
            'Content-Type': presignedData.content_type,  // Use content type from backend
            'x-amz-meta-upload_id': uploadId,
            'x-amz-meta-original_filename': file.name,
            'x-amz-meta-email': globalState.email,
            'x-amz-meta-session_id': sessionId,
            'x-amz-meta-file_type': 'pdf',
            'x-amz-meta-file_size': file.size.toString(),
            'x-amz-meta-uploaded_at': new Date().toISOString()
        }
    });

    if (!uploadResponse.ok) {
        throw new Error(`Upload failed with status ${uploadResponse.status}`);
    }

    console.log('[PDF_UPLOAD] File uploaded to S3 successfully');

    // Step 3: Confirm upload complete and trigger processing
    const confirmResponse = await fetch(`${API_BASE}/validate`, {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({
            action: 'confirmUploadComplete',
            upload_id: uploadId,
            s3_key: s3Key,
            session_id: sessionId,
            file_type: 'pdf',
            filename: file.name,
            email: globalState.email
        })
    });

    const confirmData = await confirmResponse.json();

    if (!confirmResponse.ok || !confirmData.success) {
        throw new Error(confirmData.message || 'Failed to confirm upload');
    }

    // Show progress indicator and wait for WebSocket updates
    showThinkingInCard(cardId, `${file.name} uploaded successfully. Reading PDF...`, true);

    // Connect to WebSocket to receive conversion result
    connectToSession(sessionId);

    // Register WebSocket handler for PDF conversion
    unregisterCardHandler(cardId);
    registerCardHandler(cardId, ['pdf_conversion_progress', 'pdf_conversion_complete', 'pdf_conversion_error'], (wsData) => {
        handlePdfConversionMessage(cardId, wsData, file.name);
    });

} catch (error) {
    console.error('[PDF_UPLOAD] Error:', error);
    completeThinkingInCard(cardId, 'Upload failed');
    showMessage(messagesDiv.id,
        `Error uploading PDF: ${error.message}`,
        'error'
    );
}
        }

}
else if (message.type === 'pdf_conversion_error') {

async function startPreview(cardId) {
    // Track preview conversion
    trackPreviewConversion(globalState.sessionId);

    // Reset completion state for new preview (fixes hang on repeated previews)
    if (typeof resetCompletionState === 'function') {
        resetCompletionState();
    } else {
        validationCompletionHandled = false;
    }

    // Show thinking indicators
    showThinkingInCard(cardId, 'Preparing preview...', true);
    // Start dummy progress animation for preview
    startDummyProgress(cardId, 90000); // 90 seconds estimated for preview
    // Progress routed to card level;

    try {
        // Always use multipart form for preview since backend expects files

        const formData = new FormData();

        // Only append Excel file if not already uploaded
        if (!globalState.excelFileUploaded) {
            formData.append('excel_file', globalState.excelFile);
        } else {
            // Send a dummy file to satisfy backend file requirement
            const dummyFile = new Blob([JSON.stringify({use_stored_files: true})], {
                type: 'application/json'
            });
            formData.append('dummy_file', dummyFile, 'stored_files_marker.json');
        }

        formData.append('email', globalState.email);
        if (globalState.sessionId) {
            formData.append('session_id', globalState.sessionId);
        } else {
            throw new Error('No session ID available. Please upload an Excel file first.');
        }

        const url = `${API_BASE}/validate?async=true&preview_first_row=true&preview_max_rows=3`;

        const fetchHeaders = {};
        const token = localStorage.getItem('sessionToken');
        if (token) fetchHeaders['X-Session-Token'] = token;

        const response = await fetch(url, {
            method: 'POST',
            headers: fetchHeaders,
            body: formData
        });

        const data = await response.json();

        if (response.ok && data.status === 'processing') {
            // Use the actual session_id returned by the backend instead of guessing
            const actualSessionId = data.session_id || `${globalState.sessionId}_preview`;

            // Use unified WebSocket system
            connectToSession(actualSessionId);
            unregisterCardHandler(cardId);
            registerCardHandler(cardId, ['preview', 'preview_progress', 'progress_update'], (wsData, handlerCardId) => {
                handlePreviewWebSocketMessage(wsData, handlerCardId);
            });

            globalState.excelFileUploaded = true;
            if (data.storage_path) {
                globalState.storagePath = data.storage_path;
            }
        } else if (response.ok && data.success) {
            // Handle case where it completed immediately
            globalState.excelFileUploaded = true;
            if (data.preview_data) {
                showPreviewResults(cardId, data.preview_data);
            }
        } else {
            throw new Error(data.error || 'Failed to start preview');
        }
    } catch (error) {
        completeThinkingInCard(cardId, 'Preview failed');
        // Progress routed to card level;
        showMessage(`${cardId}-messages`, `Error: ${error.message}`, 'error');
    }
}

// Fixed handlePreviewWebSocketMessage to use card-specific progress
function handlePreviewWebSocketMessage(data, cardId) {

    if (data.status === 'PROCESSING') {
        // Set this card as active for ticker display
        globalState.activeCardId = cardId;

        // Only initialize polling on FIRST PROCESSING message (when state changes to 'preview')
        const isFirstProcessingMessage = globalState.currentValidationState !== 'preview';

        globalState.currentValidationState = 'preview';

        if (isFirstProcessingMessage) {
            // Reset completion state and start fallback polling for robustness
            if (typeof resetCompletionState === 'function') {
                resetCompletionState();
            }

            // Start fallback polling in case WebSocket drops during preview validation
            if (typeof setupWebSocketFallback === 'function' && globalState.sessionId) {
                setupWebSocketFallback(globalState.sessionId, {
                    pollInterval: 10000,  // Check every 10 seconds for preview (shorter duration)
                    maxDuration: 10 * 60 * 1000,  // 10 minutes max for preview
                    isPreview: true
                });
            }

            // Start inactivity timer for preview (shows warning if no updates for 3 minutes)
            const sessionId = globalState.sessionId;
            const inactivityTimeoutMs = 3 * 60 * 1000; // 3 minutes
            if (!window.asyncTimeouts) window.asyncTimeouts = new Map();

            const startInactivityTimer = () => {
                const existing = window.asyncTimeouts.get(sessionId);
                if (existing && existing.inactivityTimer) {
                    clearTimeout(existing.inactivityTimer);
                }

                const inactivityTimer = setTimeout(() => {
                    const timeoutInfo = window.asyncTimeouts.get(sessionId);
                    if (timeoutInfo && timeoutInfo.activeProcessing) {
                        // Save restorable state before showing warning
                        if (typeof saveRestorableState === 'function') {
                            saveRestorableState(cardId, 'preview');
                        }
                        if (typeof showValidatorDeathWarning === 'function') {
                            showValidatorDeathWarning(cardId, sessionId);
                        }
                    }
                    window.asyncTimeouts.delete(sessionId);
                }, inactivityTimeoutMs);

                if (window.asyncTimeouts.has(sessionId)) {
                    window.asyncTimeouts.get(sessionId).inactivityTimer = inactivityTimer;
                } else {
                    window.asyncTimeouts.set(sessionId, { inactivityTimer });
                }
            };

            startInactivityTimer();
            window.asyncTimeouts.get(sessionId).restartInactivityTimer = startInactivityTimer;
            window.asyncTimeouts.get(sessionId).activeProcessing = true;

            // Clear confidence scores for fresh running average
            globalState.confidenceScores = [];
            globalState.currentConfidenceScore = null;
        } else {
            // Not first message - restart inactivity timer if it exists
            const sessionId = globalState.sessionId;
            if (window.asyncTimeouts && window.asyncTimeouts.has(sessionId)) {
                const timeoutInfo = window.asyncTimeouts.get(sessionId);
                if (timeoutInfo && timeoutInfo.restartInactivityTimer) {
                    timeoutInfo.restartInactivityTimer();
                    timeoutInfo.activeProcessing = true;

                    // Recovery: If we previously showed a warning, clear it
                    if (timeoutInfo.warningShown) {
                        const progressText = document.querySelector(`#${cardId} .progress-text`);
                        if (progressText) {
                            progressText.style.color = '#666';
                        }
                        const progressSquare = document.querySelector(`#${cardId} .progress-square, #${cardId} .thinking-square`);
                        if (progressSquare) {
                            progressSquare.classList.remove('fast-heartbeat');
                        }
                        timeoutInfo.warningShown = false;
                    }
                }
            }
        }

        const message = data.verbose_status || 'Processing...';
        // Update both text and progress if we have percent_complete
        if (data.percent_complete !== undefined) {
            updateThinkingProgress(cardId, data.percent_complete, message);
        } else {
            updateThinkingInCard(cardId, message);
        }
        // Progress routed to card level;
    } else if (data.status === 'COMPLETED') {
        // Stop fallback polling since we received completion via WebSocket
        if (typeof stopFallbackPolling === 'function') {
            stopFallbackPolling();
        }

        // Clear inactivity timer
        const sessionId = globalState.sessionId;
        if (window.asyncTimeouts && window.asyncTimeouts.has(sessionId)) {
            const timeoutInfo = window.asyncTimeouts.get(sessionId);
            if (timeoutInfo && timeoutInfo.inactivityTimer) {
                clearTimeout(timeoutInfo.inactivityTimer);
            }
            window.asyncTimeouts.delete(sessionId);
        }

        // Hide ticker but KEEP messages for full validation
        globalState.currentValidationState = null;
        hideTicker(cardId);
        // DON'T clear messages - keep them for full validation
        if (globalState.activeCardId === cardId) {
            globalState.activeCardId = null;
        }
        // First update to 100% if we have a progress bar
        const indicator = document.getElementById(`${cardId}-thinking`);
        if (indicator && indicator.classList.contains('with-progress')) {
            updateThinkingProgress(cardId, 100, 'Preview complete!');
            setTimeout(() => {
                completeThinkingInCard(cardId, 'Preview complete!');
            }, 500);

            // Wait for shrink animation to complete before showing results
            // 500ms + 300ms (move to 100%) + 600ms (completion) + 1000ms (shrink) = 2400ms
            if (data.preview_data) {
                setTimeout(() => {
                    showPreviewResults(cardId, data.preview_data);
                }, 2400);
            }
        } else {
            completeThinkingInCard(cardId, 'Preview complete!');
            // No progress bar, show results immediately
            if (data.preview_data) {
                showPreviewResults(cardId, data.preview_data);
            }
        }
        // Progress routed to card level;
    } else if (data.status === 'FAILED' || data.status === 'ERROR') {
        completeThinkingInCard(cardId, 'Preview failed');
        // Progress routed to card level;

        const errorMessage = data.error_message || data.verbose_status || 'Preview validation failed';
        showMessage(`${cardId}-messages`, `Error: ${errorMessage}`, 'error');
        console.error('Preview failed:', data);
    }
}

// 6. Processing Card
function createProcessingCard() {
    // GUARD: Prevent duplicate processing
    if (globalState.processingInProgress) {
        console.error('[GUARD] ❌ DUPLICATE PROCESSING BLOCKED - already in progress');
        console.trace('[GUARD] Stack trace of duplicate call:');
        return null;
    }
    globalState.processingInProgress = true;

    const cardId = generateCardId();
    const content = `
        <div id="${cardId}-messages"></div>
    `;

    const card = createCard({
        id: cardId,  // Pass explicit ID
        icon: '⚡',
        title: 'Process',
        subtitle: 'Validating your entire table...',
        content
    });

    // Update workflow state
    globalState.workflowPhase = 'validating';

    // Ensure processingState exists and set validation state
    ensureProcessingState();
    globalState.processingState.validationStartTime = Date.now();
    globalState.processingState.validationCompleted = false;

    // Start processing
    startFullProcessing(cardId);

    return card;
}

async function startFullProcessing(cardId) {
    // SECURITY: Get fresh balance before processing to prevent payment bypass
    let currentBalance = globalState.accountBalance || 0;
    const estimatedCost = globalState.estimatedCost || 0;
    const effectiveCost = globalState.effectiveCost ?? estimatedCost; // Use ?? not || so 0 doesn't fall back

    // If balance seems wrong, refresh it
    if (currentBalance === 0 || currentBalance === undefined) {
        try {
            await refreshCurrentBalance();
            currentBalance = globalState.accountBalance || 0;
        } catch (error) {
            console.error('[SECURITY] Could not refresh balance:', error);
        }
    }


    if (currentBalance < effectiveCost) {
        console.warn(`[SECURITY] Payment bypass attempt blocked - insufficient balance (balance: ${currentBalance}, effectiveCost: ${effectiveCost})`);
        completeThinkingInCard(cardId, 'Insufficient Balance');

        // Use centralized payment state controller to record intent
        // This replaces the fragile function reference approach
        if (typeof setPendingProcessingIntent === 'function') {
            setPendingProcessingIntent(cardId, effectiveCost);
        } else {
            // Fallback: set legacy flags directly
            globalState.userAttemptedProcessing = true;
            globalState.hasInsufficientBalance = true;
        }

        // Reset any buttons that might be in "Processing..." state
        setTimeout(() => {
            const processingButtons = document.querySelectorAll('button .button-text');
            processingButtons.forEach(buttonText => {
                if (buttonText.textContent.includes('Processing...')) {
                    // Find what the button text should be based on balance
                    const sufficientBalance = currentBalance >= effectiveCost;
                    if (sufficientBalance) {
                        buttonText.textContent = `✨ Process Table${effectiveCost ? ` ($${effectiveCost.toFixed(2)})` : ''}`;
                    } else {
                        const creditsNeeded = Math.max(0, effectiveCost - currentBalance);
                        const recommendedAmount = Math.ceil(creditsNeeded);
                        buttonText.textContent = `💳 Add Credits ($${recommendedAmount.toFixed(2)})`;
                    }
                    buttonText.closest('button').disabled = false;
                }
            });
        }, 100);

        showInsufficientBalanceError({
            current_balance: currentBalance,
            estimated_minimum_cost: effectiveCost
        }, cardId);
        return;
    }

    // Track full validation conversion (balance check passed)
    trackFullValidationConversion(globalState.sessionId, effectiveCost);

    // Show thinking indicators with contextual message
    showThinkingInCard(cardId, 'Initializing validation process...', true);
    // Start dummy progress animation
    startDummyProgress(cardId, 90000); // 90 seconds estimated
    // Progress routed to card level;

    try {

        // Always use multipart form for full processing
        const formData = new FormData();

        // Only append Excel file if not already uploaded
        if (!globalState.excelFileUploaded) {
            formData.append('excel_file', globalState.excelFile);
        } else {
            // Send a dummy config file to satisfy backend file requirement
            const dummyConfig = new Blob([JSON.stringify({use_stored_files: true})], {
                type: 'application/json'
            });
            formData.append('config_file', dummyConfig, 'stored_files_marker.json');
        }

        formData.append('email', globalState.email);
        if (globalState.sessionId) {
            formData.append('session_id', globalState.sessionId);
        } else {
            throw new Error('No session ID available. Please upload an Excel file first.');
        }

        const url = `${API_BASE}/validate?async=true`;

        const fetchHeaders = {};
        const token = localStorage.getItem('sessionToken');
        if (token) fetchHeaders['X-Session-Token'] = token;

        const response = await fetch(url, {
            method: 'POST',
            headers: fetchHeaders,
            body: formData
        });

        const data = await response.json();

        if (response.ok && data.status === 'processing') {
            globalState.excelFileUploaded = true;
            const wsSessionId = data.session_id || globalState.sessionId;

            // Connect to session and register processing handler
            connectToSession(wsSessionId);

            // Unregister any preview handlers to prevent conflicts
            cardHandlers.forEach((handlerInfo, existingCardId) => {
                if (handlerInfo.messageTypes.includes('preview')) {
                    unregisterCardHandler(existingCardId);
                }
            });

            unregisterCardHandler(cardId);
            registerCardHandler(cardId, ['processing'], (wsData, cardId) => {
                handleProcessingWebSocketMessage(wsData, cardId);
            });
        } else {
            throw new Error(data.error || 'Failed to start processing');
        }
    } catch (error) {
        console.error('Full processing error:', error);
        completeThinkingInCard(cardId, 'Processing failed');
        // Progress routed to card level;
        showMessage(`${cardId}-messages`, `Error: ${error.message}`, 'error');
        // Reset guard flag on error
        globalState.processingInProgress = false;
    }
}

function ensureProcessingState() {
    if (!globalState.processingState || typeof globalState.processingState !== 'object') {
        console.warn('[GLOBALSTATE] Reinitializing null/invalid processingState');
        globalState.processingState = {
            previewCompleted: false,
            validationCompleted: false,
            validationStartTime: null,
            previewStartTime: null,
            lastEstimatedCost: null,
            lastBalanceCheck: null
        };
    }
}

// ============================================
// TESTING UTILITIES
function handleProcessingWebSocketMessage(data, cardId) {
    // WebSocket message received

    if (data.status === 'PROCESSING') {
        // Set this card as active for ticker display
        globalState.activeCardId = cardId;

        // Only initialize polling on FIRST PROCESSING message (when state changes to 'full')
        // This prevents restarting the fallback polling on every progress update
        const isFirstProcessingMessage = globalState.currentValidationState !== 'full';

        globalState.currentValidationState = 'full';

        if (isFirstProcessingMessage) {
            // Reset completion state and start fallback polling for robustness
            if (typeof resetCompletionState === 'function') {
                resetCompletionState();
            }

            // Start fallback polling in case WebSocket drops during validation
            if (typeof setupWebSocketFallback === 'function' && globalState.sessionId) {
                setupWebSocketFallback(globalState.sessionId, {
                    pollInterval: 15000,  // Check every 15 seconds
                    maxDuration: 25 * 60 * 1000,  // 25 minutes max
                    isPreview: false
                });
            }

            // Clear confidence scores for fresh running average
            globalState.confidenceScores = [];
            globalState.currentConfidenceScore = null;
        }

        let message = data.verbose_status || 'Processing...';

        // If we have batch information, format it nicely
        if (data.current_batch !== undefined && data.total_batches !== undefined) {
            message = `Processing batch ${data.current_batch} of ${data.total_batches}`;
            if (data.processed_rows !== undefined) {
                message += ` (${data.processed_rows} rows processed)`;
            }
        }

        // Update both text and progress if we have percent_complete
        if (data.percent_complete !== undefined) {
            updateThinkingProgress(cardId, data.percent_complete, message);
        } else {
            updateThinkingInCard(cardId, message);
        }
        // Progress routed to card level;

    } else if (data.status === 'COMPLETED') {
        console.log(`[VALIDATION] COMPLETED handler called for cardId: ${cardId}`);

        // Stop fallback polling since we received completion via WebSocket
        if (typeof stopFallbackPolling === 'function') {
            stopFallbackPolling();
        }

        // Hide ticker but KEEP messages for next validation
        globalState.currentValidationState = null;
        hideTicker(cardId);
        // DON'T clear messages - keep them for full validation after preview
        if (globalState.activeCardId === cardId) {
            globalState.activeCardId = null;
        }
        // Store completion data for download
        globalState.completionData = data;

        // Mark validation as completed
        ensureProcessingState();
        globalState.processingState.validationCompleted = true;
        globalState.workflowPhase = 'completed';
        // Reset guard flag - processing complete
        globalState.processingInProgress = false;

        // First update to 100% if we have a progress bar
        const indicator = document.getElementById(`${cardId}-thinking`);
        const hasProgress = indicator && indicator.classList.contains('with-progress');

        console.log(`[VALIDATION] cardId: ${cardId}, indicator exists: ${!!indicator}, hasProgress: ${hasProgress}`);

        if (hasProgress) {
            updateThinkingProgress(cardId, 100, 'Validation complete!');
            setTimeout(() => {
                completeThinkingInCard(cardId, 'Validation complete!');
            }, 500);
        } else {
            completeThinkingInCard(cardId, 'Validation complete!');
        }
        // Progress routed to card level;

        globalState.processedRows = data.processed_rows || 0;
        globalState.totalRows = data.total_rows || 0;

        // Show success message after shrink animation completes (if progress bar present)
        // 500ms + 300ms (move to 100%) + 600ms (completion) + 1000ms (shrink) = 2400ms
        const showResultsDelay = hasProgress ? 2400 : 0;

        setTimeout(() => {
            let messagesContainer = document.getElementById(`${cardId}-messages`);
            let actualCardId = cardId;

            // FALLBACK: If the expected container doesn't exist, find the most recent processing card
            if (!messagesContainer) {
                console.warn(`[VALIDATION] Messages container not found for cardId: ${cardId}, searching for fallback...`);

                // Find any card with a messages container (most recent card)
                const allCards = document.querySelectorAll('[id^="card-"]');
                for (let i = allCards.length - 1; i >= 0; i--) {
                    const card = allCards[i];
                    const container = card.querySelector('[id$="-messages"]');
                    if (container) {
                        messagesContainer = container;
                        actualCardId = card.id;
                        console.log(`[VALIDATION] Using fallback container from card: ${actualCardId}`);
                        break;
                    }
                }
            }

            if (!messagesContainer) {

                // Last resort: create a new completion card

    }

    // Show loading state
    container.innerHTML = '<p style="color: #999; font-style: italic; text-align: center; padding: 1rem;">Loading interactive table...</p>';

    try {
        const requestBody = {
            action: 'getViewerData',
            session_id: sessionId,
            is_preview: false  // Request full validation data, not preview
        };

        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify(requestBody)
        });

        const data = await response.json();

        if (!data.success) {
            throw new Error(data.error || 'Failed to load viewer data');
        }

        // If metadata was too large to include inline, fetch it from S3
        if (data.metadata_too_large && data.json_download_url && !data.table_metadata) {
            console.log('[VALIDATION] Metadata too large, fetching from:', data.json_download_url);
            container.innerHTML = '<p style="color: #999; font-style: italic; text-align: center; padding: 1rem;">Loading large table data from S3...</p>';

            const metadataResponse = await fetch(data.json_download_url);
            if (!metadataResponse.ok) {
                throw new Error(`Failed to fetch metadata from S3: ${metadataResponse.status}`);
            }
            data.table_metadata = await metadataResponse.json();
            console.log('[VALIDATION] Successfully fetched large metadata from S3');
        }

        if (data.table_metadata) {
            // Store for JSON download
            globalState.validationTableMetadata = data.table_metadata;
            globalState.validationJsonUrl = data.json_download_url;

            // Render table with all rows
            const tableHtml = InteractiveTable.render(data.table_metadata, {
                showGeneralNotes: true,
                showLegend: true
            });
            container.innerHTML = tableHtml;
            InteractiveTable.init();

            console.log('[VALIDATION] Interactive table rendered successfully');
        } else {
            // No table metadata available
            console.warn('[VALIDATION] No table metadata in response:', data);
            container.innerHTML = '<p style="color: #999; font-style: italic; text-align: center; padding: 1rem;">Table preview unavailable. Download Excel for full results.</p>';
            if (infoEl) {
                infoEl.style.display = 'none';
            }
        }
    } catch (error) {
        console.error('[VALIDATION] Failed to load table:', error);
        container.innerHTML = '<p style="color: #999; font-style: italic; text-align: center; padding: 1rem;">Table preview unavailable. Download Excel for full results.</p>';
        if (infoEl) {
            infoEl.style.display = 'none';
        }
    }
}
