function showPreviewResults(cardId, previewData) {
    // Save preview data globally for restoration
    window.lastPreviewData = previewData;

    // Mark preview as completed
    ensureProcessingState();
    globalState.processingState.previewCompleted = true;

    // Hide progress, show results
    const resultsEl = document.getElementById(`${cardId}-results`);
    if (!resultsEl) {
        console.error(`Results element ${cardId}-results not found`);
        return;
    }
    resultsEl.style.display = 'block';

    // Render markdown table with blue info header
    const previewContent = document.getElementById(`${cardId}-preview-content`);
    if (previewContent && previewData.markdown_table) {
        // Generate download URL for full preview
        let fullPreviewUrl = '#';
        if (previewData.enhanced_download_url) {
            fullPreviewUrl = previewData.enhanced_download_url;
        } else if (previewData.full_preview_url) {
            fullPreviewUrl = previewData.full_preview_url;
        } else if (globalState.sessionId) {
            // Generate preview download URL based on session
            fullPreviewUrl = `${API_BASE}/download/${globalState.sessionId}/preview_results.xlsx`;
        }

        const headerHtml = `
            <div class="message message-info">
                <span class="message-icon">ℹ️</span>
                <span>Preview of first 3 rows (displayed as columns). Hover cells for quick info, click for full details. Use the buttons below to download, refine, or process the full table.</span>
            </div>
        `;

        // Check if revert button should be shown (only if this session has 2+ versions)
        const sessionVersionCount = previewData.session_version_count || 0;
        const showRevertButton = sessionVersionCount >= 2;

        const revertButtonHtml = showRevertButton ?
            `<button type="button" class="std-button quaternary" data-action="revert-config">
                    ↩️ Revert to Previous
                </button>` : '';

        // Fixed colors for preview card buttons
        const downloadColor = 'tertiary';  // orange
        const refineColor = 'secondary';   // purple

        // Hide refine button for reference check (static config cannot be refined)
        const refineButtonHtml = !globalState.isReferenceCheck ?
            `<button type="button" class="std-button ${refineColor}" data-action="refine-config">
                🔧 Refine Configuration
            </button>` : '';

        const actionsHtml = `
            <div style="display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; flex-wrap: wrap;">
                <button type="button" class="std-button ${downloadColor}" data-action="download-preview">
                    📥 Download Excel
                </button>
                <button type="button" class="std-button quaternary" data-action="download-json">
                    📋 Download JSON (for AI)
                </button>
                ${refineButtonHtml}
            </div>
            ${revertButtonHtml ? `<div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">${revertButtonHtml}</div>` : ''}
        `;

        // Build complete HTML upfront to avoid innerHTML += race condition with async fetch
        const tableContainerId = `${cardId}-table-container`;
        previewContent.innerHTML = headerHtml + `
            <div id="${tableContainerId}">
                <p style="color: #999; font-style: italic; text-align: center; padding: 1rem;">Loading interactive table...</p>
            </div>
        ` + actionsHtml;

        // Store the download URL for the button
        previewContent.dataset.fullPreviewUrl = fullPreviewUrl;

        // Fetch table metadata via API (async, non-blocking)
        // This avoids WebSocket payload size limits (same pattern as full validation)
        fetchAndRenderPreviewTable(tableContainerId, globalState.sessionId, previewData.markdown_table);
    }

    // Calculate cost values ONCE before display and button logic to ensure consistency
    const estimatedCost = previewData.cost_estimates ? (previewData.cost_estimates.quoted_validation_cost || previewData.cost_estimates.quoted_full_cost) : 0;
    const discount = previewData.cost_estimates?.discount || previewData.discount || 0;
    const effectiveCost = previewData.cost_estimates?.effective_cost !== undefined
        ? previewData.cost_estimates.effective_cost
        : Math.max(0, estimatedCost - discount);
    const accountInfo = previewData.account_info;
    const currentBalance = accountInfo?.current_balance || 0;
    // TRUST THE BACKEND - use its balance calculations, don't recalculate
    const sufficientBalance = accountInfo?.sufficient_balance ?? true;
    const creditsNeeded = accountInfo?.credits_needed || 0;

    // Store in global state for later use
    globalState.estimatedCost = estimatedCost;
    globalState.discount = discount;
    globalState.effectiveCost = effectiveCost;
    globalState.accountInfo = accountInfo;

    // Show cost estimates
    if (previewData.cost_estimates && previewData.validation_metrics) {
        const costEl = document.getElementById(`${cardId}-cost-estimate`);
        const estimatesEl = document.getElementById(`${cardId}-estimates`);

        if (costEl && estimatesEl) {
            costEl.style.display = 'block';

            const metrics = previewData.validation_metrics;
            const totalRows = previewData.total_rows || 0;
            const estimatedTime = previewData.cost_estimates.estimated_validation_time || 0;

            let estimatesHtml = '';

            if (totalRows > 0) {
                estimatesHtml += `<div class="cost-item"><span class="cost-label">Total Rows</span><span class="cost-value">${totalRows.toLocaleString()}</span></div>`;
            }

            if (metrics.validated_columns_count) {
                estimatesHtml += `<div class="cost-item"><span class="cost-label">Columns to Validate</span><span class="cost-value">${metrics.validated_columns_count}</span></div>`;
            }

            // Show total AI calls (validation + QC calls)
            // Clone counts as 1 call even if it makes multiple internal calls
            const totalSearchGroups = metrics.search_groups_count || 0;
            const qcCallsPerRow = metrics.qc_calls_per_row || 0;

            // DEBUG: Log the values being used
            console.log('[AI_CALLS_CALC] validation_metrics:', metrics);
            console.log('[AI_CALLS_CALC] totalRows:', totalRows);
            console.log('[AI_CALLS_CALC] search_groups_count:', totalSearchGroups);
            console.log('[AI_CALLS_CALC] qc_calls_per_row:', qcCallsPerRow);

            if (totalSearchGroups > 0 || qcCallsPerRow > 0) {
                // Total AI calls = (validation calls per row + QC calls per row) × total rows
                const callsPerRow = totalSearchGroups + qcCallsPerRow;
                const totalAICalls = totalRows * callsPerRow;
                console.log('[AI_CALLS_CALC] callsPerRow:', callsPerRow, '(groups:', totalSearchGroups, '+ QC:', qcCallsPerRow, ')');
                console.log('[AI_CALLS_CALC] totalAICalls:', totalAICalls, '(', totalRows, '×', callsPerRow, ')');
                estimatesHtml += `<div class="cost-item"><span class="cost-label">Total AI Calls</span><span class="cost-value">${totalAICalls.toLocaleString()}</span></div>`;
            }

            estimatesHtml += `<div class="cost-item"><span class="cost-label">Est. Time</span><span class="cost-value">${Math.ceil(estimatedTime / 60)} min</span></div>`;

            // Display cost with discount if applicable (using pre-calculated values)
            if (discount > 0) {
                estimatesHtml += `<div class="cost-item"><span class="cost-label">Cost → Discounted</span><span class="cost-value"><span style="text-decoration: line-through; color: #999;">$${estimatedCost.toFixed(2)}</span> → $${effectiveCost.toFixed(2)}</span></div>`;
            } else {
                estimatesHtml += `<div class="cost-item"><span class="cost-label">Cost</span><span class="cost-value">$${estimatedCost.toFixed(2)}</span></div>`;
            }

            // Domain multiplier is hidden from frontend display

            // Add account balance information if available (using pre-calculated values)
            if (accountInfo) {
                estimatesHtml += `<hr style="margin: 10px 0; border: none; border-top: 1px solid #eee;">`;
                estimatesHtml += `<div class="cost-item"><span class="cost-label">Your Balance</span><span class="cost-value">$${currentBalance.toFixed(2)}</span></div>`;

                if (!sufficientBalance && creditsNeeded > 0) {
                    estimatesHtml += `<div class="cost-item"><span class="cost-label" style="color: #f44336;">Credits Needed</span><span class="cost-value" style="color: #f44336;">$${creditsNeeded.toFixed(2)}</span></div>`;
                }
            }

            estimatesEl.innerHTML = estimatesHtml;

        }
    }

    const card = document.getElementById(cardId);

    // Values already calculated above and stored in outer scope, ready for use

    // Add event listeners for the buttons above estimates
    setTimeout(() => {
        const downloadBtn = card.querySelector('[data-action="download-preview"]');
        const jsonBtn = card.querySelector('[data-action="download-json"]');
        const refineBtn = card.querySelector('[data-action="refine-config"]');
        const revertBtn = card.querySelector('[data-action="revert-config"]');

        if (downloadBtn) {
            downloadBtn.addEventListener('click', async () => {
                markDownloadStart();
                await downloadPreviewResults(previewData);
            });
        }

        if (jsonBtn) {
            jsonBtn.addEventListener('click', () => {
                // Use fetched metadata from API (stored in globalState)
                if (globalState.previewTableMetadata) {
                    downloadJsonMetadata(globalState.previewTableMetadata, jsonBtn);
                } else {
                    showMessage(`${cardId}-messages`, 'JSON metadata still loading. Please wait a moment and try again.', 'info');
                }
            });
        }

        if (refineBtn) {
            refineBtn.addEventListener('click', debounceConfigAction('refine-config', async () => {
                // Don't use markButtonSelected as it expects different button structure
                refineBtn.disabled = true;
                refineBtn.textContent = '🔧 Refining...';
                globalState.activePreviewCard = null;
                await createRefinementCard();
            }));
        }

        // Only add revert button listener if the button exists (version > 1)
        if (revertBtn) {
            revertBtn.addEventListener('click', debounceConfigAction('revert-config', async () => {
                revertBtn.disabled = true;
                revertBtn.textContent = '↩️ Reverting...';
                globalState.activePreviewCard = null;
                await createConfigCardWithId('last');
            }));
        }
    }, 100);

    // Show single Process Table button at bottom
    // Calculate discount and effectiveCost from preview data (recalculate to ensure we have fresh values)
    const buttonDiscount = previewData.cost_estimates?.discount || previewData.discount || 0;
    const buttonEffectiveCost = previewData.cost_estimates?.effective_cost !== undefined
        ? previewData.cost_estimates.effective_cost
        : Math.max(0, estimatedCost - buttonDiscount);

    let buttonCostText = '';
    if (estimatedCost) {
        if (buttonDiscount > 0) {
            // Show strikethrough original cost → discounted price (same format as cost display)
            buttonCostText = ` (<span style="text-decoration: line-through;">$${estimatedCost.toFixed(2)}</span> → $${buttonEffectiveCost.toFixed(2)})`;
        } else {
            buttonCostText = ` ($${estimatedCost.toFixed(2)})`;
        }
    }

    createButtonRow(`${cardId}-buttons`, [
        {
            text: sufficientBalance
                ? `Process Table${buttonCostText}`
                : `Add Credits ($${Math.ceil(creditsNeeded).toFixed(2)})`,
            icon: sufficientBalance ? '✨' : '💳',
            variant: sufficientBalance ? 'primary' : 'secondary',
            width: 'full',
            callback: async (e) => {
                const button = e.target.closest('button');

                if (sufficientBalance) {
                    // User has sufficient balance - proceed with processing
                    globalState.hasInsufficientBalance = false;
                    markButtonSelected(button, '✨ Processing...');
                    globalState.activePreviewCard = null;
                    createProcessingCard();
                } else {
                    // Insufficient balance - open add credits page
                    globalState.hasInsufficientBalance = true;
                    // Mark that user attempted processing from preview
                    globalState.userAttemptedProcessing = true;
                    globalState.pendingProcessingTrigger = () => {
                        // console.trace('[AUTO-TRIGGER] Stack trace:');
                        globalState.activePreviewCard = null;

                        // Find and click the Process Table button to trigger normal processing
                        const buttons = document.querySelectorAll('button');
                        for (const button of buttons) {
                            const buttonText = button.querySelector('.button-text, span');
                            if (buttonText && buttonText.textContent.includes('Process Table')) {
                                button.click();
                                break;
                            }
                        }
                    };
                    markButtonSelected(button, '💳 Opening store...');
                    // Use effective cost-based creditsNeeded (already calculated above using effectiveCost)
                    const recommendedAmount = Math.ceil(creditsNeeded); // Round up to nearest dollar
                    openAddCreditsPage(recommendedAmount, `${cardId}-messages`);

                    // Reset button after a delay
                    setTimeout(() => {
                        markButtonUnselected(button);
                    }, 2000);
                }
            }
        }
    ]);

    // Show instruction message for Add Credits button
    if (!sufficientBalance) {
        showMessage(`${cardId}-messages`, `💳 Click button to add credits. After purchase, return to this tab for auto-processing.`, 'info', false, 'add-credits-instruction');
    }
}

/* ========================================
 * Preview Table Fetching
 * Fetches table metadata via API (same pattern as full validation)
 * This avoids WebSocket payload size limits
 * ======================================== */

async function fetchAndRenderPreviewTable(containerId, sessionId, fallbackMarkdown, retryCount = 0) {
    const container = document.getElementById(containerId);
    if (!container) {
        console.warn('[PREVIEW] Table container not found:', containerId);
        return;
    }

    // Validate session ID format
    if (!sessionId || typeof sessionId !== 'string') {
        console.error('[PREVIEW] Invalid sessionId:', sessionId);
        container.innerHTML = `<p style="color: #999; font-style: italic; text-align: center; padding: 1rem;">Unable to load table: invalid session ID</p>`;
        return;
    }

    const maxRetries = 3;
    const retryDelay = 2000; // 2 seconds

    try {
        console.log(`[PREVIEW] Fetching table metadata via API for session: ${sessionId} (attempt ${retryCount + 1}/${maxRetries + 1})`);
        console.log('[PREVIEW] Session ID format check:', /^session_(demo_)?\d{8}_\d{6}_[a-f0-9]{8}$/.test(sessionId));

        const requestBody = {
            action: 'getViewerData',
            session_id: sessionId,
            is_preview: true  // Request preview data (3 rows)
        };

        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify(requestBody)
        });

        const data = await response.json();

        // SECURITY: Handle token revocation
        if (data.token_revoked) {
            console.error('[SECURITY] Token revoked by server - clearing session');

            // Clear session data
            localStorage.removeItem('sessionToken');
            sessionStorage.removeItem('validatedEmail');
            if (typeof globalState !== 'undefined') {
                globalState.sessionToken = null;
                globalState.email = null;
            }

            // Hide signed-in badge if function exists
            if (typeof hideSignedInBadge === 'function') {
                hideSignedInBadge();
            }

            // Show error message with reload button
            container.innerHTML = `
                <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; padding: 1.5rem; margin: 1rem 0;">
                    <div style="display: flex; align-items: start; gap: 0.75rem;">
                        <span style="font-size: 1.5rem;">⚠️</span>
                        <div>
                            <strong style="color: var(--text-primary);">Session Expired</strong>
                            <p style="color: var(--text-secondary); margin: 0.5rem 0 0 0;">
                                ${data.error || 'Your session has been revoked. Please log in again to view this data.'}
                            </p>
                            <button onclick="location.reload()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--primary-color); color: white; border: none; border-radius: 4px; cursor: pointer;">
                                Reload Page
                            </button>
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        // If metadata was too large to include inline, fetch it from S3
        if (data.success && data.metadata_too_large && data.json_download_url && !data.table_metadata) {
            console.log('[PREVIEW] Metadata too large, fetching from:', data.json_download_url);
            container.innerHTML = '<p style="color: #999; font-style: italic; text-align: center; padding: 1rem;">Loading large table data from S3...</p>';

            const metadataResponse = await fetch(data.json_download_url);
            if (!metadataResponse.ok) {
                throw new Error(`Failed to fetch metadata from S3: ${metadataResponse.status}`);
            }
            data.table_metadata = await metadataResponse.json();
            console.log('[PREVIEW] Successfully fetched large metadata from S3');
        }

        if (data.success && data.table_metadata) {
            // Store for JSON download
            globalState.previewTableMetadata = data.table_metadata;

            // Render interactive table
            if (typeof InteractiveTable !== 'undefined') {
                container.innerHTML = InteractiveTable.render(data.table_metadata, {
                    showGeneralNotes: true,
                    showLegend: true
                });
                InteractiveTable.init();
                console.log('[PREVIEW] Interactive table rendered successfully');
            } else {
                console.warn('[PREVIEW] InteractiveTable not available, using markdown fallback');
                container.innerHTML = renderMarkdown(fallbackMarkdown || '');
            }
        } else {
            // Check if this is a 404 "session not found" (race condition) and retry
            if (response.status === 404 && data.session_not_found && retryCount < maxRetries) {
                console.log(`[PREVIEW] Session not found yet (race condition), retrying in ${retryDelay}ms...`);
                container.innerHTML = `<p style="color: #999; font-style: italic; text-align: center; padding: 1rem;">Loading table data (attempt ${retryCount + 2}/${maxRetries + 1})...</p>`;
                setTimeout(() => {
                    fetchAndRenderPreviewTable(containerId, sessionId, fallbackMarkdown, retryCount + 1);
                }, retryDelay);
                return;
            }

            console.warn('[PREVIEW] API returned no table_metadata, using markdown fallback:', data.error || 'unknown');
            container.innerHTML = renderMarkdown(fallbackMarkdown || '');
        }
    } catch (error) {
        console.error('[PREVIEW] Failed to fetch table metadata:', error);
        // Fallback to markdown
        container.innerHTML = renderMarkdown(fallbackMarkdown || '');
    }
}

function addCreditsToCart(quantity) {
    if (!quantity || quantity < 1) {
        console.warn('[CREDITS] Invalid quantity:', quantity);
        return false;
    }

    // Find the quantity input
    const quantityInput = document.querySelector('input[name="quantity-input"]');
    if (!quantityInput) {
        console.warn('[CREDITS] Quantity input not found. Make sure the product component is on the page.');
        return false;
    }

    // Find the add-to-cart button
    const addToCartButton = document.querySelector('.sqs-add-to-cart-button');
    if (!addToCartButton) {
        console.warn('[CREDITS] Add-to-cart button not found.');
        return false;
    }

    // Set the quantity
    quantityInput.value = quantity;

    // Trigger input events to make sure the UI updates
    const inputEvent = new Event('input', { bubbles: true });
    const changeEvent = new Event('change', { bubbles: true });
    quantityInput.dispatchEvent(inputEvent);
    quantityInput.dispatchEvent(changeEvent);

    // Click the add-to-cart button
    setTimeout(() => {
        addToCartButton.click();
    }, 500);

    return true;
}

/**
 * Add credits and redirect to cart page
 * @param {number} quantity - Number of credits to add
 */
function addCreditsAndGoToCart(quantity) {
    if (!quantity || quantity < 1) {
        console.warn('[CREDITS] Invalid quantity for purchase:', quantity);
        // Just go to cart if invalid quantity
        window.open('https://eliyahu.ai/cart', '_blank');
        return;
    }

    const success = addCreditsToCart(quantity);

    if (success) {
        // Wait for cart to update, then open cart in new tab
        setTimeout(() => {
            window.open('https://eliyahu.ai/cart', '_blank');
        }, 1500);
    } else {
        // Fallback: open cart in new tab
        window.open('https://eliyahu.ai/cart', '_blank');
    }
}

/**
 * Main function for when user needs credits
 * @param {number} quantity - Number of credits needed
 */
function needCredits(quantity) {

}

// Handle general warning messages from WebSocket
function handleWarning(data) {
    if (!data) return;

    const title = data.title || 'Warning';
    const message = data.message || 'A warning occurred';
    const warningType = data.warning_type || 'general';

    // Find the most recent card to show the warning
    let targetCardId = null;
    if (data.conversation_id) {
        // If conversation_id is provided, try to find matching card
        for (const [cardId, handlerInfo] of cardHandlers) {
            if (handlerInfo && handlerInfo.conversationId === data.conversation_id) {
                targetCardId = cardId;
                break;
            }
        }
    }

    // If no specific card found, use the most recent card
    if (!targetCardId && cardHandlers.size > 0) {
        let latestOrder = -1;
        for (const [cardId, handlerInfo] of cardHandlers) {
            if (handlerInfo && handlerInfo.registrationOrder > latestOrder) {
                targetCardId = cardId;
                latestOrder = handlerInfo.registrationOrder;
            }
        }
    }

    if (targetCardId) {
        // Format warning message with title
        const formattedMessage = `<strong>${title}</strong><br>${message}`;

        // Add any additional details if provided
        let detailsHtml = '';
        if (data.rows_included) {
            detailsHtml += `<br><em>${data.rows_included} rows included</em>`;
        }

        // Show warning in the card's message container
        const messageId = `warning-${warningType}-${Date.now()}`;
        showMessage(
            `${targetCardId}-messages`,
            formattedMessage + detailsHtml,
            'warning',
            false,
            messageId
        );

        // Warning displayed
    } else {
        // No card available - log warning
        console.warn('[WARNING] No card found to display warning:', data);
    }
}

// Add window focus event listener to refresh balance when user returns
let windowFocusHandler = null;
let lastFocusTime = 0;

function setupBalanceRefreshOnReturn(messageContainer = 'messages') {
    if (windowFocusHandler) {
        window.removeEventListener('focus', windowFocusHandler);
    }

    windowFocusHandler = async () => {
        const now = Date.now();

        // Avoid rapid-fire focus events (debounce to 2 seconds)
        if (now - lastFocusTime < 2000) {
            return;
        }
        lastFocusTime = now;

        if (globalState.awaitingBalanceRefresh) {
            globalState.awaitingBalanceRefresh = false;

            // Show loading message with specific ID
            showMessage(messageContainer, '🔄 Checking for balance updates...', 'info', false, 'balance-check');

            // Wait a moment for any webhook processing to complete
            await new Promise(resolve => setTimeout(resolve, 2000));

            // Refresh balance for current email
            await refreshCurrentBalance();

            // Check for orders once on return, then start polling
            const foundCredits = await checkForNewOrders(messageContainer);
            if (!foundCredits) {
                // Only start polling if no credits were found immediately
                setTimeout(() => startOrderPolling(messageContainer), 2000);
            }
        } else {
            // Check balance once when returning to tab
            await refreshCurrentBalance();
            const oldBalance = globalState.accountBalance || 0;

            // Check if we have sufficient balance before checking for orders
            const currentBalance = globalState.accountBalance || 0;
            const estimatedCost = globalState.estimatedCost || 0;
            const effectiveCost = globalState.effectiveCost ?? estimatedCost; // Use ?? not || so 0 doesn't fall back
            const hasSufficientBalance = currentBalance >= effectiveCost;

            // Only check for new orders if we don't have sufficient balance
            if (!hasSufficientBalance) {
                try {
                    await checkForNewOrders('messages', false); // Don't show status message (will refresh balance if orders found)
                } catch (error) {
                    console.error('[FOCUS] Error checking orders:', error);
                }
            }

            // Get new balance (may have been updated by checkForNewOrders)
            const newBalance = globalState.accountBalance || 0;

            if (oldBalance !== newBalance) {
                // Update all balance displays
                updateAllBalanceDisplays();
            }

            // Delegate auto-trigger logic to central payment controller
            // This handles ALL cases: balance changed, balance already sufficient, etc.
            if (typeof checkAndTriggerProcessing === 'function') {
                console.log('[FOCUS] Balance check complete, delegating to payment controller');
                checkAndTriggerProcessing('focus');
            } else {
                // Fallback: just update displays if controller not available
                setTimeout(() => {
                    updatePreviewBalanceDisplay();
                }, 500);
            }
        }
    };

    window.addEventListener('focus', windowFocusHandler);
}

// Order polling state with exponential backoff
let orderPollingTimeout = null;
let pollingAttempts = 0;
const MAX_POLLING_ATTEMPTS = 12; // With exponential backoff: 2s, 4s, 8s, 16s, 32s, 60s... = ~5 minutes total
const INITIAL_POLL_DELAY = 2000; // Start with 2 seconds
const MAX_POLL_DELAY = 60000; // Cap at 60 seconds

function startOrderPolling(messageContainer = 'messages') {
    // Clear any existing polling
    stopOrderPolling();

    pollingAttempts = 0;

    // Start first poll immediately
    pollForOrders(messageContainer);
}

async function pollForOrders(messageContainer) {
    pollingAttempts++;

    try {
        // Always check but only show status messages occasionally to reduce spam
        const shouldShowMessage = pollingAttempts % 3 === 1;
        const foundCredits = await checkForNewOrders(messageContainer, shouldShowMessage);

        if (foundCredits) {
            stopOrderPolling();
            return;
        }

        if (pollingAttempts >= MAX_POLLING_ATTEMPTS) {
            const timeoutEl = showMessage(messageContainer, '⏰ Complete your purchase when ready! Return to this tab after checkout to continue.', 'info', false, 'polling-timeout');

            // Make the timeout message clickable to retry validation
            if (timeoutEl) {
                timeoutEl.style.cursor = 'pointer';
                timeoutEl.onclick = () => {
                    // Clear the timeout message and try to find a retry button or validation card
                    timeoutEl.remove();
                    const validationCards = document.querySelectorAll('.validation-card');
                    if (validationCards.length > 0) {
                        const lastCard = validationCards[validationCards.length - 1];
                        const processButton = lastCard.querySelector('button[data-action*="process"], button:contains("Process")');
                        if (processButton) {
                            processButton.click();
                        }
                    }
                };
            }

            stopOrderPolling();
            return;
        }

        // Calculate next delay with exponential backoff
        const delay = Math.min(INITIAL_POLL_DELAY * Math.pow(2, pollingAttempts - 1), MAX_POLL_DELAY);
        // Next order check scheduled

        // Schedule next poll
        orderPollingTimeout = setTimeout(() => pollForOrders(messageContainer), delay);

    } catch (error) {
        console.error('[POLLING] Error during polling:', error);

        // On error, retry with exponential backoff
        const delay = Math.min(INITIAL_POLL_DELAY * Math.pow(2, pollingAttempts - 1), MAX_POLL_DELAY);
        orderPollingTimeout = setTimeout(() => pollForOrders(messageContainer), delay);
    }
}

function stopOrderPolling() {
    if (orderPollingTimeout) {
        clearTimeout(orderPollingTimeout);
        orderPollingTimeout = null;
    }
    pollingAttempts = 0;
}

function updatePreviewBalanceDisplay() {
    // Find the active preview card and update its balance display
    const previewCard = document.querySelector('.card-content[id*="preview"]');
    if (!previewCard) return;

    const estimatesEl = previewCard.querySelector('.estimates');
    if (!estimatesEl) return;

    const currentBalance = globalState.accountBalance || 0;

    // Get estimated cost from the preview card itself
    let estimatedCost = 0;
    const costItems = estimatesEl.querySelectorAll('.cost-item');
    for (const item of costItems) {
        const label = item.querySelector('.cost-label');
        const value = item.querySelector('.cost-value');
        if (label && value && label.textContent.includes('Est. Cost')) {
            estimatedCost = parseFloat(value.textContent.replace('$', '')) || 0;
            break;
        }
    }

    // Fallback to global state if not found in preview
    if (estimatedCost === 0) {
        estimatedCost = globalState.estimatedCost || 0;
    }

    // Use effective cost (net cost after discount) for balance checks
    const effectiveCost = globalState.effectiveCost ?? estimatedCost; // Use ?? not || so 0 doesn't fall back
    const sufficientBalance = currentBalance >= effectiveCost;

    // Find and update the balance line
    for (const item of costItems) {
        const label = item.querySelector('.cost-label');
        if (label && label.textContent.includes('Your Balance')) {
            const valueEl = item.querySelector('.cost-value');
            if (valueEl) {
                valueEl.textContent = `$${currentBalance.toFixed(2)}`;
                // Add a brief highlight to show it updated
                valueEl.style.background = '#e8f5e8';
                valueEl.style.transition = 'background 2s';
                setTimeout(() => {
                    valueEl.style.background = '';
                }, 2000);
            }
            break;
        }
    }

    // Update or hide the credits needed section
    for (const item of costItems) {
        const label = item.querySelector('.cost-label');
        if (label && label.textContent.includes('Credits Needed')) {
            if (sufficientBalance) {
                item.style.display = 'none'; // Hide credits needed line
            } else {
                item.style.display = ''; // Show credits needed line
                const valueEl = item.querySelector('.cost-value');
                if (valueEl) {
                    const creditsNeeded = Math.max(0, effectiveCost - currentBalance);
                    valueEl.textContent = `$${creditsNeeded.toFixed(2)}`;
                }
            }
            break;
        }
    }

    // Update the main action button
    const cardElement = previewCard.closest('.card');
    if (cardElement) {
        const cardId = cardElement.id;
        const buttonsContainer = document.getElementById(`${cardId}-buttons`);
        if (buttonsContainer) {
            // Find the main action button (Process/Add Credits)
            const buttons = buttonsContainer.querySelectorAll('.std-button');
            const mainButton = Array.from(buttons).find(btn => {
                const text = btn.textContent;
                return text.includes('Process Table') || text.includes('Add Credits');
            });

            if (mainButton) {
                const buttonText = mainButton.querySelector('.button-text');
                if (buttonText) {
                    if (sufficientBalance) {
                        // Update to Process button
                        buttonText.textContent = `🔍 Process Table ($${effectiveCost.toFixed(2)})`;
                        mainButton.className = mainButton.className.replace('secondary', 'primary');
                    } else {
                        // Update to Add Credits button
                        const creditsNeeded = Math.max(0, effectiveCost - currentBalance);
                        buttonText.textContent = `💳 Add $${creditsNeeded.toFixed(2)} Credits`;
                        mainButton.className = mainButton.className.replace('primary', 'secondary');

                        // Update the callback
                        mainButton.onclick = async (e) => {
                            const button = e.target.closest('button');
                            globalState.hasInsufficientBalance = true;
                            markButtonSelected(button, '💳 Opening store...');
                            const recommendedAmount = Math.ceil(creditsNeeded);
                            openAddCreditsPage(recommendedAmount, `${cardId}-messages`);

                            setTimeout(() => {
                                markButtonUnselected(button);
                            }, 3000);
                        };
                    }
                }
            }
        }
    }
}

window.refreshCurrentBalance = async function refreshCurrentBalance() {
    try {
        const currentEmail = getCurrentUserEmail();
        if (!currentEmail) {
            return;
        }

        // Now get the updated balance
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'getAccountBalance',
                email: currentEmail
            })
        });

        if (response.ok) {
            const data = await response.json();

            if (data.success) {
                // Handle different response formats
                let newBalance = data.balance;

                // Check various possible locations for balance
                if (newBalance === undefined && data.account_info) {
                    newBalance = data.account_info.balance || data.account_info.current_balance;
                }

                // Also check if balance is a string that needs parsing
                if (typeof newBalance === 'string') {
                    newBalance = parseFloat(newBalance);
                }

                if (newBalance !== undefined && !isNaN(newBalance)) {
                    // Update global balance state
                    const oldBalance = globalState.accountBalance || 0;
                    globalState.accountBalance = newBalance;

                    // If there was a pending validation, clear insufficient balance flag
                    if (globalState.pendingValidationRetry && newBalance > oldBalance) {
                        // Clear insufficient balance flag when balance increases
                        globalState.hasInsufficientBalance = false;
                    }
                }
            }
        }
    } catch (error) {
        console.error('Error refreshing balance:', error);
        // Don't show balance refresh errors to avoid message spam
    }
}

function getCurrentUserEmail() {
    // Try to get email from various possible sources
    const emailInputs = document.querySelectorAll('input[type="email"]');
    for (const input of emailInputs) {
        if (input.value && input.value.includes('@')) {
            return input.value;
        }
    }

    // Try stored email
    const storedEmail = sessionStorage.getItem('validatedEmail');
    if (storedEmail && storedEmail.includes('@')) {
        return storedEmail;
    }

    return null;
}


/* ========== 14b-payment-state.js ========== */

/* ========================================
 * 14b-payment-state.js - Payment State Controller
 *
 * Centralizes payment flow state management
 * to eliminate race conditions and ensure
 * auto-trigger works from any balance update source.
 *
 * Dependencies: 00-config.js (globalState), 01-utils.js (showMessage)
 * ======================================== */

// Payment state - centralized tracking of pending processing intent
const paymentState = {
    pendingCardId: null,
    pendingEffectiveCost: null,
    triggerSource: null,
    lastTriggerAttempt: 0,
    intentSetTime: null,        // When the intent was set (for expiry)
    expiryWarningShown: false   // Track if we've shown the expiry warning
};

// Constants for timeout behavior
const INTENT_WARNING_MS = 15 * 60 * 1000;  // 15 minutes - show reminder
const INTENT_EXPIRY_MS = 30 * 60 * 1000;   // 30 minutes - auto-expire

/**
 * Record user's intent to process when they have insufficient balance.
 * Called when user clicks "Process Table" but doesn't have enough credits.
 *
 * @param {string} cardId - The card ID that initiated the processing attempt
 * @param {number} effectiveCost - The cost required to process
 */
function setPendingProcessingIntent(cardId, effectiveCost) {
    console.log(`[PAYMENT_STATE] Setting pending processing intent: cardId=${cardId}, cost=${effectiveCost}`);

    const now = Date.now();
    paymentState.pendingCardId = cardId;
    paymentState.pendingEffectiveCost = effectiveCost;
    paymentState.intentSetTime = now;
    paymentState.expiryWarningShown = false;

    // Also set legacy flags for backward compatibility
    globalState.userAttemptedProcessing = true;
    globalState.hasInsufficientBalance = true;

    // Persist to sessionStorage for tab survival
    try {
        sessionStorage.setItem('pendingProcessing', JSON.stringify({
            cardId,
            effectiveCost,
            timestamp: now
        }));
    } catch (e) {
        console.warn('[PAYMENT_STATE] Could not persist to sessionStorage:', e);
    }

    // Start expiry timer
    startExpiryTimer();
}

/**
 * Clear pending intent (called when processing starts or is cancelled).
 */
function clearPendingProcessingIntent() {
    console.log('[PAYMENT_STATE] Clearing pending processing intent');

    paymentState.pendingCardId = null;
    paymentState.pendingEffectiveCost = null;
    paymentState.intentSetTime = null;
    paymentState.expiryWarningShown = false;

    // Clear legacy flags
    globalState.userAttemptedProcessing = false;
    globalState.hasInsufficientBalance = false;
    globalState.pendingProcessingTrigger = null;

    // Clear expiry timer
    stopExpiryTimer();

    // Clear sessionStorage
    try {
        sessionStorage.removeItem('pendingProcessing');
    } catch (e) {
        // Ignore sessionStorage errors
    }
}

/**
 * Restore pending intent from sessionStorage (e.g., after page reload).
 * Call this on page load to recover pending processing state.
 */
function restorePendingProcessingIntent() {
    try {
        const stored = sessionStorage.getItem('pendingProcessing');
        if (stored) {
            const data = JSON.parse(stored);
            const age = Date.now() - data.timestamp;

            // Only restore if less than 30 minutes old
            if (age < INTENT_EXPIRY_MS) {
                paymentState.pendingCardId = data.cardId;
                paymentState.pendingEffectiveCost = data.effectiveCost;
                paymentState.intentSetTime = data.timestamp;
                paymentState.expiryWarningShown = age >= INTENT_WARNING_MS; // Already past warning time
                globalState.userAttemptedProcessing = true;
                globalState.hasInsufficientBalance = true;
                console.log('[PAYMENT_STATE] Restored pending intent from sessionStorage:', data);

                // Start expiry timer for remaining time
                startExpiryTimer();
                return true;
            } else {
                // Expired, clear it
                console.log('[PAYMENT_STATE] Stored intent expired, clearing');
                sessionStorage.removeItem('pendingProcessing');
            }
        }
    } catch (e) {
        console.warn('[PAYMENT_STATE] Could not restore from sessionStorage:', e);
    }
    return false;
}

// Expiry timer reference
let expiryTimerId = null;
let warningTimerId = null;

/**
 * Start timers for warning and expiry of pending intent.
 */
function startExpiryTimer() {
    stopExpiryTimer(); // Clear any existing timers

    if (!paymentState.intentSetTime) return;

    const now = Date.now();
    const age = now - paymentState.intentSetTime;
    const timeToWarning = INTENT_WARNING_MS - age;
    const timeToExpiry = INTENT_EXPIRY_MS - age;

    // Set warning timer (15 min)
    if (timeToWarning > 0 && !paymentState.expiryWarningShown) {
        warningTimerId = setTimeout(() => {
            showExpiryWarning();
        }, timeToWarning);
    }

    // Set expiry timer (30 min)
    if (timeToExpiry > 0) {
        expiryTimerId = setTimeout(() => {
            handleIntentExpiry();
        }, timeToExpiry);
    } else {
        // Already expired
        handleIntentExpiry();
    }
}

/**
 * Stop expiry timers.
 */
function stopExpiryTimer() {
    if (warningTimerId) {
        clearTimeout(warningTimerId);
        warningTimerId = null;
    }
    if (expiryTimerId) {
        clearTimeout(expiryTimerId);
        expiryTimerId = null;
    }
}

/**
 * Show warning that intent will expire soon.
 */
function showExpiryWarning() {
    if (paymentState.expiryWarningShown) return;
    paymentState.expiryWarningShown = true;

    console.log('[PAYMENT_STATE] Showing expiry warning');

    const containerId = getMessageContainerId();
    if (containerId) {
        const msg = `Still waiting for payment? Your session will timeout in 15 minutes. ` +
                   `<a href="#" onclick="extendPaymentIntent(); return false;">Click here to extend</a>`;
        showMessage(containerId, msg, 'warning', false, 'payment-expiry-warning');
    }
}

/**
 * Handle intent expiry - clear state and notify user.
 */
function handleIntentExpiry() {
    console.log('[PAYMENT_STATE] Intent expired after 30 minutes');

    const containerId = getMessageContainerId();

    // Clear the intent
    clearPendingProcessingIntent();

    // Notify user
    if (containerId) {
        showMessage(containerId,
            `Payment session expired. Please click "Process Table" again when ready.`,
            'warning', false, 'payment-expired');
    }
}

/**
 * Extend the payment intent timer (user clicked "extend" link).
 */
function extendPaymentIntent() {
    if (!paymentState.pendingCardId && !globalState.userAttemptedProcessing) {
        console.log('[PAYMENT_STATE] No intent to extend');
        return;
    }

    console.log('[PAYMENT_STATE] Extending payment intent');

    // Reset the timestamp
    paymentState.intentSetTime = Date.now();
    paymentState.expiryWarningShown = false;

    // Update sessionStorage
    try {
        const stored = sessionStorage.getItem('pendingProcessing');
        if (stored) {
            const data = JSON.parse(stored);
            data.timestamp = paymentState.intentSetTime;
            sessionStorage.setItem('pendingProcessing', JSON.stringify(data));
        }
    } catch (e) {
        // Ignore
    }

    // Restart timers
    startExpiryTimer();

    // Show confirmation
    const containerId = getMessageContainerId();
    if (containerId) {
        showMessage(containerId, `Session extended! You have another 30 minutes.`, 'success', false, 'payment-extended');
    }
}

/**
 * Get the correct message container ID based on pending card or fallback to last container.
 * @returns {string|null} The container ID or null if not found
 */
function getMessageContainerId() {
    // First try: use the pending card ID if available
    if (paymentState.pendingCardId) {
        const specificContainer = document.getElementById(`${paymentState.pendingCardId}-messages`);
        if (specificContainer) {
            return `${paymentState.pendingCardId}-messages`;
        }
    }

    // Fallback: find message containers and use the last visible one
    const containers = document.querySelectorAll('[id$="-messages"]');
    if (containers.length > 0) {
        // Prefer visible containers
        for (let i = containers.length - 1; i >= 0; i--) {
            const container = containers[i];
            if (container.offsetParent !== null) { // Check if visible
                return container.id;
            }
        }
        // If no visible container, use the last one
        return containers[containers.length - 1].id;
    }

    return null;
}

/**
 * Central function called by ALL balance update paths.
 * This is THE function that decides whether to auto-trigger processing.
 *
 * @param {string} source - Where the balance update came from:
 *                          'websocket', 'focus', 'polling', 'manual'
 */
function checkAndTriggerProcessing(source) {
    console.log(`[PAYMENT_STATE] checkAndTriggerProcessing called from '${source}'`);

    // Debounce: prevent rapid-fire triggers (1 second window)
    const now = Date.now();
    if (now - paymentState.lastTriggerAttempt < 1000) {
        console.log('[PAYMENT_STATE] Debounced - too soon since last trigger attempt');
        return;
    }
    paymentState.lastTriggerAttempt = now;

    // Check for pending processing intent
    const hasPendingIntent = paymentState.pendingCardId || globalState.userAttemptedProcessing;
    if (!hasPendingIntent) {
        console.log('[PAYMENT_STATE] No pending processing intent, skipping');
        return;
    }

    // Check if intent has expired (in-memory check)
    if (paymentState.intentSetTime && (now - paymentState.intentSetTime) >= INTENT_EXPIRY_MS) {
        console.log('[PAYMENT_STATE] Intent expired, clearing');
        handleIntentExpiry();
        return;
    }

    // Get current balance and required cost
    const currentBalance = globalState.accountBalance || 0;
    const effectiveCost = paymentState.pendingEffectiveCost ||
                          globalState.effectiveCost ||
                          globalState.estimatedCost || 0;

    console.log(`[PAYMENT_STATE] Balance check: current=${currentBalance}, required=${effectiveCost}`);

    // BUG FIX: Don't trigger if effectiveCost is 0 or not set - cost hasn't been calculated yet
    if (effectiveCost <= 0) {
        console.log('[PAYMENT_STATE] effectiveCost is 0 or negative, skipping trigger (cost not calculated)');
        return;
    }

    if (currentBalance >= effectiveCost) {
        // Sufficient balance - trigger processing!
        console.log(`[PAYMENT_STATE] Sufficient balance! Triggering processing from '${source}'`);
        paymentState.triggerSource = source;
        executeProcessingTrigger();
    } else {
        // Still insufficient - show progress message
        const shortfall = effectiveCost - currentBalance;
        const progress = Math.round((currentBalance / effectiveCost) * 100);
        console.log(`[PAYMENT_STATE] Still insufficient: shortfall=${shortfall}, progress=${progress}%`);
        showPartialPaymentProgress(currentBalance, effectiveCost, shortfall, progress);

        // Refresh the timestamp since user is actively trying to pay
        refreshIntentTimestamp();
    }
}

/**
 * Refresh the intent timestamp when user makes partial payment.
 * This extends the expiry window.
 */
function refreshIntentTimestamp() {
    if (!paymentState.intentSetTime) return;

    paymentState.intentSetTime = Date.now();
    paymentState.expiryWarningShown = false;

    // Update sessionStorage
    try {
        const stored = sessionStorage.getItem('pendingProcessing');
        if (stored) {
            const data = JSON.parse(stored);
            data.timestamp = paymentState.intentSetTime;
            sessionStorage.setItem('pendingProcessing', JSON.stringify(data));
        }
    } catch (e) {
        // Ignore
    }

    // Restart timers with fresh time
    startExpiryTimer();
}

/**
 * Actually trigger the processing.
 * This function handles the UI updates and triggers createProcessingCard.
 */
function executeProcessingTrigger() {
    console.log('[PAYMENT_STATE] Executing processing trigger');

    // Get correct message container
    const containerId = getMessageContainerId();

    // Clear UI messages and show success message
    if (containerId) {
        const container = document.getElementById(containerId);
        if (container) {
            container.innerHTML = '';
        }
        // BUG FIX: Add emoji for consistency with other success messages
        showMessage(containerId,
            `🎉 Credits detected! Auto-starting validation...`,
            'success', false, 'auto-process');
    }

    // Disable buttons to prevent double-click
    disableProcessButtons();

    // Store the card ID before potentially clearing
    const cardId = paymentState.pendingCardId;

    // BUG FIX: Don't clear intent yet - only clear after confirming we can trigger
    // Try to find a way to trigger processing first
    setTimeout(() => {
        let triggerSucceeded = false;

        // First try: Find and click Process Table button
        const buttons = document.querySelectorAll('button');
        for (const button of buttons) {
            const buttonText = button.textContent || '';
            if (buttonText.includes('Process Table') && !button.disabled) {
                console.log('[PAYMENT_STATE] Clicking Process Table button');
                button.click();
                triggerSucceeded = true;
                break;
            }
        }

        // Second try: call createProcessingCard directly if available
        if (!triggerSucceeded && typeof createProcessingCard === 'function') {
            console.log('[PAYMENT_STATE] Calling createProcessingCard directly');
            createProcessingCard();
            triggerSucceeded = true;
        }

        // Only clear intent if we successfully triggered
        if (triggerSucceeded) {
            clearPendingProcessingIntent();
        } else {
            console.error('[PAYMENT_STATE] Could not find way to trigger processing - intent preserved');
            // Re-enable buttons since we failed
            enableProcessButtons();
            // Show error message
            if (containerId) {
                showMessage(containerId,
                    `Could not auto-start. Please click "Process Table" manually.`,
                    'warning', false, 'auto-process-failed');
            }
        }
    }, 500);
}

/**
 * Disable all Process Table buttons to prevent double-clicking.
 */
function disableProcessButtons() {
    document.querySelectorAll('button').forEach(button => {
        const buttonText = button.textContent || '';
        if (buttonText.includes('Process Table')) {
            button.disabled = true;
            const span = button.querySelector('.button-text, span');
            if (span) {
                span.textContent = 'Processing...';
            }
        }
    });
}

/**
 * Re-enable Process Table buttons (if trigger failed).
 */
function enableProcessButtons() {
    const currentBalance = globalState.accountBalance || 0;
    const effectiveCost = paymentState.pendingEffectiveCost ||
                          globalState.effectiveCost ||
                          globalState.estimatedCost || 0;

    document.querySelectorAll('button').forEach(button => {
        const span = button.querySelector('.button-text, span');
        if (span && span.textContent === 'Processing...') {
            button.disabled = false;
            if (currentBalance >= effectiveCost) {
                span.textContent = `🔍 Process Table ($${effectiveCost.toFixed(2)})`;
            } else {
                const needed = Math.ceil(effectiveCost - currentBalance);
                span.textContent = `💳 Add $${needed.toFixed(2)} Credits`;
            }
        }
    });
}

/**
 * Show progress message when partial payment is received.
 *
 * @param {number} balance - Current balance
 * @param {number} cost - Required cost
 * @param {number} shortfall - Amount still needed
 * @param {number} percent - Percentage funded (0-100)
 */
function showPartialPaymentProgress(balance, cost, shortfall, percent) {
    // Update preview balance displays
    if (typeof updatePreviewBalanceDisplay === 'function') {
        updatePreviewBalanceDisplay();
    }

    // Get correct message container
    const containerId = getMessageContainerId();
    if (containerId) {
        const msg = `💰 Balance: $${balance.toFixed(2)} | Need: $${cost.toFixed(2)} | ` +
                   `Still need $${shortfall.toFixed(2)} more (${percent}% funded)`;
        showMessage(containerId, msg, 'info', false, 'partial-progress');
    }
}

/**
 * Check if there's a pending processing intent.
 * Useful for debugging and conditional logic.
 *
 * @returns {boolean} True if there's a pending intent
 */
function hasPendingProcessingIntent() {
    return !!(paymentState.pendingCardId || globalState.userAttemptedProcessing);
}

/**
 * Get the current payment state for debugging.
 *
 * @returns {Object} Current payment state
 */
function getPaymentState() {
    const now = Date.now();
    const age = paymentState.intentSetTime ? now - paymentState.intentSetTime : null;
    return {
        ...paymentState,
        intentAgeMs: age,
        intentAgeMinutes: age ? Math.round(age / 60000) : null,
        timeToExpiry: age ? Math.max(0, INTENT_EXPIRY_MS - age) : null,
        legacyFlags: {
            userAttemptedProcessing: globalState.userAttemptedProcessing,
            hasInsufficientBalance: globalState.hasInsufficientBalance,
            hasPendingTrigger: !!globalState.pendingProcessingTrigger
        }
    };
}

// Restore any pending intent from sessionStorage on load
restorePendingProcessingIntent();

// Expose functions globally
window.setPendingProcessingIntent = setPendingProcessingIntent;
window.clearPendingProcessingIntent = clearPendingProcessingIntent;
window.checkAndTriggerProcessing = checkAndTriggerProcessing;
window.hasPendingProcessingIntent = hasPendingProcessingIntent;
window.getPaymentState = getPaymentState;
window.restorePendingProcessingIntent = restorePendingProcessingIntent;
window.extendPaymentIntent = extendPaymentIntent;

 * Handles reference checking for text and PDF uploads,
 * claim extraction, and validation processing.

 * Dependencies: 00-config.js, 03-websocket.js, 04-cards.js, 05-chat.js

function createReferenceCheckCard() {
    const cardId = generateCardId();
    referenceCheckState.cardId = cardId;

    const content = `
        <input type="file" id="${cardId}-pdf-input" accept=".pdf" style="display: none;">
        <div id="${cardId}-form">
            <div id="${cardId}-input-container">
                <textarea id="${cardId}-input" class="reference-check-textarea"
                    placeholder="Paste AI output or literature with citations to verify..."
                    maxlength="300000"
                    rows="12"
                    style="width: 100%; resize: vertical; background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 12px; padding: 0.75rem; font-family: var(--font-family); font-size: var(--font-size-base); line-height: 1.5; color: var(--text-color); box-shadow: inset 0 1px 2px rgba(0,0,0,0.04); transition: var(--transition);"></textarea>
                <style>
                    .reference-check-textarea:hover {
                        border-color: #D1D5DB;
                    }
                    .reference-check-textarea:focus {
                        outline: none;
                        background: #FFFFFF;
                        border-color: var(--primary-color);
                        box-shadow: inset 0 1px 2px rgba(0,0,0,0.05), 0 0 0 3px rgba(76, 175, 80, 0.2);
                    }
                    .reference-check-textarea::placeholder {
                        color: #9CA3AF;
                    }
                </style>
            </div>
            <div id="${cardId}-messages"></div>
        </div>
        <div id="${cardId}-success" style="display: none;">
            <div class="message message-success">
                <span class="message-icon">✓</span>
                <div id="${cardId}-success-text"></div>
            </div>
        </div>
    `;

    const card = createCard({
        id: cardId,
        icon: '🔍',
        title: 'Reference Check',
        subtitle: 'Verify AI output or literature with citations',
        content,
        buttons: [
            {
                text: 'Submit Text',
                variant: 'primary',
                callback: async (e) => {
                    const input = document.getElementById(`${cardId}-input`);
                    const submittedText = input.value.trim();

                    // Validate before hiding form
                    if (!submittedText) {
                        showMessage(`${cardId}-messages`, 'Please enter text with citations to verify', 'error');
                        return;
                    }

                    if (submittedText.length < 50) {
                        showMessage(`${cardId}-messages`, 'Submitted text must have at least 50 characters', 'error');
                        return;
                    }

                    // Hide buttons and form immediately
                    const buttonsContainer = document.getElementById(`${cardId}-buttons`);
                    const formEl = document.getElementById(`${cardId}-form`);
                    if (buttonsContainer) buttonsContainer.style.display = 'none';
                    if (formEl) formEl.style.display = 'none';

                    // Show progress indicator immediately
                    showThinkingInCard(cardId, 'Submitting text...', true);

                    await startReferenceCheck(cardId);
                }
            },
            {
                text: 'or Upload PDF',
                icon: '📄',
                variant: 'secondary',
                callback: async (e) => {
                    // Hide buttons and form
                    const buttonsContainer = document.getElementById(`${cardId}-buttons`);
                    const formEl = document.getElementById(`${cardId}-form`);
                    if (buttonsContainer) buttonsContainer.style.display = 'none';
                    if (formEl) formEl.style.display = 'none';

                    // Show progress indicator while waiting for file selection
                    showThinkingInCard(cardId, 'Select a PDF file to upload...', true);

                    // Store flag that we're waiting for file
                    referenceCheckState.awaitingPdfSelection = true;

                    const pdfInput = document.getElementById(`${cardId}-pdf-input`);
                    if (pdfInput) {
                        pdfInput.click();
                    }
                }
            }
        ]
    });

    // Setup PDF upload handler
    setTimeout(() => {
        const pdfInput = document.getElementById(`${cardId}-pdf-input`);
        if (pdfInput) {
            pdfInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    // Clear awaiting flag
                    referenceCheckState.awaitingPdfSelection = false;

                    // Update progress message now that file is selected
                    updateThinkingInCard(cardId, 'Uploading PDF...');

                    await handlePdfUpload(cardId, file);
                }
                // Reset input so same file can be selected again
                e.target.value = '';
            });
        }
    }, 100);

    return card;
}

// Handle PDF upload (async with WebSocket)
async function handlePdfUpload(cardId, file) {
    // Check if email is validated (for deferred validation mode)
    if (DEFER_EMAIL_VALIDATION && !globalState.email) {
        const storedEmail = sessionStorage.getItem('validatedEmail');
        if (!storedEmail || !storedEmail.includes('@')) {
            requireEmailThen(() => handlePdfUpload(cardId, file), 'upload your PDF');
            return;
        }
        globalState.email = storedEmail;
    }

    const messagesDiv = document.getElementById(`${cardId}-messages`);

    try {
        // Validate file type
        if (!file.name.toLowerCase().endsWith('.pdf')) {
            completeThinkingInCard(cardId, 'Invalid file type');
            showMessage(messagesDiv.id, 'Please select a PDF file', 'error');
            return;
        }

        // Validate file size (50MB max - no longer limited by API Gateway!)
        const maxSize = 50 * 1024 * 1024;
        if (file.size > maxSize) {
            completeThinkingInCard(cardId, 'File too large');
            showMessage(messagesDiv.id, `PDF file too large. Maximum size is ${maxSize / 1024 / 1024}MB`, 'error');
            return;
        }

        // Show initial progress
        showThinkingInCard(cardId, `Preparing to upload ${file.name}...`, true);

        // Step 1: Request presigned URL from backend
        const presignedResponse = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'requestPresignedUrl',
                file_type: 'pdf',
                filename: file.name,
                file_size: file.size,
                email: globalState.email,
                session_id: globalState.sessionId || ''
            })
        });

        const presignedData = await presignedResponse.json();

        if (!presignedResponse.ok || !presignedData.success) {
            throw new Error(presignedData.message || 'Failed to get upload URL');
        }

        // Store upload ID and session ID
        const uploadId = presignedData.upload_id;
        const s3Key = presignedData.s3_key;
        const sessionId = presignedData.session_id;

        // Store session_id if backend generated one
        if (sessionId && !globalState.sessionId) {
            globalState.sessionId = sessionId;
            localStorage.setItem('sessionId', sessionId);
        }

        referenceCheckState.pdfId = uploadId;
        referenceCheckState.pdfFilename = file.name;

        // Update progress
        showThinkingInCard(cardId, `Uploading ${file.name} to secure storage...`, true);

        // Step 2: Upload file directly to S3 using presigned URL
        // IMPORTANT: Include metadata as x-amz-meta-* headers to match presigned URL params
        const uploadResponse = await fetch(presignedData.presigned_url, {
            method: 'PUT',
            body: file,
            headers: {
                'Content-Type': presignedData.content_type,  // Use content type from backend
                'x-amz-meta-upload_id': uploadId,
                'x-amz-meta-original_filename': file.name,
                'x-amz-meta-email': globalState.email,
                'x-amz-meta-session_id': sessionId,
                'x-amz-meta-file_type': 'pdf',
                'x-amz-meta-file_size': file.size.toString(),
                'x-amz-meta-uploaded_at': new Date().toISOString()
            }
        });

        if (!uploadResponse.ok) {
            throw new Error(`Upload failed with status ${uploadResponse.status}`);
        }

        console.log('[PDF_UPLOAD] File uploaded to S3 successfully');

        // Step 3: Confirm upload complete and trigger processing
        const confirmResponse = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'confirmUploadComplete',
                upload_id: uploadId,
                s3_key: s3Key,
                session_id: sessionId,
                file_type: 'pdf',
                filename: file.name,
                email: globalState.email
            })
        });

        const confirmData = await confirmResponse.json();

        if (!confirmResponse.ok || !confirmData.success) {
            throw new Error(confirmData.message || 'Failed to confirm upload');
        }

        // Show progress indicator and wait for WebSocket updates
        showThinkingInCard(cardId, `${file.name} uploaded successfully. Reading PDF...`, true);

        // Connect to WebSocket to receive conversion result
        connectToSession(sessionId);

        // Register WebSocket handler for PDF conversion
        unregisterCardHandler(cardId);
        registerCardHandler(cardId, ['pdf_conversion_progress', 'pdf_conversion_complete', 'pdf_conversion_error'], (wsData) => {
            handlePdfConversionMessage(cardId, wsData, file.name);
        });

    } catch (error) {
        console.error('[PDF_UPLOAD] Error:', error);
        completeThinkingInCard(cardId, 'Upload failed');
        showMessage(messagesDiv.id,
            `Error uploading PDF: ${error.message}`,
            'error'
        );
    }
}

// Handle PDF conversion WebSocket messages
function handlePdfConversionMessage(cardId, message, filename) {
    console.log('[PDF_CONVERSION] Received message:', message.type);

    if (message.type === 'pdf_conversion_progress') {
        // Update progress indicator (like table maker)
        const progressMsg = message.message || 'Converting PDF...';
        updateThinkingInCard(cardId, progressMsg);

        // Update progress bar if percentage provided
        if (message.progress !== undefined) {
            updateThinkingProgress(cardId, message.progress, progressMsg);
        }
    }
    else if (message.type === 'pdf_conversion_complete') {
        // PDF converted and claim extraction started automatically
        updateThinkingInCard(cardId, `${filename} converted. Extracting claims from text (this may take a minute)...`);

        // Store conversation ID for reference check tracking
        referenceCheckState.conversationId = message.conversation_id;

        // Unregister PDF conversion handler, now listen for reference check progress
        unregisterCardHandler(cardId);
        registerCardHandler(cardId, ['reference_check_progress', 'reference_check_complete', 'reference_check_error'], (wsData) => {
            if (wsData.type === 'reference_check_progress') {
                handleReferenceCheckProgress(wsData, cardId);
            } else if (wsData.type === 'reference_check_complete') {
                handleReferenceCheckComplete(wsData, cardId);
            } else if (wsData.type === 'reference_check_error') {
                handleReferenceCheckError(wsData, cardId);
            }
        });
    }
    else if (message.type === 'pdf_conversion_error') {
        // Show error
        completeThinkingInCard(cardId, `Error: ${message.message}`);

        // Clean up WebSocket handler
        unregisterCardHandler(cardId);
    }
}

// Start reference check
async function startReferenceCheck(cardId) {
    // Check if email is validated (for deferred validation mode)
    if (DEFER_EMAIL_VALIDATION && !globalState.email) {
        const storedEmail = sessionStorage.getItem('validatedEmail');
        if (!storedEmail || !storedEmail.includes('@')) {
            requireEmailThen(() => startReferenceCheck(cardId), 'check your references');
            return;
        }
        globalState.email = storedEmail;
    }

    const input = document.getElementById(`${cardId}-input`);
    const submittedText = input.value.trim();

    // Store submitted text (validation already done in button callback)
    referenceCheckState.submittedText = submittedText;

    // Update thinking indicator (already shown by callback as "Submitting text...")
    updateThinkingInCard(cardId, 'Text submitted. Extracting claims from text (this may take a minute)...');

    // Register WebSocket handler
    registerCardHandler(cardId, ['reference_check_progress', 'reference_check_complete', 'reference_check_error'], (data) => {
        if (data.type === 'reference_check_progress') {
            handleReferenceCheckProgress(data, cardId);
        } else if (data.type === 'reference_check_complete') {
            handleReferenceCheckComplete(data, cardId);
        } else if (data.type === 'reference_check_error') {
            handleReferenceCheckError(data, cardId);
        }
    });

    // Send API request
    try {
        const response = await fetch(`${API_BASE}/validate`, {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: 'startReferenceCheck',
                email: globalState.email,
                session_id: globalState.sessionId || null,
                submitted_text: submittedText
            })
        });

        const data = await response.json();

        if (data.success && data.status === 'processing') {
            // Request queued successfully
            referenceCheckState.conversationId = data.conversation_id;

            // Store session_id if backend generated one
            if (data.session_id && !globalState.sessionId) {
                globalState.sessionId = data.session_id;
                localStorage.setItem('sessionId', data.session_id);
            }

            // Connect to WebSocket session
            connectToSession(globalState.sessionId);
        } else if (data.error === 'text_too_large') {
            // Handle text too large error
            completeThinkingInCard(cardId, 'Text too large');
            showMessage(`${cardId}-messages`,
                `Text is too large (${data.char_count} characters). Maximum allowed is ${data.max_chars} characters (approximately ${data.max_words} words).`,
                'error');

            // Re-enable textarea
            input.value = submittedText;
            input.rows = 12;
            input.disabled = false;
            input.style.cursor = 'text';
        } else {
            completeThinkingInCard(cardId, 'Failed to start');
            showMessage(`${cardId}-messages`,
                'Failed to start reference check: ' + (data.error || data.message || 'Unknown error'),
                'error');

            // Re-enable textarea
            input.value = submittedText;
            input.rows = 12;
            input.disabled = false;
            input.style.cursor = 'text';
        }
    } catch (error) {
        console.error('Error starting reference check:', error);
        completeThinkingInCard(cardId, 'Error');
        showMessage(`${cardId}-messages`,
            'Failed to start reference check. Please try again.',
            'error');

        // Re-enable textarea
        input.value = submittedText;
        input.rows = 12;
        input.disabled = false;
        input.style.cursor = 'text';
    }
}

// Handle reference check progress updates
function handleReferenceCheckProgress(data, cardId) {
    // Use cardId from referenceCheckState if not provided
    if (!cardId) {
        cardId = referenceCheckState.cardId;
    }
    if (!cardId) return;

    // Update progress bar
    if (data.progress !== undefined) {
        const message = data.message || data.status || 'Processing...';
        updateThinkingProgress(cardId, data.progress, message);
    }

    // Show claims found if available
    if (data.claims_found !== undefined) {
        updateThinkingInCard(cardId, `Found ${data.claims_found} claims to validate...`);
    }

    // Show validation progress if available
    if (data.claims_validated !== undefined && data.total_claims !== undefined) {
        updateThinkingInCard(cardId, `Validated ${data.claims_validated} of ${data.total_claims} claims...`);
    }
}

// Handle reference check complete
function handleReferenceCheckComplete(data, cardId) {
    // Use cardId from referenceCheckState if not provided
    if (!cardId) {
        cardId = referenceCheckState.cardId;
    }
    if (!cardId) return;

    // Store data in global state (like table_maker does)
    if (data.csv_s3_key) globalState.csvS3Key = data.csv_s3_key;
    if (data.config_s3_key) globalState.configS3Key = data.config_s3_key;
    if (data.session_id) {
        globalState.sessionId = data.session_id;
        localStorage.setItem('sessionId', data.session_id);
    }

    // Mark files as ready for validation
    globalState.configValidated = true;
    globalState.configStored = true;
    globalState.excelFileUploaded = true;

    // Mark as reference check session (config is static, cannot be refined)
    globalState.isReferenceCheck = true;

    // Show claims info box (orange ID box with extracted claims)
    if (data.claims && data.claims.length > 0) {
        showClaimsInfoBox(cardId, data.claims, data.summary.total_claims);
    }

    // Update progress indicator with completion message
    const total = data.summary.total_claims;
    const withRefs = data.summary.claims_with_references;
    const withoutRefs = data.summary.claims_without_references;

    let claimSummary;
    if (withoutRefs === 0) {
        claimSummary = `${total} claim${total !== 1 ? 's' : ''} (all referenced)`;
    } else if (withRefs === 0) {
        claimSummary = `${total} claim${total !== 1 ? 's' : ''} (none referenced)`;
    } else {
        claimSummary = `${total} claim${total !== 1 ? 's' : ''} (${withRefs} referenced, ${withoutRefs} not)`;
    }

    // Update thinking indicator to show extraction complete with summary
    updateThinkingInCard(cardId, `Extraction complete! Found ${claimSummary}.`);

    // Complete thinking indicator immediately
    setTimeout(() => {
        completeThinkingInCard(cardId, `Extraction complete! Found ${claimSummary}.`);

        // Wait 1 second, then open preview
        setTimeout(() => {
            globalState.activePreviewCard = null;
            createPreviewCard();
        }, 1000);
    }, 300);
}

/* ========================================
 * 16-interactive-table.js - Modular Interactive Table Component
 *
 * Pure table rendering module for displaying validation results.
 * Can be used in preview cards, full results, and standalone viewers.
 * Does NOT include buttons - use card button system for actions.

/**
 * InteractiveTable - Modular table component for rendering validation data
 */
const InteractiveTable = (function() {
    'use strict';

    /* ========================================
     * State Variables
     * ======================================== */
    let tooltipElement = null;
    let tooltipTimeout = null;
    let hoverDelayTimeout = null;
    let currentHoverCell = null;
    let currentModalCell = null;
    let isTouchDevice = false;
    let navSettleTimeout = null;

    /* ========================================
     * Default Options
     * ======================================== */
    const defaultOptions = {
        showGeneralNotes: true,    // Show collapsible notes box
        showLegend: true,          // Show confidence color legend
