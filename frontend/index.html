<body>
    <div class="animation-container">
        <div class="initializing">Initializing...</div>
        <div class="intro-text">Hyperplexity</div>
        <div class="powered-by">powered by:</div>
        
        <div id="eliyahu-logo-container" class="cursor-pointer">
            <div class="logo-wrapper">
                <div class="logo-outline">
                    <div id="animated-square" class="logo-square"></div>
                </div>
            </div>
            <div class="text-wrapper">
                <div class="logo-text">eliyahu</div>
                <div class="pronunciation">(ey-lee-ya-hoo)</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('eliyahu-logo-container');
            const square = document.getElementById('animated-square');
            const pronunciation = document.querySelector('.pronunciation');
            
            let animationPhase = 0; // 0: initial, 1: normal beats, 2: hover, 3: clicked
            let beatCount = 0;
            let hoverBeatCount = 0;

            // Start the animation sequence after logo fades in
            setTimeout(() => {
                startAnimationSequence();
            }, 1700); // Wait for logo to fade in (1.2s + 0.5s)

            function startAnimationSequence() {
                // Phase 1: Four heartbeats that progressively speed up
                animationPhase = 1;
                beatCount = 0;
                
                // Beat 1 - slowest (1.2s)
                square.style.animation = 'pulseEffectBeat1 1.2s ease-in-out';
                
                setTimeout(() => {
                    // Beat 2 - faster (1.0s)
                    square.style.animation = 'pulseEffectBeat2 1.0s ease-in-out';
                    
                    setTimeout(() => {
                        // Beat 3 - faster still (0.8s)
                        square.style.animation = 'pulseEffectBeat3 0.8s ease-in-out';
                        
                        setTimeout(() => {
                            // Beat 4 - fastest (0.6s)
                            square.style.animation = 'pulseEffectBeat4 0.6s ease-in-out';
                            
                            setTimeout(() => {
                                // After fourth beat, trigger click
                                triggerAutoClick();
                            }, 600);
                        }, 800);
                    }, 1000);
                }, 1200);
            }

            function startHoverPhase() {
                // Phase 2: Hover effect with phonetics
                animationPhase = 2;
                hoverBeatCount = 0;
                
                // Show phonetics
                pronunciation.style.opacity = '1';
                
                // Start hover animation
                square.style.animation = 'pulseEffectHover 0.8s infinite';
                
                // After 2 hover beats (1.6 seconds), trigger click
                setTimeout(() => {
                    triggerAutoClick();
                }, 1600);
            }

            function triggerAutoClick() {
                // Phase 3: Auto-click
                if (animationPhase === 3) return; // Prevent multiple triggers
                animationPhase = 3;
                
                try {
                    // Play the climactic animation
                    square.style.animation = 'pulseEffectClick 1.8s ease-out forwards';
                    
                    // Container stays stable - only inner square animates
                    
                    // Navigate after animation delay
                    setTimeout(() => {
                        try {
                            window.location.href = 'https://eliyahu.ai/hyperplexity';
                        } catch (err) {
                            console.error('Navigation failed:', err);
                            // Fallback navigation
                            window.open('https://eliyahu.ai/hyperplexity', '_blank');
                        }
                    }, 1200);
                } catch (err) {
                    console.error('Animation failed:', err);
                    // Fallback direct navigation
                    setTimeout(() => {
                        window.location.href = 'https://eliyahu.ai/hyperplexity';
                    }, 500);
                }
            }

            // Manual click handler (in case user clicks before auto-click)
            container.addEventListener('click', (e) => {
                e.preventDefault();
                if (animationPhase < 3) {
                    triggerAutoClick();
                }
            });

            // Optional: Add manual hover effects if user hovers before the sequence
            container.addEventListener('mouseenter', () => {
                if (animationPhase === 1) {
                    pronunciation.style.opacity = '1';
                    square.style.animation = 'pulseEffectHover 0.8s infinite';
                }
            });

            container.addEventListener('mouseleave', () => {
                if (animationPhase === 1) {
                    pronunciation.style.opacity = '0';
                    square.style.animation = 'pulseEffect 1.5s infinite';
                }
            });
        });
    </script>
