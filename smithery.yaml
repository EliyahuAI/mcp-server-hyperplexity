name: Hyperplexity
description: >-
  Generate, validate, and fact-check research tables with AI-sourced citations
  and per-cell confidence scores. Upload an Excel/CSV or describe a table in
  plain language — Hyperplexity researches every cell, scores confidence, and
  links citations. Supports table generation, validation, reference checking,
  and result export.
homepage: https://hyperplexity.ai

startCommand:
  type: http
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        title: Hyperplexity API Key
        description: >-
          Your Hyperplexity API key. Get one (with $20 free credits) at
          https://hyperplexity.ai/account
        x-from:
          header: X-Api-Key
        x-to:
          header: X-Api-Key
