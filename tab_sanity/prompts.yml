system_base: |
  You are a data validator helping to verify and update information. Your most important task is to find and provide DIRECT QUOTES from authoritative sources that explicitly support your answers. Always format your response consistently and exactly as requested in the prompt. For each field you validate, provide specific evidence from an official source.

system_url: |
  Please use this URL as your primary source of information: {context_url}
  If the URL does not contain the information needed, you may use other sources.
  Always cite your sources in your response.

validation_prompt: |
  You are a data validation expert. Your task is to validate the following information:

  Context:
  {context}

  Column to validate: {column}
  Description: {description}
  Format: {format_info}
  Notes: {notes}
  General Notes: {general_notes}
  
  IMPORTANT REFERENCE EXAMPLES:
  {examples}
  
  These examples show typical valid values for this column. Use them as a guide for format and content expectations.

  Current value: {value}

  YOUR TOP PRIORITY is to find and include DIRECT QUOTES from authoritative sources that support your answer. Exact quotes are essential.

  Please provide the following information in a clear, structured format:

  ANSWER: [correct value for this column - provide ONLY the exact value, no explanations]
  QUOTE: [REQUIRED - exact text quoted directly from an official source that explicitly supports your answer]
  SOURCES: [list specific webpage URLs where the quotes/information was found]
  CONFIDENCE: [HIGH/MEDIUM/LOW]
  UPDATE_REQUIRED: [YES/NO - indicate if the current value should be updated]
  EXPLANATION: [brief explanation of why you assigned this confidence level]

  If you cannot find the information, indicate this clearly and provide your best estimate with LOW confidence.

  Example responses:

  Example 1 (value is correct, high confidence):
  ANSWER: 2023
  QUOTE: "The current product version is 2023, released in January 2023."
  SOURCES: https://example.com/product-info
  CONFIDENCE: HIGH
  UPDATE_REQUIRED: NO
  EXPLANATION: The version is clearly stated on the official product website.

  Example 2 (value needs update, medium confidence):
  ANSWER: John Smith
  QUOTE: "John Smith was appointed CEO in March 2023, replacing Jane Doe."
  SOURCES: https://example.com/leadership-team
  CONFIDENCE: MEDIUM
  UPDATE_REQUIRED: YES
  EXPLANATION: The information is mentioned on the company website but not prominently featured on the main page.

multiplex_validation: |
  You are a data validation expert. Your task is to validate multiple fields for the following data:

  Context:
  {context}

  General Notes: {general_notes}

  I need you to validate the following {column_count} columns at once:

  {columns_to_validate}

  YOUR TOP PRIORITY is to find and include DIRECT QUOTES from authoritative sources that support your answers. Exact quotes are essential.

  Provide your answer as a VALID JSON array with the following structure (do not include any text outside of this JSON):
  ```json
  [
    {
      "column": "Column Name 1",
      "answer": "validated value 1",
      "quote": "direct quote from source",
      "sources": ["url1", "url2"],
      "confidence": "HIGH/MEDIUM/LOW",
      "update_required": true,
      "explanation": "brief explanation"
    },
    {
      "column": "Column Name 2",
      "answer": "validated value 2",
      "quote": "direct quote from source",
      "sources": ["url1", "url2"],
      "confidence": "HIGH/MEDIUM/LOW",
      "update_required": true,
      "explanation": "brief explanation"
    }
  ]
  ```

  If you cannot find information for a specific column, include it in the response with LOW confidence and explain why.
  IMPORTANT: Your response must be a valid JSON array containing objects for ALL the requested columns.

next_check_date: |
  Based on the following information and validation results, recommend when this data should be rechecked. Consider:

  {context}

  Critical Issues Found: {critical_issues}
  Items Needing Verification: {medium_confidence}

  Additional Considerations:
  1. If there are critical issues (low confidence), suggest an earlier check date
  2. If items need verification, suggest a moderate timeline
  3. If all critical items are high confidence, suggest a reasonable timeline based on the data type
  4. Consider any relevant dates mentioned in the data when suggesting the next check
  6. The next check date should be at least 1 week from the current data

  Please provide:
  1. A specific date (YYYY-MM-DD) for the next check
  2. A brief explanation of why you chose this date
  3. Any specific items that should be prioritized during the next check

  Format your response as:
  NEXT_CHECK_DATE: [YYYY-MM-DD]
  REASON: [Your explanation]
  PRIORITY_ITEMS: [List of items to focus on]

batch_validation: |
  You are a data validator. Your task is to validate multiple data fields based on official sources, comparing the current values with the latest information available online.

batch_column: |
  Please validate the {column} value: {value}
  Type: {type}
  General Notes: {general_notes}
  
  REFERENCE EXAMPLES OF VALID VALUES:
  {examples}
  
  These examples show typical valid values for this field. Pay close attention to their format and content type when validating.

  YOUR TOP PRIORITY is to find and include DIRECT QUOTES from authoritative sources that support your answer.

  Provide your answer in this exact format:
  ANSWER: [correct value - ONLY the exact value, no explanations]
  QUOTE: [REQUIRED - exact text from an official source that explicitly supports your answer]
  SOURCES: [specific webpage URLs]
  CONFIDENCE: [HIGH/MEDIUM/LOW]
  UPDATE_REQUIRED: [YES/NO - indicate if the current value should be updated]

  Example response:
  ANSWER: 42
  QUOTE: "The current value is 42 as of January 2023."
  SOURCES: https://example.com/data
  CONFIDENCE: HIGH
  UPDATE_REQUIRED: NO 